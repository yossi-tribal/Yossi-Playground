<template>
    <template lwc:if={active}>
        <!--
            DOM order matters: the spotlight must come BEFORE the backdrop so
            the `.oc-spotlight ~ .oc-backdrop { background: transparent; }`
            rule in onboardingCoach.css can match. Otherwise the backdrop
            darkens the highlighted element too and the "spotlight" reads as
            a faintly-less-dark rectangle instead of a clearly-highlighted
            target.
        -->
        <template lwc:if={hasTargetRect}>
            <div class="oc-spotlight" style={spotlightStyle} aria-hidden="true"></div>
        </template>

        <div class="oc-backdrop" onclick={handleBackdropClick} aria-hidden="true"></div>

        <section
            class={popoverClass}
            style={popoverStyle}
            role="dialog"
            aria-modal="true"
            aria-labelledby="oc-step-title"
            aria-describedby="oc-step-body"
            onclick={handleCardClick}
        >
            <div class="oc-card">
                <header class="oc-card__head">
                    <template lwc:if={stepIcon}>
                        <div class="oc-card__icon">
                            <lightning-icon icon-name={stepIcon} size="small" variant="inverse"></lightning-icon>
                        </div>
                    </template>
                    <div class="oc-card__heading">
                        <template lwc:if={showStepIndicator}>
                            <div class="oc-card__eyebrow">
                                Step {currentStepNumber} of {totalSteps}
                            </div>
                        </template>
                        <h2 id="oc-step-title" class="oc-card__title">{currentStep.title}</h2>
                    </div>
                </header>

                <p id="oc-step-body" class="oc-card__body">{currentStep.body}</p>

                <footer class="oc-card__foot">
                    <button
                        type="button"
                        class="oc-btn oc-btn--ghost"
                        onclick={handleSkip}
                        aria-label="Skip this walkthrough"
                    >
                        Skip
                    </button>
                    <div class="oc-card__spacer"></div>
                    <template lwc:if={canGoBack}>
                        <button
                            type="button"
                            class="oc-btn oc-btn--secondary"
                            onclick={handleBack}
                        >
                            Back
                        </button>
                    </template>
                    <button
                        type="button"
                        class="oc-btn oc-btn--primary"
                        onclick={handleNext}
                    >
                        {nextButtonLabel}
                    </button>
                </footer>
            </div>

            <template lwc:if={showArrow}>
                <div class={arrowClass} style={arrowStyle} aria-hidden="true"></div>
            </template>
        </section>
    </template>
</template>
