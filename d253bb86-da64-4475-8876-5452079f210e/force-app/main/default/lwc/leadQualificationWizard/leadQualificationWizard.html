<template>
    <div class="wizard-container">
        <!-- Header -->
        <div class="wizard-header">
            <lightning-icon icon-name="utility:magicwand" size="small" class="header-icon"></lightning-icon>
            <span class="header-title">Lead Qualification Wizard</span>
        </div>

        <!-- Loading State -->
        <template if:true={isLoading}>
            <div class="loading-container">
                <lightning-spinner alternative-text="Loading qualification data..." size="medium"></lightning-spinner>
                <p class="loading-text">Loading qualification data...</p>
            </div>
        </template>

        <!-- Error State -->
        <template if:true={hasError}>
            <div class="error-container">
                <div class="error-card">
                    <lightning-icon icon-name="utility:error" size="small" variant="error" class="error-icon"></lightning-icon>
                    <div class="error-content">
                        <h3 class="error-title">Error Loading Qualification Data</h3>
                        <p class="error-message">{error}</p>
                    </div>
                </div>
            </div>
        </template>

        <!-- Empty state: no question list on this Lead (configuration, not user error) -->
        <template if:true={showNoQuestionListEmptyState}>
            <div class="empty-state-container">
                <div class="empty-state-card empty-state-card--no-list" role="status">
                    <div class="empty-state-visual" aria-hidden="true">
                        <div class="empty-state-icon-ring">
                            <lightning-icon
                                icon-name="utility:questions_and_answers"
                                size="medium"
                                class="empty-state-hero-icon"
                            ></lightning-icon>
                        </div>
                    </div>
                    <div class="empty-state-body">
                        <h2 class="empty-state-title">We’re almost ready for you</h2>
                        <p class="empty-state-lead">
                            Nothing is wrong with this lead — the qualification playbook just has not been connected yet.
                        </p>
                        <p class="empty-state-copy">
                            When a <strong>Question List</strong> is assigned on this Lead, you will see guided Yes / No questions here,
                            a live quality score, and a clear recommended next step. Until then, we would rather pause than guess.
                        </p>
                        <div class="empty-state-steps">
                            <div class="empty-state-step">
                                <span class="empty-state-step-num">1</span>
                                <span class="empty-state-step-text">Ask your Salesforce admin (or RevOps owner) to assign the right Question List on this Lead.</span>
                            </div>
                            <div class="empty-state-step">
                                <span class="empty-state-step-num">2</span>
                                <span class="empty-state-step-text">Save the Lead, then refresh this page — we will load your questions automatically.</span>
                            </div>
                        </div>
                        <p class="empty-state-reassurance">
                            Take a breath. This is a quick configuration moment, not a dead end.
                        </p>
                    </div>
                </div>
                <div class="empty-state-footer-actions">
                    <button type="button" class="response-history-link" onclick={handleShowHistory}>
                        View response history
                    </button>
                </div>
            </div>
        </template>

        <!-- Empty state: list assigned but no active questions yet -->
        <template if:true={showNoQuestionsInListEmptyState}>
            <div class="empty-state-container">
                <div class="empty-state-card empty-state-card--no-questions" role="status">
                    <div class="empty-state-visual" aria-hidden="true">
                        <div class="empty-state-icon-ring empty-state-icon-ring--soft">
                            <lightning-icon
                                icon-name="utility:rows"
                                size="medium"
                                class="empty-state-hero-icon"
                            ></lightning-icon>
                        </div>
                    </div>
                    <div class="empty-state-body">
                        <h2 class="empty-state-title">Your list is linked — questions are on the way</h2>
                        <p class="empty-state-lead">
                            This Lead already has a Question List, but there are no active questions to show yet.
                        </p>
                        <p class="empty-state-copy">
                            That usually means your team is still building the questionnaire, or every question is temporarily inactive.
                            Once at least one question is active on this list, this wizard will light up for you.
                        </p>
                        <p class="empty-state-reassurance">
                            If you expected questions here, your admin can open the Question List Manager and publish a few active items.
                        </p>
                    </div>
                </div>
                <div class="empty-state-footer-actions">
                    <button type="button" class="response-history-link" onclick={handleShowHistory}>
                        View response history
                    </button>
                </div>
            </div>
        </template>

        <!-- Main Content -->
        <template if:true={hasData}>
            <div class="wizard-content">
                <!-- Top Section with Lead Quality and Recommended Action -->
                <div class="top-info-section">
                    <div class={infoLeftClass}>
                        <div class="info-label">
                            Lead Quality
                            <lightning-helptext
                                content="Lead quality is determined by the total score from answered qualification questions. High scores indicate strong leads ready for conversion, while low scores suggest nurturing is needed."
                                icon-variant="info">
                            </lightning-helptext>
                        </div>
                        <div class={rankValueClass}>{leadRank}</div>
                    </div>
                    <div class="info-right">
                        <div class="info-label">Recommended Action</div>
                        <div class="info-value">{recommendationText}</div>
                    </div>
                </div>

                <!-- Progress Bar -->
                <div class="progress-section">
                    <div class="progress-header">
                        <span class="progress-label">Progress</span>
                        <span class="progress-percentage">{progressPercentage}%</span>
                    </div>
                    <div class="progress-bar-container" role="progressbar" aria-valuenow={progressPercentage} aria-valuemin="0" aria-valuemax="100">
                        <div class="progress-bar-fill" style={progressBarStyle}></div>
                    </div>
                    <div class="progress-legend">
                        <span class="legend-item">
                            <span class="legend-dot answered"></span>
                            <span class="legend-text">Answered ({answeredCount})</span>
                        </span>
                        <span class="legend-item">
                            <span class="legend-dot unanswered"></span>
                            <span class="legend-text">Unanswered ({unansweredCount})</span>
                        </span>
                    </div>
                </div>

                <!-- Disqualification Alert -->
                <template if:true={isDisqualified}>
                    <div class="disqualification-alert">
                        <lightning-icon icon-name="utility:warning" size="small" variant="warning" class="alert-icon"></lightning-icon>
                        <div class="alert-content">
                            <div class="alert-title">Lead Disqualified</div>
                            <div class="alert-message">{disqualificationReason}</div>
                        </div>
                    </div>
                </template>

                <!-- Questions Section -->
                <div class="questions-section">
                    <h2 class="section-title">Qualification Questions</h2>
                    <p class="section-subtitle">Answer each question to qualify this lead</p>

                    <template for:each={questions} for:item="question">
                        <div key={question.questionId} class="question-row">
                            <!-- Question Number Badge -->
                            <div class="question-badge">
                                <span class="badge-number">{question.questionOrder}</span>
                            </div>

                            <!-- Question Text -->
                            <div class="question-text">
                                {question.questionText}
                            </div>

                            <!-- Dealbreaker Explanation -->
                            <template if:true={question.isDealbreaker}>
                                <div class="dealbreaker-explanation">
                                    ⚠️ {question.dealbreakerExplanation}
                                </div>
                            </template>

                            <!-- Empty Dealbreaker Column (for grid alignment on desktop) -->
                            <div class="dealbreaker-column"></div>

                            <!-- Response Buttons (Desktop) -->
                            <div class="response-buttons desktop-buttons">
                                <!-- Yes Button -->
                                <button
                                    class={question.yesButtonClass}
                                    data-question-id={question.questionId}
                                    data-response="Yes"
                                    data-is-dealbreaker={question.isDealbreaker}
                                    data-dealbreaker-value={question.dealbreakerValue}
                                    data-current-response={question.currentResponse}
                                    onclick={handleResponseClick}
                                    disabled={question.isSaving}
                                    aria-pressed={question.isYesSelected}
                                    aria-label="Answer Yes">
                                    <template if:true={question.isSaving}>
                                        <lightning-spinner size="x-small" class="button-spinner"></lightning-spinner>
                                    </template>
                                    <template if:false={question.isSaving}>
                                        {question.yesButtonLabel}
                                    </template>
                                </button>

                                <!-- No Button -->
                                <button
                                    class={question.noButtonClass}
                                    data-question-id={question.questionId}
                                    data-response="No"
                                    data-is-dealbreaker={question.isDealbreaker}
                                    data-dealbreaker-value={question.dealbreakerValue}
                                    data-current-response={question.currentResponse}
                                    onclick={handleResponseClick}
                                    disabled={question.isSaving}
                                    aria-pressed={question.isNoSelected}
                                    aria-label="Answer No">
                                    <template if:true={question.isSaving}>
                                        <lightning-spinner size="x-small" class="button-spinner"></lightning-spinner>
                                    </template>
                                    <template if:false={question.isSaving}>
                                        {question.noButtonLabel}
                                    </template>
                                </button>
                            </div>

                            <!-- Response Buttons (Mobile) -->
                            <div class="response-buttons mobile-buttons">
                                <!-- Yes Button -->
                                <button
                                    class={question.yesButtonClass}
                                    data-question-id={question.questionId}
                                    data-response="Yes"
                                    data-is-dealbreaker={question.isDealbreaker}
                                    data-dealbreaker-value={question.dealbreakerValue}
                                    data-current-response={question.currentResponse}
                                    onclick={handleResponseClick}
                                    disabled={question.isSaving}
                                    aria-pressed={question.isYesSelected}
                                    aria-label="Answer Yes">
                                    <template if:true={question.isSaving}>
                                        <lightning-spinner size="x-small" class="button-spinner"></lightning-spinner>
                                    </template>
                                    <template if:false={question.isSaving}>
                                        {question.yesButtonLabel}
                                    </template>
                                </button>

                                <!-- No Button -->
                                <button
                                    class={question.noButtonClass}
                                    data-question-id={question.questionId}
                                    data-response="No"
                                    data-is-dealbreaker={question.isDealbreaker}
                                    data-dealbreaker-value={question.dealbreakerValue}
                                    data-current-response={question.currentResponse}
                                    onclick={handleResponseClick}
                                    disabled={question.isSaving}
                                    aria-pressed={question.isNoSelected}
                                    aria-label="Answer No">
                                    <template if:true={question.isSaving}>
                                        <lightning-spinner size="x-small" class="button-spinner"></lightning-spinner>
                                    </template>
                                    <template if:false={question.isSaving}>
                                        {question.noButtonLabel}
                                    </template>
                                </button>
                            </div>
                        </div>
                    </template>
                </div>

                <!-- Response History Button -->
                <div class="response-history-section">
                    <button class="response-history-link" onclick={handleShowHistory}>
                        Response History
                    </button>
                </div>
            </div>
        </template>

        <!-- Change Detection Modal -->
        <template if:true={showChangeModal}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <h2 class="slds-modal__title slds-hyphenate">Question List Updated</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <p>{changeModalMessage}</p>
                    </div>
                    <footer class="slds-modal__footer">
                        <button class="slds-button slds-button_brand" onclick={handleGotIt}>
                            Got It
                        </button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <!-- Response History Modal -->
        <template if:true={showHistoryModal}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_large">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                                title="Close" onclick={handleCloseHistory}>
                            <lightning-icon icon-name="utility:close" alternative-text="close" size="small"></lightning-icon>
                            <span class="slds-assistive-text">Close</span>
                        </button>
                        <h2 class="slds-modal__title slds-hyphenate">Response History</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <!-- Loading State -->
                        <template if:true={isLoadingHistory}>
                            <div class="slds-align_absolute-center slds-p-vertical_large">
                                <lightning-spinner alternative-text="Loading history..." size="medium"></lightning-spinner>
                            </div>
                        </template>

                        <!-- Empty State -->
                        <template if:false={isLoadingHistory}>
                            <template if:false={hasResponseHistory}>
                                <div class="slds-text-align_center slds-p-vertical_large">
                                    <p class="slds-text-color_weak">No responses recorded yet.</p>
                                </div>
                            </template>

                            <!-- History Content -->
                            <template if:true={hasResponseHistory}>
                                <div class="history-accordion">
                                    <template for:each={formattedResponseHistory} for:item="group">
                                        <div key={group.sectionKey} class="history-section">
                                            <!-- Section Header -->
                                            <button class="history-section-header"
                                                    data-section-key={group.sectionKey}
                                                    onclick={handleToggleSection}>
                                                <lightning-icon
                                                    icon-name={group.iconName}
                                                    size="x-small"
                                                    class="section-icon">
                                                </lightning-icon>
                                                <div class="section-header-content">
                                                    <div class="section-title">{group.questionListName}</div>
                                                    <div class="section-subtitle">{group.dateRange}</div>
                                                </div>
                                            </button>

                                            <!-- Section Content -->
                                            <template if:true={group.isExpanded}>
                                                <div class="history-section-content">
                                                    <template for:each={group.formattedResponses} for:item="resp">
                                                        <div key={resp.responseDate} class="history-response-item">
                                                            <div class="response-question">
                                                                {resp.questionNumber}. {resp.questionText}
                                                                <template if:true={resp.isDealbreaker}>
                                                                    <span class="dealbreaker-badge-inline">⚠ Dealbreaker</span>
                                                                </template>
                                                            </div>
                                                            <div class="response-answer">
                                                                <strong>Answer:</strong> {resp.response}
                                                            </div>
                                                            <div class="response-date">
                                                                <strong>Date:</strong> {resp.responseDate}
                                                            </div>
                                                        </div>
                                                    </template>
                                                </div>
                                            </template>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </template>
                    </div>
                    <footer class="slds-modal__footer">
                        <button class="slds-button slds-button_neutral" onclick={handleCloseHistory}>
                            Close
                        </button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <!-- Watermark -->
        <div class="tribal-watermark">Made by Tribal</div>
    </div>
</template>
