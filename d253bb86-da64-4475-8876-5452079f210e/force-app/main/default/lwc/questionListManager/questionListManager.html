<template>
    <div class={managerContainerClass}>
        <!-- Header -->
        <div class="manager-header">
            <lightning-icon icon-name="utility:einstein" size="small" class="header-icon" alternative-text="Question lists"></lightning-icon>
            <span class="header-title">Lead Qualification List Manager</span>
            <div class="manager-header-spacer"></div>
            <template if:true={hasQuestionLists}>
                <c-onboarding-menu
                    class="manager-header-menu"
                    data-tour="info-icon"
                    component-name="questionListManager"
                    user-id={currentUserId}
                    tours={tours}
                    ontourselect={handleTourSelect}
                ></c-onboarding-menu>
            </template>
        </div>

        <!-- Loading Spinner -->
        <template if:true={isLoading}>
            <div class="loading-overlay">
                <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
                <p class="loading-text">Loading...</p>
            </div>
        </template>

        <!-- Main Layout -->
        <div class="manager-content">

            <!-- Welcome State - Full Width (No Lists). Gated on the wire
                 having resolved at least once so it doesn't flash on initial
                 page load before data arrives. -->
            <template if:true={showWelcomeState}>
                <div class="welcome-state">
                    <lightning-icon icon-name="utility:einstein" size="large" class="welcome-icon" alternative-text="Question lists"></lightning-icon>
                    <h1 class="welcome-title">Welcome to Question List Manager</h1>
                    <p class="welcome-subtext">Create your first question list to start qualifying leads. We'll set you up with 9 pre-configured questions.</p>

                    <div class="welcome-checklist">
                        <div class="welcome-checklist-item">
                            <lightning-icon icon-name="utility:check" size="x-small" class="checklist-icon"></lightning-icon>
                            <span>9 qualification questions</span>
                        </div>
                        <div class="welcome-checklist-item">
                            <lightning-icon icon-name="utility:check" size="x-small" class="checklist-icon"></lightning-icon>
                            <span>Scoring thresholds configured</span>
                        </div>
                        <div class="welcome-checklist-item">
                            <lightning-icon icon-name="utility:check" size="x-small" class="checklist-icon"></lightning-icon>
                            <span>Dealbreaker rules included</span>
                        </div>
                    </div>

                    <button class="welcome-cta-button" onclick={handleGenerateDefaultList}>
                        Get Started
                        <lightning-icon icon-name="utility:forward" size="x-small" class="cta-arrow-icon"></lightning-icon>
                    </button>

                    <button class="welcome-secondary-action" onclick={handleCreateEmptyList}>
                        or Create Custom List
                    </button>
                </div>
            </template>

            <!-- Master-Detail Layout (Has Lists) -->
            <template if:true={hasQuestionLists}>
                <div class="slds-grid slds-wrap slds-gutters">

                <!-- Left Panel: Question Lists -->
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3 slds-large-size_1-of-4">
                    <div class="list-panel" data-tour="lists-panel">

                        <!-- List Header -->
                        <div class="list-panel-header">
                            <h2 class="list-panel-title">Question Lists</h2>
                            <div class="list-panel-header-actions">
                                <button class="add-list-button" onclick={handleNewList} title="New List" data-tour="new-list-button">
                                    <lightning-icon icon-name="utility:add" size="xx-small"></lightning-icon>
                                </button>
                                <button class="mobile-drawer-close" onclick={handleCloseMobileList} title="Close list picker" aria-label="Close list picker">
                                    <lightning-icon icon-name="utility:close" size="xx-small"></lightning-icon>
                                </button>
                            </div>
                        </div>

                        <!-- Search -->
                        <div class="list-search-container">
                            <lightning-input
                                type="search"
                                label="Search Lists"
                                value={searchTerm}
                                onchange={handleSearchChange}
                                variant="label-hidden"
                                placeholder="Search lists..."
                                class="list-search-input">
                            </lightning-input>
                        </div>

                        <!-- List Items -->
                        <div class="list-container">
                            <template for:each={filteredQuestionLists} for:item="list">
                                <div key={list.listId}
                                     class={list.itemClass}
                                     data-list-id={list.listId}
                                     onclick={handleSelectList}>
                                    <div class="list-item">
                                        <div class="list-item-header">
                                            <div class="list-item-name">{list.listName}</div>
                                            <template if:true={list.isActive}>
                                                <span class="list-item-badge list-item-badge--active" title="Active">
                                                    <span class="list-item-badge-dot" aria-hidden="true"></span>Active
                                                </span>
                                            </template>
                                            <template if:false={list.isActive}>
                                                <span class="list-item-badge list-item-badge--inactive" title="Inactive">
                                                    <span class="list-item-badge-dot" aria-hidden="true"></span>Inactive
                                                </span>
                                            </template>
                                        </div>
                                        <div class="list-item-meta">
                                            <span class="list-item-stat">{list.totalQuestions} questions</span>
                                            <span class="list-item-divider">•</span>
                                            <span class="list-item-stat">{list.totalPossiblePoints} pts</span>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>

                <!-- Right Panel: Question Details -->
                <div class="slds-col slds-size_1-of-1 slds-medium-size_2-of-3 slds-large-size_3-of-4">
                <template if:true={hasSelectedList}>
                    <div class="detail-panel" data-tour="details-panel">

                        <!-- Detail Header -->
                        <div class="detail-header" data-tour="list-header">
                            <div class="detail-header-content">
                                <button class="mobile-switch-list" onclick={handleOpenMobileList} aria-label="Switch list" data-tour="switch-list-button">
                                    <lightning-icon icon-name="utility:rows" size="xx-small"></lightning-icon>
                                    <span>Switch list</span>
                                </button>
                                <div class="detail-title-row">
                                    <h1 class="detail-title">{selectedList.listName}</h1>
                                </div>
                                <p class="detail-subtitle">{selectedListSummary}</p>
                            </div>
                            <div class="detail-header-actions">
                                <div class="list-status-control" data-tour="list-status-toggle">
                                    <div class={toggleSwitchClass} onclick={handleToggleListStatus} title={listStatusToggleTitle} role="switch" tabindex="0">
                                        <div class="toggle-knob"></div>
                                    </div>
                                    <span class="toggle-label">{listStatusText}</span>
                                </div>
                                <lightning-button-menu
                                    alternative-text="List Actions"
                                    icon-size="x-small"
                                    menu-alignment="right"
                                    class="actions-menu">
                                    <lightning-menu-item label="Edit List" icon-name="utility:edit" onclick={handleEditList}></lightning-menu-item>
                                    <lightning-menu-item label="Clone List" icon-name="utility:copy" onclick={handleCloneList}></lightning-menu-item>
                                    <lightning-menu-item label="Delete List" icon-name="utility:delete" onclick={handleDeleteList}></lightning-menu-item>
                                    <lightning-menu-divider></lightning-menu-divider>
                                    <lightning-menu-item label="Activate All Questions" icon-name="utility:check" onclick={handleActivateAll}></lightning-menu-item>
                                    <lightning-menu-item label="Deactivate All Questions" icon-name="utility:ban" onclick={handleDeactivateAll}></lightning-menu-item>
                                </lightning-button-menu>
                            </div>
                        </div>

                        <!-- Description -->
                        <template if:true={selectedList.description}>
                            <div class="detail-description">
                                <p>{selectedList.description}</p>
                            </div>
                        </template>

                        <!-- Assignment Rules Section (Read-Only) -->
                        <div class="assignment-rules-section" data-tour="assignment-rules">
                            <div class="assignment-rules-card">
                                <div class="assignment-rules-header" onclick={handleToggleAssignmentRules}>
                                    <div class="assignment-rules-header-left">
                                        <lightning-icon icon-name="utility:filter" size="x-small" class="assignment-rules-icon"></lightning-icon>
                                        <h3 class="assignment-rules-title">Assignment Rules</h3>
                                        <button class="toggle-icon-button" title={assignmentRulesToggleTitle}>
                                            <lightning-icon icon-name={assignmentRulesToggleIcon} size="xx-small"></lightning-icon>
                                        </button>
                                    </div>
                                    <div class="assignment-rules-header-right">
                                        <template if:true={selectedList.isDefault}>
                                            <span class="default-badge">Default Fallback List</span>
                                        </template>
                                        <template if:false={selectedList.isDefault}>
                                            <template if:true={hasAssignmentCriteria}>
                                                <span class="criteria-badge">Criteria-Based</span>
                                            </template>
                                            <template if:false={hasAssignmentCriteria}>
                                                <span class="no-criteria-badge">No Criteria Set</span>
                                            </template>
                                        </template>
                                    </div>
                                </div>
                                <template if:true={isAssignmentRulesExpanded}>
                                    <div class="assignment-rules-body">
                                        <!-- State 1: Default Fallback List -->
                                        <template if:true={selectedList.isDefault}>
                                            <div class="assignment-state-card default-state-card">
                                                <div class="state-card-icon-container default-state-icon">
                                                    <lightning-icon icon-name="utility:shield" size="small"></lightning-icon>
                                                </div>
                                                <div class="state-card-content">
                                                    <p class="state-card-primary-text">This is the <strong>default fallback list</strong> — it's automatically assigned when no other criteria match.</p>
                                                    <p class="state-card-secondary-text">To change the default list or add criteria-based rules, configure in Tribal.</p>
                                                </div>
                                            </div>
                                        </template>

                                        <!-- State 2: Criteria-Based Assignment -->
                                        <template if:false={selectedList.isDefault}>
                                            <template if:true={hasAssignmentCriteria}>
                                                <div class="assignment-state-card criteria-state-card">
                                                    <div class="state-card-icon-container criteria-state-icon">
                                                        <lightning-icon icon-name="utility:check" size="small"></lightning-icon>
                                                    </div>
                                                    <div class="state-card-content">
                                                        <p class="state-card-primary-text">This list will be automatically assigned to leads matching these criteria:</p>
                                                        <div class="criteria-rules-container">
                                                            <template for:each={parsedCriteriaRules} for:item="rule">
                                                                <div key={rule.key} class="criteria-rule-pill">
                                                                    <span class="rule-field-name">{rule.label}</span>
                                                                    <span class="rule-operator-badge">{rule.displayOperator}</span>
                                                                    <span class="rule-value-tag">{rule.displayValue}</span>
                                                                </div>
                                                            </template>
                                                        </div>
                                                        <p class="state-card-secondary-text">To modify these rules, configure in Tribal.</p>
                                                    </div>
                                                </div>
                                            </template>

                                            <!-- State 3: No Criteria Set -->
                                            <template if:false={hasAssignmentCriteria}>
                                                <div class="assignment-state-card no-criteria-state-card">
                                                    <div class="state-card-icon-container no-criteria-state-icon">
                                                        <lightning-icon icon-name="utility:settings" size="small"></lightning-icon>
                                                    </div>
                                                    <div class="state-card-content">
                                                        <p class="state-card-primary-text">No assignment rules configured yet</p>
                                                        <p class="state-card-secondary-text">Set up criteria-based assignment in Tribal to automatically assign this list to matching leads.</p>
                                                    </div>
                                                </div>
                                            </template>
                                        </template>

                                        <!-- Conflict Warning (shown for all states if conflicts exist) -->
                                        <template if:true={hasConflicts}>
                                            <div class="conflict-warning-banner">
                                                <lightning-icon icon-name="utility:error" size="small" variant="error"></lightning-icon>
                                                <div class="conflict-warning-content">
                                                    <p class="conflict-warning-title">Assignment Rule Conflict Detected</p>
                                                    <p class="conflict-warning-text">This list has conflicting assignment criteria with other active lists.</p>
                                                    <button class="view-conflicts-button" onclick={handleViewConflicts}>
                                                        View Conflicts
                                                    </button>
                                                </div>
                                            </div>
                                        </template>

                                        <!-- Admin handoff: copy list details + a proposed-criteria
                                             template to clipboard so non-admin users can email/Slack
                                             their Salesforce admin with everything needed. -->
                                        <div class="admin-handoff">
                                            <button class="admin-handoff-button"
                                                    onclick={handleCopyAdminRequest}
                                                    title="Copy list details with a template for proposed assignment criteria">
                                                <lightning-icon icon-name={adminHandoffIcon} size="xx-small"></lightning-icon>
                                                <span>{adminHandoffLabel}</span>
                                            </button>
                                            <p class="admin-handoff-hint">Pastes into email, Slack, or a ticket for your Salesforce admin. Includes list details with space for your proposed criteria.</p>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>

                        <!-- Scoring Guide Card -->
                        <div class="scoring-guide-section" data-tour="scoring-guide">
                            <div class="scoring-guide-card">
                                <div class="scoring-guide-header">
                                    <div>
                                        <h3 class="slds-text-heading_small slds-m-bottom_xx-small">Scoring Guide</h3>
                                        <p class="scoring-guide-subtitle">Configure how leads are classified by score</p>
                                    </div>
                                    <div class="scoring-guide-actions">
                                        <template if:false={isScoringGuideEditing}>
                                            <button class="edit-guide-button" onclick={handleEditScoringGuide} title="Edit Scoring Guide" data-tour="scoring-edit-button">
                                                <lightning-icon icon-name="utility:edit" size="xx-small"></lightning-icon>
                                                <span>Edit</span>
                                            </button>
                                        </template>
                                        <template if:true={isScoringGuideEditing}>
                                            <div class="edit-actions">
                                                <button class="action-button cancel-button" onclick={handleCancelScoringGuideEdit}>
                                                    Cancel
                                                </button>
                                                <button class="action-button save-button" onclick={handleSaveScoringGuide} data-tour="scoring-edit-save">
                                                    <lightning-icon icon-name="utility:check" size="xx-small"></lightning-icon>
                                                    <span>Save Changes</span>
                                                </button>
                                            </div>
                                        </template>
                                    </div>
                                </div>

                                <!-- Validation Error -->
                                <template if:true={isScoringGuideEditing}>
                                    <template if:false={isScoringGuideValid}>
                                        <div class="validation-error-banner">
                                            <lightning-icon icon-name="utility:error" size="x-small" variant="error"></lightning-icon>
                                            <span>{scoringGuideValidationMessage}</span>
                                        </div>
                                    </template>
                                </template>

                                <!-- Display Mode -->
                                <template if:false={isScoringGuideEditing}>
                                    <div class="slds-grid slds-wrap slds-gutters_x-small scoring-tiers-grid">
                                        <template for:each={scoringTiers} for:item="tier">
                                            <div key={tier.key} class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
                                                <div class={tier.cssClass}>
                                                    <div class="tier-header">
                                                        <lightning-icon icon-name={tier.icon} size="x-small" variant={tier.color}></lightning-icon>
                                                        <span class="tier-label">{tier.label}</span>
                                                    </div>
                                                    <div class="tier-threshold">{tier.threshold}+ points</div>
                                                    <div class="tier-recommendation">{tier.recommendation}</div>
                                                </div>
                                            </div>
                                        </template>
                                    </div>
                                </template>

                                <!-- Edit Mode -->
                                <template if:true={isScoringGuideEditing}>
                                    <div class="scoring-guide-edit-mode">

                                        <!-- High Quality Tier -->
                                        <div class="tier-edit-card tier-edit-high">
                                            <div class="tier-edit-header">
                                                <lightning-icon icon-name="utility:success" size="x-small" variant="success"></lightning-icon>
                                                <span class="tier-edit-title">High Quality</span>
                                            </div>
                                            <div class="tier-edit-body">
                                                <div class="tier-edit-row">
                                                    <div class="tier-edit-field" data-tour="scoring-edit-high-min">
                                                        <label class="tier-field-label">Minimum Score</label>
                                                        <lightning-input
                                                            type="number"
                                                            value={scoringGuideForm.highQualityThreshold}
                                                            data-field="highQualityThreshold"
                                                            onchange={handleScoringGuideFieldChange}
                                                            variant="label-hidden"
                                                            min="1"
                                                            class="tier-input">
                                                        </lightning-input>
                                                    </div>
                                                    <div class="tier-edit-field flex-grow" data-tour="scoring-edit-high-label">
                                                        <label class="tier-field-label">Display Label</label>
                                                        <lightning-input
                                                            value={scoringGuideForm.highQualityLabel}
                                                            data-field="highQualityLabel"
                                                            onchange={handleScoringGuideFieldChange}
                                                            variant="label-hidden"
                                                            placeholder="e.g., Hot Lead"
                                                            class="tier-input">
                                                        </lightning-input>
                                                    </div>
                                                </div>
                                                <div class="tier-edit-row">
                                                    <div class="tier-edit-field full-width" data-tour="scoring-edit-high-reco">
                                                        <label class="tier-field-label">Recommendation</label>
                                                        <lightning-input
                                                            value={scoringGuideForm.highQualityRecommendation}
                                                            data-field="highQualityRecommendation"
                                                            onchange={handleScoringGuideFieldChange}
                                                            variant="label-hidden"
                                                            placeholder="e.g., Convert to Opportunity Immediately"
                                                            class="tier-input">
                                                        </lightning-input>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        <!-- Medium Quality Tier -->
                                        <div class="tier-edit-card tier-edit-medium">
                                            <div class="tier-edit-header">
                                                <lightning-icon icon-name="utility:warning" size="x-small" variant="warning"></lightning-icon>
                                                <span class="tier-edit-title">Medium Quality</span>
                                            </div>
                                            <div class="tier-edit-body">
                                                <div class="tier-edit-row">
                                                    <div class="tier-edit-field">
                                                        <label class="tier-field-label">Minimum Score</label>
                                                        <lightning-input
                                                            type="number"
                                                            value={scoringGuideForm.mediumQualityThreshold}
                                                            data-field="mediumQualityThreshold"
                                                            onchange={handleScoringGuideFieldChange}
                                                            variant="label-hidden"
                                                            min="0"
                                                            class="tier-input">
                                                        </lightning-input>
                                                    </div>
                                                    <div class="tier-edit-field flex-grow">
                                                        <label class="tier-field-label">Display Label</label>
                                                        <lightning-input
                                                            value={scoringGuideForm.mediumQualityLabel}
                                                            data-field="mediumQualityLabel"
                                                            onchange={handleScoringGuideFieldChange}
                                                            variant="label-hidden"
                                                            placeholder="e.g., Warm Lead"
                                                            class="tier-input">
                                                        </lightning-input>
                                                    </div>
                                                </div>
                                                <div class="tier-edit-row">
                                                    <div class="tier-edit-field full-width">
                                                        <label class="tier-field-label">Recommendation</label>
                                                        <lightning-input
                                                            value={scoringGuideForm.mediumQualityRecommendation}
                                                            data-field="mediumQualityRecommendation"
                                                            onchange={handleScoringGuideFieldChange}
                                                            variant="label-hidden"
                                                            placeholder="e.g., Review with Manager Before Converting"
                                                            class="tier-input">
                                                        </lightning-input>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        <!-- Low Quality Tier -->
                                        <div class="tier-edit-card tier-edit-low" data-tour="scoring-edit-low-tier">
                                            <div class="tier-edit-header">
                                                <lightning-icon icon-name="utility:error" size="x-small" variant="error"></lightning-icon>
                                                <span class="tier-edit-title">Low Quality</span>
                                            </div>
                                            <div class="tier-edit-body">
                                                <div class="tier-edit-note">
                                                    Applies to leads scoring below the Medium threshold
                                                </div>
                                                <div class="tier-edit-row">
                                                    <div class="tier-edit-field flex-grow">
                                                        <label class="tier-field-label">Display Label</label>
                                                        <lightning-input
                                                            value={scoringGuideForm.lowQualityLabel}
                                                            data-field="lowQualityLabel"
                                                            onchange={handleScoringGuideFieldChange}
                                                            variant="label-hidden"
                                                            placeholder="e.g., Cold Lead"
                                                            class="tier-input">
                                                        </lightning-input>
                                                    </div>
                                                    <div class="tier-edit-field flex-grow">
                                                        <label class="tier-field-label">Recommendation</label>
                                                        <lightning-input
                                                            value={scoringGuideForm.lowQualityRecommendation}
                                                            data-field="lowQualityRecommendation"
                                                            onchange={handleScoringGuideFieldChange}
                                                            variant="label-hidden"
                                                            placeholder="e.g., Nurture or Disqualify"
                                                            class="tier-input">
                                                        </lightning-input>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        <!-- Help Text -->
                                        <div class="scoring-guide-help">
                                            <lightning-icon icon-name="utility:info" size="x-small"></lightning-icon>
                                            <span>High threshold must be greater than Medium threshold. Changes are saved to this question list only.</span>
                                        </div>

                                    </div>
                                </template>
                            </div>
                        </div>

                        <!-- Active Question Overview -->
                        <div class="active-question-overview-section" data-tour="questions-overview">
                            <div class="overview-header">
                                <h3 class="overview-title">Active Question Overview</h3>
                                <p class="overview-subtitle">Summary of currently active questions in this list</p>
                            </div>
                            <div class="question-metrics-bar">
                                <div class="question-metric-card">
                                    <div class="metric-icon-container metric-icon-success">
                                        <lightning-icon icon-name="utility:check" size="x-small"></lightning-icon>
                                    </div>
                                    <div class="metric-content">
                                        <div class="metric-stat-value">{selectedList.activeQuestions}</div>
                                        <div class="metric-stat-label">Active Questions</div>
                                    </div>
                                </div>
                                <div class="question-metric-card">
                                    <div class="metric-icon-container metric-icon-primary">
                                        <lightning-icon icon-name="utility:chart" size="x-small"></lightning-icon>
                                    </div>
                                    <div class="metric-content">
                                        <div class="metric-stat-value">{totalActivePoints}</div>
                                        <div class="metric-stat-label">Active Points</div>
                                    </div>
                                </div>
                                <div class="question-metric-card">
                                    <div class="metric-icon-container metric-icon-warning">
                                        <lightning-icon icon-name="utility:warning" size="x-small"></lightning-icon>
                                    </div>
                                    <div class="metric-content">
                                        <div class="metric-stat-value">{activeDealbreakers}</div>
                                        <div class="metric-stat-label">Active Dealbreakers</div>
                                    </div>
                                </div>
                                <div class="question-metric-card">
                                    <div class="metric-icon-container metric-icon-info">
                                        <lightning-icon icon-name="utility:target" size="x-small"></lightning-icon>
                                    </div>
                                    <div class="metric-content">
                                        <div class="metric-stat-value">{avgPointsPerQuestion}</div>
                                        <div class="metric-stat-label">Avg Points</div>
                                    </div>
                                </div>
                            </div>

                            <!-- Empty State CTA - Inline -->
                            <template if:false={hasQuestions}>
                                <div class="overview-empty-state">
                                    <p class="overview-empty-text">This list is ready — add questions to start qualifying leads.</p>
                                    <button class="empty-state-cta-button" onclick={handleNewQuestion}>
                                        <span class="empty-state-button-plus">+</span>
                                        Add Your First Question
                                    </button>
                                </div>
                            </template>
                        </div>

                        <!-- Questions Table -->
                        <template if:true={hasQuestions}>
                            <!-- Mobile-only card view of questions (hidden on desktop via CSS) -->
                            <ul class="question-card-list">
                                <template for:each={displayQuestions} for:item="question">
                                    <li key={question.questionId}
                                        class={question.cardClass}
                                        data-question-id={question.questionId}>
                                        <div class="qcard-top">
                                            <span class={question.numberBadgeClass}>{question.displayOrderText}</span>
                                            <div class="qcard-text">{question.questionText}</div>
                                            <div class="qcard-actions">
                                                <button class="action-icon-button"
                                                    data-question-id={question.questionId}
                                                    onclick={handleEditQuestion}
                                                    title="Edit" aria-label="Edit question">
                                                    <lightning-icon icon-name="utility:edit" size="xx-small"></lightning-icon>
                                                </button>
                                                <button class="action-icon-button"
                                                    data-question-id={question.questionId}
                                                    onclick={handleDeleteQuestion}
                                                    title="Delete" aria-label="Delete question">
                                                    <lightning-icon icon-name="utility:delete" size="xx-small"></lightning-icon>
                                                </button>
                                            </div>
                                        </div>
                                        <div class="qcard-meta">
                                            <span class="qcard-chip qcard-chip-points">
                                                <strong>{question.scoreValue}</strong>
                                                <span>pt</span>
                                            </span>
                                            <template if:true={question.pointEarningAnswer}>
                                                <span class="qcard-chip qcard-chip-answer">
                                                    Points on: {question.pointEarningAnswer}
                                                </span>
                                            </template>
                                            <template if:true={question.isDealbreaker}>
                                                <span class="qcard-chip qcard-chip-dealbreaker">
                                                    Dealbreaker: {question.dealbreakerValue}
                                                </span>
                                            </template>
                                            <template if:false={question.isActive}>
                                                <span class="qcard-chip qcard-chip-inactive">Inactive</span>
                                            </template>
                                        </div>
                                    </li>
                                </template>
                                <li class="question-card-add" onclick={handleNewQuestion}>
                                    <div class="add-question-icon-container">
                                        <lightning-icon icon-name="utility:add" size="x-small"></lightning-icon>
                                    </div>
                                    <div class="add-question-row-content">
                                        <span class="add-question-row-text">Add New Question</span>
                                        <span class="add-question-row-hint">Tap to create a new question</span>
                                    </div>
                                </li>
                            </ul>

                            <div class="questions-table-container">
                                <table class="questions-table">
                                    <thead>
                                        <tr>
                                            <th class="table-header-cell table-col-drag"></th>
                                            <th class="table-header-cell table-col-num">#</th>
                                            <th class="table-header-cell table-col-text">Question</th>
                                            <th class="table-header-cell table-col-points">Points</th>
                                            <th class="table-header-cell table-col-answer">Point Answer</th>
                                            <th class="table-header-cell table-col-dealbreaker">Dealbreaker</th>
                                            <th class="table-header-cell table-col-active">Active</th>
                                            <th class="table-header-cell table-col-actions">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <template for:each={displayQuestions} for:item="question">
                                            <tr key={question.questionId}
                                                class={question.rowClass}
                                                draggable={question.isDraggable}
                                                data-question-id={question.questionId}
                                                ondragstart={handleDragStart}
                                                ondragover={handleDragOver}
                                                ondragleave={handleDragLeave}
                                                ondragend={handleDragEnd}
                                                ondrop={handleDrop}>
                                                <td class="table-cell table-cell-center">
                                                    <template if:true={question.isDraggable}>
                                                        <div class="drag-handle" title="Drag to reorder">
                                                            <lightning-icon icon-name="utility:drag_and_drop" size="x-small"></lightning-icon>
                                                        </div>
                                                    </template>
                                                </td>
                                                <td class="table-cell table-cell-center">
                                                    <span class={question.numberBadgeClass}>
                                                        {question.displayOrderText}
                                                    </span>
                                                </td>
                                                <td class="table-cell">
                                                    <div class="question-text-cell" title={question.questionText}>
                                                        {question.questionText}
                                                    </div>
                                                </td>
                                                <td class="table-cell table-cell-center">
                                                    <span class="points-badge">{question.scoreValue}</span>
                                                </td>
                                                <td class="table-cell">
                                                    <template if:true={question.pointEarningAnswer}>
                                                        <span class="point-answer-text">✓ {question.pointEarningAnswer}</span>
                                                    </template>
                                                </td>
                                                <td class="table-cell table-cell-center">
                                                    <template if:true={question.isDealbreaker}>
                                                        <span class="dealbreaker-badge">{question.dealbreakerValue}</span>
                                                    </template>
                                                    <template if:false={question.isDealbreaker}>
                                                        <span class="empty-indicator">—</span>
                                                    </template>
                                                </td>
                                                <td class="table-cell table-cell-center">
                                                    <template if:true={question.isActive}>
                                                        <lightning-icon icon-name="utility:check" size="x-small" variant="success" class="status-icon"></lightning-icon>
                                                    </template>
                                                    <template if:false={question.isActive}>
                                                        <lightning-icon icon-name="utility:close" size="x-small" class="status-icon-inactive"></lightning-icon>
                                                    </template>
                                                </td>
                                                <td class="table-cell table-cell-center">
                                                    <div class="action-buttons">
                                                        <button class="action-icon-button"
                                                            data-question-id={question.questionId}
                                                            onclick={handleEditQuestion}
                                                            title="Edit">
                                                            <lightning-icon icon-name="utility:edit" size="xx-small"></lightning-icon>
                                                        </button>
                                                        <button class="action-icon-button"
                                                            data-question-id={question.questionId}
                                                            onclick={handleDeleteQuestion}
                                                            title="Delete">
                                                            <lightning-icon icon-name="utility:delete" size="xx-small"></lightning-icon>
                                                        </button>
                                                    </div>
                                                </td>
                                            </tr>
                                        </template>
                                        <!-- Add Question Row - Always visible as last row -->
                                        <tr class="add-question-row" onclick={handleNewQuestion} data-tour="new-question-row">
                                            <td class="table-cell table-cell-center">
                                                <!-- Empty cell for drag handle column -->
                                            </td>
                                            <td class="table-cell table-cell-center">
                                                <div class="add-question-icon-container">
                                                    <lightning-icon icon-name="utility:add" size="x-small"></lightning-icon>
                                                </div>
                                            </td>
                                            <td class="table-cell" colspan="6">
                                                <div class="add-question-row-content">
                                                    <span class="add-question-row-text">Add New Question</span>
                                                    <span class="add-question-row-hint">Click to create a new question for this list</span>
                                                </div>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </template>

                    </div>
                </template>

                <!-- No Selection State.
                     Two flavors, toggled by CSS media queries (no JS viewport
                     sniffing, no flicker):
                       • Desktop / tablet (>768px): sidebar is permanently visible
                         with its own search + list, so a duplicate picker in the
                         detail pane is just noise. We show a minimal pointer that
                         directs attention at the existing sidebar list.
                       • Mobile (≤768px): sidebar is an off-canvas drawer. The
                         empty state is otherwise a dead end, so we show the full
                         inline searchable picker as the primary selection UI. -->
                <template if:false={hasSelectedList}>
                    <div class="detail-panel empty-detail-panel">
                        <!-- Desktop / tablet hint: just point at the sidebar. -->
                        <div class="empty-state-sidebar-hint">
                            <lightning-icon icon-name="utility:einstein" size="medium" class="empty-state-sidebar-hint-icon" alternative-text=""></lightning-icon>
                            <h2 class="empty-state-sidebar-hint-title">Select a Question List</h2>
                            <p class="empty-state-sidebar-hint-subtext">
                                <span class="empty-state-sidebar-hint-arrow" aria-hidden="true">←</span>
                                Pick a list from the panel on the left to manage its questions, scoring, and assignment rules.
                            </p>
                        </div>

                        <!-- Mobile picker: search + scrollable list. -->
                        <div class="empty-state-picker">
                            <div class="empty-state-picker-heading">
                                <lightning-icon icon-name="utility:einstein" size="medium" class="empty-state-picker-icon" alternative-text=""></lightning-icon>
                                <h2 class="empty-state-picker-title">Select a Question List</h2>
                                <p class="empty-state-picker-subtext">Pick a list to manage its questions, scoring, and assignment rules.</p>
                            </div>
                            <div class="empty-state-picker-searchbox">
                                <lightning-input type="search"
                                    label="Search your question lists"
                                    variant="label-hidden"
                                    value={searchTerm}
                                    onchange={handleSearchChange}
                                    placeholder="Search your question lists..."
                                    class="empty-state-picker-search">
                                </lightning-input>
                            </div>
                            <template if:true={hasFilteredLists}>
                                <ul class="empty-state-picker-list" role="listbox" aria-label="Your question lists">
                                    <template for:each={emptyStatePickerLists} for:item="list">
                                        <li key={list.listId}
                                            class="empty-state-picker-item"
                                            data-list-id={list.listId}
                                            role="option"
                                            tabindex="0"
                                            onclick={handleSelectList}
                                            onkeydown={handleEmptyStatePickerKeydown}>
                                            <div class="empty-state-picker-item-text">
                                                <div class="empty-state-picker-item-header">
                                                    <span class="empty-state-picker-item-name">{list.listName}</span>
                                                    <template if:true={list.isActive}>
                                                        <span class="list-item-badge list-item-badge--active" title="Active">
                                                            <span class="list-item-badge-dot" aria-hidden="true"></span>Active
                                                        </span>
                                                    </template>
                                                    <template if:false={list.isActive}>
                                                        <span class="list-item-badge list-item-badge--inactive" title="Inactive">
                                                            <span class="list-item-badge-dot" aria-hidden="true"></span>Inactive
                                                        </span>
                                                    </template>
                                                </div>
                                                <div class="empty-state-picker-item-meta">
                                                    <span>{list.totalQuestions} questions</span>
                                                    <span class="empty-state-picker-item-sep">•</span>
                                                    <span>{list.totalPossiblePoints} pts</span>
                                                </div>
                                                <template if:true={list.description}>
                                                    <p class="empty-state-picker-item-description">{list.description}</p>
                                                </template>
                                            </div>
                                            <lightning-icon icon-name="utility:chevronright" size="xx-small" alternative-text="" class="empty-state-picker-item-chevron"></lightning-icon>
                                        </li>
                                    </template>
                                </ul>
                            </template>
                            <template if:false={hasFilteredLists}>
                                <div class="empty-state-picker-no-match">
                                    <lightning-icon icon-name="utility:search" size="small" alternative-text=""></lightning-icon>
                                    <p>No lists match <strong>"{searchTerm}"</strong></p>
                                    <button class="empty-state-picker-clear" onclick={handleClearEmptyStateSearch}>Clear search</button>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
                </div>

            </div>
            <!-- Mobile drawer backdrop -->
            <div class="mobile-drawer-backdrop" onclick={handleCloseMobileList} aria-hidden="true"></div>
            </template>
        </div>

        <!-- List Modal -->
        <template if:true={showListModal}>
            <section role="dialog" tabindex="-1" aria-modal="true" aria-labelledby="lqw-list-modal-title" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container custom-modal-container">
                    <header class="slds-modal__header custom-modal-header">
                        <lightning-icon icon-name="utility:list" size="small"></lightning-icon>
                        <h2 id="lqw-list-modal-title" class="slds-modal__title slds-hyphenate">{listModalTitle}</h2>
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={handleCloseListModal}>
                            <lightning-icon icon-name="utility:close" alternative-text="close" size="small"></lightning-icon>
                        </button>
                    </header>
                    <div class="slds-modal__content custom-modal-body" data-tour="list-modal-body">
                        <!-- Basic Information Section -->
                        <div class="modal-section" data-tour="list-modal-basic">
                            <div class="modal-section-header">
                                <lightning-icon icon-name="utility:info" size="x-small"></lightning-icon>
                                <h3 class="modal-section-title">Basic Information</h3>
                            </div>
                            <lightning-input
                                label="List Name"
                                value={listFormData.listName}
                                data-field="listName"
                                data-tour="list-modal-name"
                                onchange={handleListFieldChange}
                                required>
                            </lightning-input>
                            <lightning-textarea
                                label="Description"
                                value={listFormData.description}
                                data-field="description"
                                onchange={handleListFieldChange}>
                            </lightning-textarea>
                        </div>

                        <!-- Threshold Configuration Section -->
                        <div class="modal-section">
                            <div class="modal-section-header">
                                <lightning-icon icon-name="utility:chart" size="x-small"></lightning-icon>
                                <h3 class="modal-section-title">Quality Thresholds</h3>
                            </div>
                            <p class="modal-section-description">Configure scoring thresholds and labels for lead quality classification</p>

                            <!-- Validation Message -->
                            <template if:false={isThresholdValid}>
                                <div class="slds-box slds-theme_error slds-m-bottom_small">
                                    <lightning-icon icon-name="utility:error" size="x-small" variant="error" class="slds-m-right_x-small"></lightning-icon>
                                    {thresholdValidationMessage}
                                </div>
                            </template>

                            <!-- High Quality Tier -->
                            <div class="threshold-tier-card tier-high-config slds-m-bottom_small" data-tour="list-modal-high-tier">
                                <h4 class="slds-text-heading_small slds-m-bottom_x-small">🟢 High Quality Tier</h4>
                                <div class="slds-grid slds-wrap slds-gutters_small">
                                    <div class="slds-col slds-size_1-of-2">
                                        <lightning-input
                                            type="number"
                                            label="Minimum Points"
                                            value={listFormData.highQualityThreshold}
                                            data-field="highQualityThreshold"
                                            onchange={handleListFieldChange}
                                            min="1"
                                            required>
                                        </lightning-input>
                                    </div>
                                    <div class="slds-col slds-size_1-of-2">
                                        <lightning-input
                                            label="Display Label"
                                            value={listFormData.highQualityLabel}
                                            data-field="highQualityLabel"
                                            onchange={handleListFieldChange}
                                            placeholder="e.g., Hot Lead"
                                            required>
                                        </lightning-input>
                                    </div>
                                    <div class="slds-col slds-size_1-of-1">
                                        <lightning-input
                                            label="Recommended Action"
                                            value={listFormData.highQualityRecommendation}
                                            data-field="highQualityRecommendation"
                                            onchange={handleListFieldChange}
                                            placeholder="e.g., Convert to Opportunity Immediately"
                                            required>
                                        </lightning-input>
                                    </div>
                                </div>
                            </div>

                            <!-- Medium Quality Tier -->
                            <div class="threshold-tier-card tier-medium-config slds-m-bottom_small" data-tour="list-modal-medium-tier">
                                <h4 class="slds-text-heading_small slds-m-bottom_x-small">🟡 Medium Quality Tier</h4>
                                <div class="slds-grid slds-wrap slds-gutters_small">
                                    <div class="slds-col slds-size_1-of-2">
                                        <lightning-input
                                            type="number"
                                            label="Minimum Points"
                                            value={listFormData.mediumQualityThreshold}
                                            data-field="mediumQualityThreshold"
                                            onchange={handleListFieldChange}
                                            min="0"
                                            required>
                                        </lightning-input>
                                    </div>
                                    <div class="slds-col slds-size_1-of-2">
                                        <lightning-input
                                            label="Display Label"
                                            value={listFormData.mediumQualityLabel}
                                            data-field="mediumQualityLabel"
                                            onchange={handleListFieldChange}
                                            placeholder="e.g., Warm Lead"
                                            required>
                                        </lightning-input>
                                    </div>
                                    <div class="slds-col slds-size_1-of-1">
                                        <lightning-input
                                            label="Recommended Action"
                                            value={listFormData.mediumQualityRecommendation}
                                            data-field="mediumQualityRecommendation"
                                            onchange={handleListFieldChange}
                                            placeholder="e.g., Review with Manager Before Converting"
                                            required>
                                        </lightning-input>
                                    </div>
                                </div>
                            </div>

                            <!-- Low Quality Tier -->
                            <div class="threshold-tier-card tier-low-config slds-m-bottom_small" data-tour="list-modal-low-tier">
                                <h4 class="slds-text-heading_small slds-m-bottom_x-small">🔴 Low Quality Tier</h4>
                                <p class="slds-text-body_small slds-text-color_weak slds-m-bottom_x-small">Applies to leads scoring below the Medium threshold (0 points)</p>
                                <div class="slds-grid slds-wrap slds-gutters_small">
                                    <div class="slds-col slds-size_1-of-2">
                                        <lightning-input
                                            label="Display Label"
                                            value={listFormData.lowQualityLabel}
                                            data-field="lowQualityLabel"
                                            onchange={handleListFieldChange}
                                            placeholder="e.g., Cold Lead"
                                            required>
                                        </lightning-input>
                                    </div>
                                    <div class="slds-col slds-size_1-of-2">
                                        <lightning-input
                                            label="Recommended Action"
                                            value={listFormData.lowQualityRecommendation}
                                            data-field="lowQualityRecommendation"
                                            onchange={handleListFieldChange}
                                            placeholder="e.g., Nurture or Disqualify"
                                            required>
                                        </lightning-input>
                                    </div>
                                </div>
                            </div>

                            <!-- Help Text -->
                            <div class="slds-box slds-theme_info slds-m-top_small">
                                <lightning-icon icon-name="utility:info" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                                <span class="slds-text-body_small">
                                    Thresholds determine how leads are classified based on their qualification score.
                                    High threshold must be greater than Medium threshold.
                                </span>
                            </div>
                        </div>
                    </div>
                    <footer class="slds-modal__footer custom-modal-footer">
                        <lightning-button label="Cancel" onclick={handleCloseListModal} class="modal-footer-cancel"></lightning-button>
                        <lightning-button variant="brand" label="Save" onclick={handleSaveList} class="modal-footer-save" data-tour="list-modal-save"></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <!-- Question Modal -->
        <template if:true={showQuestionModal}>
            <section role="dialog" tabindex="-1" aria-modal="true" aria-labelledby="lqw-question-modal-title" class="slds-modal slds-fade-in-open slds-modal_large">
                <div class="slds-modal__container custom-modal-container">
                    <header class="slds-modal__header custom-modal-header">
                        <lightning-icon icon-name="utility:questions_and_answers" size="small"></lightning-icon>
                        <h2 id="lqw-question-modal-title" class="slds-modal__title slds-hyphenate">{questionModalTitle}</h2>
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={handleCloseQuestionModal}>
                            <lightning-icon icon-name="utility:close" alternative-text="close" size="small"></lightning-icon>
                        </button>
                    </header>
                    <div class="slds-modal__content custom-modal-body">
                        <!-- Question Details Section -->
                        <div class="modal-section">
                            <div class="modal-section-header">
                                <lightning-icon icon-name="utility:text" size="x-small"></lightning-icon>
                                <h3 class="modal-section-title">Question Details</h3>
                            </div>
                            <div class="slds-grid slds-wrap slds-gutters">
                                <div class="slds-col slds-size_1-of-1" data-tour="question-modal-text">
                                    <lightning-textarea
                                        label="Question Text"
                                        value={questionFormData.questionText}
                                        data-field="questionText"
                                        onchange={handleQuestionFieldChange}
                                        required>
                                    </lightning-textarea>
                                </div>
                                <div class="slds-col slds-size_1-of-1" data-tour="question-modal-score">
                                    <lightning-input
                                        type="number"
                                        label="Score Value"
                                        value={questionFormData.scoreValue}
                                        data-field="scoreValue"
                                        onchange={handleQuestionFieldChange}
                                        min="0"
                                        required>
                                    </lightning-input>
                                </div>
                            </div>
                        </div>

                        <!-- Behavior Settings Section -->
                        <div class="modal-section">
                            <div class="modal-section-header">
                                <lightning-icon icon-name="utility:settings" size="x-small"></lightning-icon>
                                <h3 class="modal-section-title">Behavior Settings</h3>
                            </div>

                            <!-- Row 1: Point Earning Answer and Active -->
                            <div class="slds-grid slds-wrap slds-gutters behavior-settings-row">
                                <div class="slds-col slds-size_1-of-2" data-tour="question-modal-earning">
                                    <lightning-combobox
                                        label="Point Earning Answer"
                                        value={questionFormData.pointEarningAnswer}
                                        placeholder="Select answer type"
                                        options={pointEarningAnswerOptions}
                                        data-field="pointEarningAnswer"
                                        onchange={handleQuestionFieldChange}>
                                    </lightning-combobox>
                                </div>
                                <div class="slds-col slds-size_1-of-2 active-checkbox-col" data-tour="question-modal-active">
                                    <lightning-input
                                        type="checkbox"
                                        label="Active"
                                        checked={questionFormData.isActive}
                                        data-field="isActive"
                                        onchange={handleQuestionFieldChange}>
                                    </lightning-input>
                                </div>
                            </div>

                            <!-- Dealbreaker Configuration Sub-Card -->
                            <div class="dealbreaker-config-card" data-tour="question-modal-dealbreaker">
                                <div class="dealbreaker-config-header">
                                    <lightning-icon icon-name="utility:warning" size="x-small"></lightning-icon>
                                    <h4 class="dealbreaker-config-title">Dealbreaker Configuration</h4>
                                </div>
                                <p class="dealbreaker-helper-text">When enabled, a specific answer will auto-disqualify the lead</p>
                                <div class="slds-grid slds-wrap slds-gutters">
                                    <div class="slds-col slds-size_1-of-1">
                                        <lightning-input
                                            type="checkbox"
                                            label="Is Dealbreaker"
                                            checked={questionFormData.isDealbreaker}
                                            data-field="isDealbreaker"
                                            onchange={handleQuestionFieldChange}>
                                        </lightning-input>
                                    </div>
                                    <template if:true={questionFormData.isDealbreaker}>
                                        <div class="slds-col slds-size_1-of-1" data-tour="question-modal-dealbreaker-value">
                                            <lightning-combobox
                                                label="Dealbreaker Value"
                                                value={questionFormData.dealbreakerValue}
                                                placeholder="Select dealbreaker answer"
                                                options={dealbreakerValueOptions}
                                                data-field="dealbreakerValue"
                                                onchange={handleQuestionFieldChange}>
                                            </lightning-combobox>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </div>
                    <footer class="slds-modal__footer custom-modal-footer">
                        <lightning-button label="Cancel" onclick={handleCloseQuestionModal} class="modal-footer-cancel"></lightning-button>
                        <lightning-button variant="brand" label="Save" onclick={handleSaveQuestion} class="modal-footer-save" data-tour="question-modal-save"></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <!-- Clone Modal -->
        <template if:true={showCloneModal}>
            <section role="dialog" tabindex="-1" aria-modal="true" aria-labelledby="lqw-clone-modal-title" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container custom-modal-container">
                    <header class="slds-modal__header custom-modal-header">
                        <lightning-icon icon-name="utility:copy" size="small"></lightning-icon>
                        <h2 id="lqw-clone-modal-title" class="slds-modal__title slds-hyphenate">Clone Question List</h2>
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={handleCloseCloneModal}>
