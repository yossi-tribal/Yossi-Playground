                            <lightning-icon icon-name="utility:close" alternative-text="close" size="small"></lightning-icon>
                        </button>
                    </header>
                    <div class="slds-modal__content custom-modal-body">
                        <p class="modal-section-description">
                            Create a complete copy of this question list, including all questions, scoring thresholds, and configuration settings.
                            The new list will be independent and can be customized separately.
                        </p>
                        <lightning-input
                            label="New List Name"
                            value={cloneListName}
                            onchange={handleCloneNameChange}
                            required>
                        </lightning-input>
                    </div>
                    <footer class="slds-modal__footer custom-modal-footer">
                        <lightning-button label="Cancel" onclick={handleCloseCloneModal} class="modal-footer-cancel"></lightning-button>
                        <lightning-button variant="brand" label="Clone" onclick={handleSaveClone} class="modal-footer-save"></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <!-- Conflict Modal -->
        <template if:true={showConflictModal}>
            <section role="dialog" tabindex="-1" aria-modal="true" aria-labelledby="lqw-conflict-modal-title" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container conflict-modal-container">
                    <header class="slds-modal__header conflict-modal-header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={handleCloseConflictModal}>
                            <lightning-icon icon-name="utility:close" alternative-text="close" size="small"></lightning-icon>
                        </button>
                        <div class="conflict-modal-header-content">
                            <lightning-icon icon-name="utility:error" size="medium" variant="error" class="conflict-modal-icon"></lightning-icon>
                            <h2 id="lqw-conflict-modal-title" class="slds-modal__title slds-hyphenate">Assignment Rule Conflicts</h2>
                        </div>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium conflict-modal-content">
                        <p class="conflict-modal-description">
                            The following question lists have overlapping assignment criteria. When a lead matches multiple lists,
                            the system behavior may be unpredictable. Please review and update your assignment rules to avoid conflicts.
                        </p>

                        <template if:true={hasDetectedConflicts}>
                            <div class="conflict-list">
                                <template for:each={conflictList} for:item="conflict">
                                    <div key={conflict.key} class="conflict-item">
                                        <div class="conflict-item-header">
                                            <lightning-icon icon-name="utility:warning" size="x-small" variant="warning"></lightning-icon>
                                            <span class="conflict-item-title">Conflict #{conflict.index}</span>
                                        </div>
                                        <div class="conflict-item-body">
                                            <div class="conflict-list-pair">
                                                <div class="conflict-list-name">
                                                    <lightning-icon icon-name="utility:list" size="x-small" alternative-text=""></lightning-icon>
                                                    <span>{conflict.list1Name}</span>
                                                </div>
                                                <lightning-icon icon-name="utility:sync" size="x-small" class="conflict-sync-icon"></lightning-icon>
                                                <div class="conflict-list-name">
                                                    <lightning-icon icon-name="utility:list" size="x-small" alternative-text=""></lightning-icon>
                                                    <span>{conflict.list2Name}</span>
                                                </div>
                                            </div>
                                            <p class="conflict-description">{conflict.conflictDescription}</p>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </template>

                        <div class="conflict-resolution-note">
                            <lightning-icon icon-name="utility:info" size="small" class="conflict-info-icon"></lightning-icon>
                            <div>
                                <p class="resolution-note-title">How to Resolve</p>
                                <p class="resolution-note-text">
                                    Navigate to the Tribal configuration panel to review and adjust assignment criteria.
                                    Ensure that each list has unique, non-overlapping criteria, or designate one list as the default fallback.
                                </p>
                            </div>
                        </div>
                    </div>
                    <footer class="slds-modal__footer conflict-modal-footer">
                        <lightning-button label="Close" onclick={handleCloseConflictModal}></lightning-button>
                        <lightning-button variant="brand" label="Configure in Tribal" onclick={handleConfigureInTribal} icon-name="utility:new_window" icon-position="right"></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <!-- Onboarding coach: overlay walkthrough engine. Tours + targets are
             defined in tours.js; host JS wires the resolver + auto-start.
             Only mounts once at least one Question List exists — the welcome
             state has nothing to walk through. -->
        <template if:true={hasQuestionLists}>
            <c-onboarding-coach
                lwc:ref="coach"
                class="manager-coach"
                component-name="questionListManager"
                user-id={currentUserId}
                tours={tours}
                oncomplete={handleTourComplete}
                onskip={handleTourSkip}
            ></c-onboarding-coach>
        </template>

        <!-- Watermark -->
        <div class="tribal-watermark">Made by Tribal</div>
    </div>
</template>
