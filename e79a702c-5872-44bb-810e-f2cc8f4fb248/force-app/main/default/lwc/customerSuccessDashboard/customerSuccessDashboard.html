<template>
    <lightning-card class="dashboard-card">
        <div slot="title" class="dashboard-header">
            <div class="dashboard-header-main">
                <lightning-icon icon-name="standard:account" size="small" class="header-icon"></lightning-icon>
                <div class="dashboard-header-titles">
                    <h2 class="dashboard-title">Customer Success Dashboard</h2>
                    <template if:true={hasSummary}>
                        <p class="dashboard-header-csm">CSM: {csmDisplayName}</p>
                    </template>
                </div>
            </div>
        </div>
        <div slot="actions">
            <lightning-button-icon
                icon-name="utility:refresh"
                variant="border-filled"
                alternative-text="Refresh"
                title="Refresh Dashboard"
                onclick={handleRefresh}
                class="refresh-button">
            </lightning-button-icon>
        </div>

        <!-- Loading Spinner -->
        <template if:true={isLoading}>
            <div class="loading-container">
                <lightning-spinner alternative-text="Loading dashboard..." size="medium"></lightning-spinner>
            </div>
        </template>

        <!-- Main Dashboard Content -->
        <template if:false={isLoading}>
            <div class="dashboard-content">

                <!-- Premium 3-Zone Header Layout -->
                <template if:true={hasSummary}>
                    <div class="premium-header">

                        <!-- ZONE 1: Hero Health Score Card -->
                        <div class="hero-card-container grid-area-health">
                            <div class={heroCardClass}>
                                <div class="hero-label">HEALTH SCORE</div>
                                <div class="hero-value">{summary.accountHealthScore}</div>
                                <div class={trendValueClass}>
                                    <span class="trend-arrow">{trendIcon}</span>
                                    {trendText}
                                </div>
                                <div class="hero-updated">Updated 2 hours ago</div>
                                <button class="custom-btn custom-btn--secondary" onclick={handleViewBreakdown}>
                                    View Breakdown
                                </button>
                            </div>
                        </div>

                        <!-- Suggested + Quick Actions (merged column) -->
                        <div class="suggested-actions-container grid-area-actions">
                            <div class="action-section-label">Suggested actions</div>

                            <template if:true={hasSuggestedAction1}>
                                <div class={suggestedAction1Class} onclick={handleSuggestedAction} data-action={suggestedAction1.handler}>
                                    <div class="suggested-action-content">
                                        <div class="suggested-action-main">
                                            <template if:true={suggestedAction1.showBadge}>
                                                <span class={suggestedAction1DotClass}></span>
                                                <span class="suggested-action-urgency-label">{suggestedAction1.badge}</span>
                                            </template>
                                            <span class="suggested-action-text">{suggestedAction1.text}</span>
                                        </div>
                                    </div>
                                </div>
                            </template>

                            <template if:true={hasSuggestedAction2}>
                                <div class={suggestedAction2Class} onclick={handleSuggestedAction} data-action={suggestedAction2.handler}>
                                    <div class="suggested-action-content">
                                        <div class="suggested-action-main">
                                            <template if:true={suggestedAction2.showBadge}>
                                                <span class={suggestedAction2DotClass}></span>
                                                <span class="suggested-action-urgency-label">{suggestedAction2.badge}</span>
                                            </template>
                                            <span class="suggested-action-text">{suggestedAction2.text}</span>
                                        </div>
                                    </div>
                                </div>
                            </template>

                            <template if:true={hasSuggestedAction3}>
                                <div class={suggestedAction3Class} onclick={handleSuggestedAction} data-action={suggestedAction3.handler}>
                                    <div class="suggested-action-content">
                                        <div class="suggested-action-main">
                                            <template if:true={suggestedAction3.showBadge}>
                                                <span class={suggestedAction3DotClass}></span>
                                                <span class="suggested-action-urgency-label">{suggestedAction3.badge}</span>
                                            </template>
                                            <span class="suggested-action-text">{suggestedAction3.text}</span>
                                        </div>
                                    </div>
                                </div>
                            </template>

                            <template if:true={hasSuggestedAction4}>
                                <div class={suggestedAction4Class} onclick={handleSuggestedAction} data-action={suggestedAction4.handler}>
                                    <div class="suggested-action-content">
                                        <div class="suggested-action-main">
                                            <template if:true={suggestedAction4.showBadge}>
                                                <span class={suggestedAction4DotClass}></span>
                                                <span class="suggested-action-urgency-label">{suggestedAction4.badge}</span>
                                            </template>
                                            <span class="suggested-action-text">{suggestedAction4.text}</span>
                                        </div>
                                    </div>
                                </div>
                            </template>

                            <div class="quick-actions-inline">
                                <button type="button" class="quick-action-btn" onclick={handleLogCall} title="Log a Call">
                                    <lightning-icon icon-name="utility:call" size="small"></lightning-icon>
                                    <span class="quick-action-text">Log call</span>
                                </button>
                                <button type="button" class="quick-action-btn" onclick={handleCreateTask} title="Create Task">
                                    <lightning-icon icon-name="utility:task" size="small"></lightning-icon>
                                    <span class="quick-action-text">New task</span>
                                </button>
                                <button type="button" class="quick-action-btn" onclick={handleCreateEvent} title="Schedule Event">
                                    <lightning-icon icon-name="utility:event" size="small"></lightning-icon>
                                    <span class="quick-action-text">Event</span>
                                </button>
                                <button type="button" class="quick-action-btn" onclick={handleCreateCase} title="Create Case">
                                    <lightning-icon icon-name="utility:case" size="small"></lightning-icon>
                                    <span class="quick-action-text">Case</span>
                                </button>
                            </div>
                        </div>

                    </div>
                </template>

                <!-- Stat bar (primary KPIs) -->
                <template if:true={hasSummary}>
                    <div class="stat-bar">
                        <button type="button" class="stat-item stat-item--clickable" onclick={handleMetricClick} data-metric="cases">
                            <span class="stat-dot stat-dot--cases"></span>
                            <span class={statCasesValueClass}>{summary.openCasesCount}</span>
                            <span class="stat-label">Open cases</span>
                            <span class="stat-hint">{statCasesSubtext}</span>
                        </button>
                        <div class="stat-divider" aria-hidden="true"></div>
                        <button type="button" class="stat-item stat-item--clickable" onclick={handleMetricClick} data-metric="tasks">
                            <span class="stat-dot stat-dot--tasks"></span>
                            <span class={statTasksValueClass}>{summary.overdueTasks}</span>
                            <span class="stat-label">Overdue tasks</span>
                            <span class="stat-hint">{statTasksSubtext}</span>
                        </button>
                        <div class="stat-divider" aria-hidden="true"></div>
                        <button type="button" class="stat-item stat-item--clickable" onclick={handleMetricClick} data-metric="opportunities">
                            <span class="stat-dot stat-dot--opps"></span>
                            <span class={statOppsValueClass}>{summary.opportunityCount}</span>
                            <span class="stat-label">Opportunities</span>
                            <span class="stat-hint">{nextOppText}</span>
                        </button>
                    </div>
                </template>

                <!-- Customer Success Snapshot: revenue KPIs, case resolution, case trends, renewal -->
                <template if:true={hasSummary}>
                    <div class={commercialSnapshotClass}>
                        <button
                            type="button"
                            class="commercial-snapshot-head commercial-snapshot-head--toggle"
                            onclick={handleToggleCommercialSnapshot}
                            aria-expanded={commercialSnapshotExpanded}>
                            <div class="commercial-snapshot-head-main">
                                <span class="commercial-snapshot-title">Customer Success Snapshot</span>
                                <span class="commercial-snapshot-hint">Revenue, pipeline, case resolution, support trends, and renewals</span>
                            </div>
                            <lightning-icon
                                icon-name="utility:chevronright"
                                size="small"
                                class="commercial-snapshot-chevron"></lightning-icon>
                        </button>
                        <template if:true={commercialSnapshotExpanded}>
                        <div class="commercial-snapshot-body">
                        <div class="commercial-kpi-row">
                            <button type="button" class="commercial-kpi commercial-kpi--click" onclick={handleCommercialAllTimeClick}>
                                <span class="commercial-kpi-label">All-time won revenue</span>
                                <span class="commercial-kpi-value">
                                    <lightning-formatted-number value={summary.totalWonRevenue} format-style="currency" currency-code={currencyCode}></lightning-formatted-number>
                                </span>
                                <span class="commercial-kpi-sub">Closed-won opportunities</span>
                            </button>
                            <button type="button" class="commercial-kpi commercial-kpi--click" onclick={handleCommercialYtdClick}>
                                <span class="commercial-kpi-label">Won (this year)</span>
                                <span class="commercial-kpi-value">
                                    <lightning-formatted-number value={summary.ytdWonRevenue} format-style="currency" currency-code={currencyCode}></lightning-formatted-number>
                                </span>
                                <span class="commercial-kpi-sub">Calendar year to date</span>
                            </button>
                            <button type="button" class="commercial-kpi commercial-kpi--click" onclick={handleCommercialPriorYearClick}>
                                <span class="commercial-kpi-label">Won (prior year)</span>
                                <span class="commercial-kpi-value">
                                    <lightning-formatted-number value={summary.priorYearWonRevenue} format-style="currency" currency-code={currencyCode}></lightning-formatted-number>
                                </span>
                                <span class="commercial-kpi-sub">Full prior calendar year</span>
                            </button>
                            <button type="button" class="commercial-kpi commercial-kpi--click" onclick={handleCommercialPipelineClick}>
                                <span class="commercial-kpi-label">Open pipeline</span>
                                <span class="commercial-kpi-value">
                                    <lightning-formatted-number value={summary.openPipelineAmount} format-style="currency" currency-code={currencyCode}></lightning-formatted-number>
                                </span>
                                <span class="commercial-kpi-sub">Open opportunities</span>
                            </button>
                            <button type="button" class="commercial-kpi commercial-kpi--click" onclick={handleCommercialWeightedClick}>
                                <span class="commercial-kpi-label">Weighted pipeline</span>
                                <span class="commercial-kpi-value">
                                    <lightning-formatted-number value={summary.weightedPipelineAmount} format-style="currency" currency-code={currencyCode}></lightning-formatted-number>
                                </span>
                                <span class="commercial-kpi-sub">Amount × probability</span>
                            </button>
                            <button type="button" class="commercial-kpi commercial-kpi--click" onclick={handleCommercialRecentCasesClick}>
                                <span class="commercial-kpi-label">Cases (90 days)</span>
                                <span class="commercial-kpi-value commercial-kpi-value--num">{summary.casesOpenedLast90Days}</span>
                                <span class="commercial-kpi-sub">Opened on this account</span>
                            </button>
                            <template if:true={hasUpcomingRenewal}>
                                <button type="button" class={renewalCardClass} onclick={handleCommercialRenewalClick}>
                                    <span class="commercial-kpi-label">Next renewal</span>
                                    <span class="commercial-kpi-value">
                                        <lightning-formatted-number value={nearestRenewalAmount} format-style="currency" currency-code={currencyCode}></lightning-formatted-number>
                                    </span>
                                    <span class={renewalDaysClass}>{renewalSubtitle}</span>
                                </button>
                            </template>
                            <template if:false={hasUpcomingRenewal}>
                                <div class="commercial-kpi">
                                    <span class="commercial-kpi-label">Next renewal</span>
                                    <span class="commercial-kpi-value commercial-kpi-value--muted">—</span>
                                    <span class="commercial-kpi-sub">{renewalSubtitle}</span>
                                </div>
                            </template>
                        </div>

                        <div class="commercial-visuals">
                            <div class="case-resolution">
                                <span class="case-resolution-title">Case resolution (90 days)</span>
                                <template if:true={hasCaseResolutionData}>
                                    <p class="case-resolution-subtitle">{closedCasesSubtitle}</p>
                                    <div class="case-resolution-hero">
                                        <span class="case-resolution-hero-value">{caseResolutionMedianDays}</span>
                                        <span class="case-resolution-hero-unit">days</span>
                                        <span class={resolutionTrendClass} aria-label={resolutionTrendAriaLabel}>
                                            <span class="case-resolution-trend-arrow">{resolutionTrendIcon}</span>
                                            {resolutionTrendText}
                                        </span>
                                    </div>
                                    <div class="case-resolution-supporting">
                                        <div class="case-resolution-supporting-block">
                                            <span class="case-resolution-supporting-label">Fastest</span>
                                            <span class="case-resolution-supporting-value">{caseResolutionMinDays}</span>
                                            <span class="case-resolution-supporting-unit">{minDaysLabel}</span>
                                        </div>
                                        <div class="case-resolution-supporting-block">
                                            <span class="case-resolution-supporting-label">Slowest</span>
                                            <span class="case-resolution-supporting-value">{caseResolutionMaxDays}</span>
                                            <span class="case-resolution-supporting-unit">{maxDaysLabel}</span>
                                        </div>
                                    </div>
                                </template>
                                <template if:false={hasCaseResolutionData}>
                                    <div class="case-resolution-empty">No closed cases in the last 90 days</div>
                                </template>
                            </div>
                            <div class="case-trend-wrap">
                                <span class="case-trend-title">Cases opened (6 months)</span>
                                <div class="case-trend">
                                    <template for:each={caseTrendBars} for:item="cb">
                                        <div key={cb.key} class="case-trend-col">
                                            <button
                                                type="button"
                                                class="case-trend-bar-btn"
                                                data-label={cb.label}
                                                onclick={handleCaseTrendBarClick}
                                                aria-label={cb.ariaLabel}>
                                                <span class="case-trend-bar-count">{cb.count}</span>
                                                <div class="case-trend-bar-track">
                                                    <div class="case-trend-bar-fill" style={cb.barStyle}></div>
                                                </div>
                                            </button>
                                            <span class="case-trend-label">{cb.label}</span>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>
                        </div>
                        </template>
                    </div>
                </template>

                <!-- Detail sections (accordion, single column) -->
                <template if:true={hasSummary}>
                <div class="detail-sections">

                    <!-- Overdue Tasks -->
                    <div class={overdueAccordionClass}>
                        <button type="button" class="section-accordion-header" data-section="overdueTasks" onclick={handleToggleSection}>
                            <lightning-icon icon-name="standard:task" size="small" class="section-accordion-icon"></lightning-icon>
                            <span class="section-accordion-title">Overdue tasks</span>
                            <span class="section-accordion-count">({summary.overdueTasks})</span>
                            <lightning-icon icon-name="utility:chevronright" size="small" class="section-accordion-chevron"></lightning-icon>
                        </button>
                        <template if:true={secOverdueTasks}>
                            <div class="section-accordion-body">
                                <template if:true={hasOverdueTasksList}>
                                    <div class="activity-list">
                                        <template for:each={overdueTasks} for:item="task">
                                            <div key={task.activityId} data-id={task.activityId} onclick={handleActivityClick} class="activity-item activity-item--overdue">
                                                <div class="activity-icon-wrapper">
                                                    <lightning-icon icon-name="standard:task" size="small"></lightning-icon>
                                                </div>
                                                <div class="activity-content">
                                                    <div class="activity-subject">{task.subject}</div>
                                                    <div class="activity-meta">
                                                        <span>{task.ownerName}</span>
                                                        <span class="meta-separator">•</span>
                                                        <span class="overdue-text">{task.daysOverdue} days overdue</span>
                                                    </div>
                                                </div>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                                <template if:false={hasOverdueTasksList}>
                                    <div class="empty-state empty-state--compact">
                                        <lightning-icon icon-name="utility:success" size="small" class="empty-icon"></lightning-icon>
                                        <p class="empty-text">No overdue tasks</p>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>

                    <!-- Open Cases -->
                    <div class={casesAccordionClass}>
                        <button type="button" class="section-accordion-header" data-section="cases" onclick={handleToggleSection}>
                            <lightning-icon icon-name="standard:case" size="small" class="section-accordion-icon"></lightning-icon>
                            <span class="section-accordion-title">Open support cases</span>
                            <span class="section-accordion-count">({summary.openCasesCount})</span>
                            <lightning-icon icon-name="utility:chevronright" size="small" class="section-accordion-chevron"></lightning-icon>
                        </button>
                        <template if:true={secCases}>
                            <div class="section-accordion-body">
                                <template if:true={hasCases}>
                                    <div class="section-accordion-actions">
                                        <button class="custom-btn custom-btn--link" onclick={handleViewAllCases}>View all</button>
                                    </div>
                                    <div class="table-container table-container--plain data-table-desktop">
                                        <table class="data-table">
                                            <thead>
                                                <tr>
                                                    <th>Case #</th>
                                                    <th>Subject</th>
                                                    <th>Status</th>
                                                    <th>Priority</th>
                                                    <th class="data-table-col-age">Age</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <template for:each={casesDecorated} for:item="caseItem">
                                                    <tr key={caseItem.caseId} data-id={caseItem.caseId} onclick={handleCaseClick} class="table-row">
                                                        <td>
                                                            <span class="case-number">{caseItem.caseNumber}</span>
                                                            <template if:true={caseItem.isEscalated}>
                                                                <lightning-icon icon-name="utility:warning" size="xx-small" class="escalated-icon"></lightning-icon>
                                                            </template>
                                                        </td>
                                                        <td class="subject-cell">{caseItem.subject}</td>
                                                        <td>
                                                            <span class="cell-status-wrap">
                                                                <span class="status-dot"></span>
                                                                <span class="status-text">{caseItem.status}</span>
                                                            </span>
                                                        </td>
                                                        <td>
                                                            <span class="cell-priority-wrap">
                                                                <span class={caseItem.priorityDotClass}></span>
                                                                <span class="priority-text">{caseItem.priority}</span>
                                                            </span>
                                                        </td>
                                                        <td class="data-table-col-age">{caseItem.age} days</td>
                                                    </tr>
                                                </template>
                                            </tbody>
                                        </table>
                                    </div>
                                    <div class="mobile-card-list">
                                        <template for:each={casesDecorated} for:item="caseItem">
                                            <div key={caseItem.caseId} data-id={caseItem.caseId} onclick={handleCaseClick} class="mobile-record-card">
                                                <div class="mobile-record-card-title">{caseItem.subject}</div>
                                                <div class="mobile-record-card-meta">
                                                    <span class="case-number">{caseItem.caseNumber}</span>
                                                    <span class="meta-separator">•</span>
                                                    <span>{caseItem.status}</span>
                                                    <span class="meta-separator">•</span>
                                                    <span>{caseItem.age} days</span>
                                                </div>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                                <template if:false={hasCases}>
                                    <div class="empty-state empty-state--compact">
                                        <lightning-icon icon-name="utility:success" size="small" class="empty-icon"></lightning-icon>
                                        <p class="empty-text">No open cases for this account</p>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>

                    <!-- Opportunities -->
                    <div class={opportunitiesAccordionClass}>
                        <button type="button" class="section-accordion-header" data-section="opportunities" onclick={handleToggleSection}>
                            <lightning-icon icon-name="standard:opportunity" size="small" class="section-accordion-icon"></lightning-icon>
                            <span class="section-accordion-title">Open opportunities</span>
                            <span class="section-accordion-count">({summary.opportunityCount})</span>
                            <lightning-icon icon-name="utility:chevronright" size="small" class="section-accordion-chevron"></lightning-icon>
                        </button>
                        <template if:true={secOpportunities}>
                            <div class="section-accordion-body">
                                <template if:true={hasOpportunities}>
                                    <div class="section-accordion-actions">
                                        <button class="custom-btn custom-btn--link" onclick={handleViewAllOpportunities}>View all</button>
                                    </div>
                                    <div class="table-container table-container--plain data-table-desktop">
                                        <table class="data-table">
                                            <thead>
                                                <tr>
                                                    <th>Name</th>
                                                    <th>Stage</th>
                                                    <th>Close date</th>
                                                    <th>Amount</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <template for:each={opportunities} for:item="opp">
                                                    <tr key={opp.opportunityId} data-id={opp.opportunityId} onclick={handleOpportunityClick} class="table-row">
                                                        <td class="subject-cell">{opp.name}</td>
                                                        <td><span class="status-badge">{opp.stageName}</span></td>
                                                        <td>{opp.closeDate}</td>
                                                        <td>
                                                            <template if:true={opp.amount}>
                                                                <lightning-formatted-number value={opp.amount} format-style="currency" currency-code={currencyCode}></lightning-formatted-number>
                                                            </template>
                                                        </td>
                                                    </tr>
                                                </template>
                                            </tbody>
                                        </table>
                                    </div>
                                    <div class="mobile-card-list">
                                        <template for:each={opportunities} for:item="opp">
                                            <div key={opp.opportunityId} data-id={opp.opportunityId} onclick={handleOpportunityClick} class="mobile-record-card">
                                                <div class="mobile-record-card-title">{opp.name}</div>
                                                <div class="mobile-record-card-meta">
                                                    <span>{opp.stageName}</span>
                                                    <span class="meta-separator">•</span>
                                                    <span>{opp.closeDate}</span>
                                                </div>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                                <template if:false={hasOpportunities}>
                                    <div class="empty-state empty-state--compact">
                                        <lightning-icon icon-name="utility:info" size="small" class="empty-icon"></lightning-icon>
                                        <p class="empty-text">No open opportunities</p>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>

                    <!-- Upcoming Activities -->
                    <div class={activitiesAccordionClass}>
                        <button type="button" class="section-accordion-header" data-section="activities" onclick={handleToggleSection}>
                            <lightning-icon icon-name="utility:event" size="small" class="section-accordion-icon"></lightning-icon>
                            <span class="section-accordion-title">Upcoming activities</span>
                            <span class="section-accordion-count">({upcomingActivitiesCount})</span>
                            <lightning-icon icon-name="utility:chevronright" size="small" class="section-accordion-chevron"></lightning-icon>
                        </button>
                        <template if:true={secActivities}>
                            <div class="section-accordion-body">
                                <template if:true={hasUpcomingActivities}>
                                    <div class="section-accordion-actions">
                                        <button class="custom-btn custom-btn--link" onclick={handleViewAllActivities}>View all</button>
                                    </div>
                                    <div class="activity-list">
                                        <template for:each={upcomingActivitiesDecorated} for:item="activity">
                                            <div key={activity.activityId} data-id={activity.activityId} onclick={handleActivityClick} class={activity.rowClass}>
                                                <template if:true={activity.isNextTouchpoint}>
                                                    <div class="next-touchpoint-pill">Next touchpoint</div>
                                                </template>
                                                <div class="activity-row-inner">
                                                    <div class="activity-icon-wrapper">
                                                        <template if:true={activity.activityType}>
                                                            <lightning-icon icon-name="standard:task" size="small"></lightning-icon>
                                                        </template>
                                                    </div>
                                                    <div class="activity-content">
                                                        <div class="activity-subject">{activity.subject}</div>
                                                        <div class="activity-meta">
                                                            <span class="activity-type-badge">{activity.activityType}</span>
                                                            <span class="meta-separator">•</span>
                                                            <span>{activity.activityDate}</span>
                                                            <span class="meta-separator">•</span>
                                                            <span>{activity.ownerName}</span>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                                <template if:false={hasUpcomingActivities}>
                                    <div class="empty-state empty-state--compact">
                                        <lightning-icon icon-name="utility:info" size="small" class="empty-icon"></lightning-icon>
                                        <p class="empty-text">No upcoming activities scheduled</p>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>

                    <!-- Contacts -->
                    <div class={contactsAccordionClass}>
                        <button type="button" class="section-accordion-header" data-section="contacts" onclick={handleToggleSection}>
                            <lightning-icon icon-name="standard:contact" size="small" class="section-accordion-icon"></lightning-icon>
                            <span class="section-accordion-title">Contacts</span>
                            <span class="section-accordion-count">({summary.contactCount})</span>
                            <span class={relationshipPillClass} title={relationshipDepthTooltip}>{relationshipDepthLabel}</span>
                            <lightning-icon icon-name="utility:chevronright" size="small" class="section-accordion-chevron"></lightning-icon>
                        </button>
                        <template if:true={secContacts}>
                            <div class="section-accordion-body">
                                <template if:true={hasContacts}>
                                    <div class="section-accordion-actions">
                                        <button class="custom-btn custom-btn--link" onclick={handleViewAllContacts}>View all</button>
                                    </div>
                                    <div class="table-container table-container--plain data-table-desktop">
                                        <table class="data-table">
                                            <thead>
                                                <tr>
                                                    <th>Name</th>
                                                    <th>Title</th>
                                                    <th>Email</th>
                                                    <th class="data-table-col-phone">Phone</th>
                                                    <th>Last Activity</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <template for:each={contacts} for:item="contact">
                                                    <tr key={contact.contactId} data-id={contact.contactId} onclick={handleContactClick} class="table-row">
                                                        <td class="subject-cell">{contact.name}</td>
                                                        <td>{contact.title}</td>
                                                        <td>{contact.email}</td>
                                                        <td class="data-table-col-phone">{contact.phone}</td>
                                                        <td class="last-activity-cell">
                                                            <template if:true={contact.lastActivityDate}>
                                                                <span class="last-activity-text">{contact.lastActivityDate}</span>
                                                            </template>
                                                            <template if:false={contact.lastActivityDate}>
                                                                <span class="last-activity-text last-activity-text--none">No activity</span>
                                                            </template>
                                                        </td>
                                                    </tr>
                                                </template>
                                            </tbody>
                                        </table>
                                    </div>
                                    <div class="mobile-card-list">
                                        <template for:each={contacts} for:item="contact">
                                            <div key={contact.contactId} data-id={contact.contactId} onclick={handleContactClick} class="mobile-record-card">
                                                <div class="mobile-record-card-title">{contact.name}</div>
                                                <div class="mobile-record-card-meta">
                                                    <span>{contact.title} · {contact.email}</span>
                                                    <template if:true={contact.lastActivityDate}>
                                                        <span class="meta-separator">·</span>
                                                        <span>Last: {contact.lastActivityDate}</span>
                                                    </template>
                                                </div>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                                <template if:false={hasContacts}>
                                    <div class="empty-state empty-state--compact">
                                        <lightning-icon icon-name="utility:info" size="small" class="empty-icon"></lightning-icon>
                                        <p class="empty-text">No contacts found</p>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>

                    <template if:true={showInactivityWarning}>
                        <div class="section-card warning-card">
                            <div class="warning-content">
                                <lightning-icon icon-name="utility:warning" size="small" class="warning-icon"></lightning-icon>
                                <div>
                                    <h4 class="warning-title">No recent activity</h4>
                                    <p class="warning-text">This account has had no activity in over 30 days. Consider reaching out to maintain engagement.</p>
                                </div>
                            </div>
                        </div>
                    </template>

                </div>
                </template>

            </div>
        </template>

        <!-- Health Score Breakdown Modal -->
        <template if:true={showHealthBreakdownModal}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={handleCloseModal}>
                            <lightning-icon icon-name="utility:close" alternative-text="close" size="small"></lightning-icon>
                            <span class="slds-assistive-text">Close</span>
                        </button>
                        <h2 class="slds-modal__title slds-hyphenate">Health Score Breakdown</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <div class="health-breakdown-content">
                            <!-- Overall Health Score -->
                            <div class="breakdown-section">
                                <div class="breakdown-header">
                                    <h3 class="breakdown-title">Overall Health Score</h3>
                                    <div class={healthScoreBadgeClass}>{summary.accountHealthScore}</div>
                                </div>
                                <div class="breakdown-description">
                                    <p>Current account health status based on multiple factors including support cases, activity engagement, and opportunities.</p>
                                </div>
                            </div>

                            <!-- Trend Analysis -->
                            <div class="breakdown-section">
                                <h3 class="breakdown-title">Trend</h3>
                                <div class="breakdown-metric">
                                    <span class={trendIconClass}>{trendIcon}</span>
                                    <span class={trendLabelClass}>{trendText}</span>
                                </div>
                                <p class="breakdown-text">Health score trend over the past 30 days</p>
                            </div>

                            <!-- Contributing Factors -->
                            <div class="breakdown-section">
                                <h3 class="breakdown-title">Contributing Factors</h3>

                                <div class="breakdown-factor">
                                    <div class="factor-row">
                                        <span class="factor-label">Open Cases</span>
                                        <span class={openCasesFactorClass}>{summary.openCasesCount}</span>
                                    </div>
                                    <template if:true={summary.highPriorityCasesCount}>
                                        <p class="factor-note factor-note--warning">{summary.highPriorityCasesCount} high priority case(s) requiring attention</p>
                                    </template>
                                </div>

                                <div class="breakdown-factor">
                                    <div class="factor-row">
                                        <span class="factor-label">Overdue Tasks</span>
                                        <span class={overdueTasksFactorClass}>{summary.overdueTasks}</span>
                                    </div>
                                    <template if:true={hasOverdueTasks}>
                                        <p class="factor-note factor-note--danger">Action required on overdue tasks</p>
                                    </template>
                                </div>

                                <div class="breakdown-factor">
                                    <div class="factor-row">
                                        <span class="factor-label">Days Since Last Activity</span>
                                        <span class={lastActivityFactorClass}>{daysSinceLastActivityText}</span>
                                    </div>
                                    <template if:true={showInactivityWarning}>
                                        <p class="factor-note factor-note--warning">No activity in over 30 days</p>
                                    </template>
                                </div>

                                <div class="breakdown-factor">
                                    <div class="factor-row">
                                        <span class="factor-label">Opportunities</span>
                                        <span class="factor-value">{summary.opportunityCount}</span>
                                    </div>
                                </div>
                            </div>

                            <!-- Last Updated -->
                            <div class="breakdown-footer">
                                <p class="breakdown-timestamp">Last updated: 2 hours ago</p>
                            </div>
                        </div>
                    </div>
                    <footer class="slds-modal__footer">
                        <button class="custom-btn custom-btn--secondary" onclick={handleCloseModal}>
                            Close
                        </button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <!-- KPI Details Modal -->
        <template if:true={showKpiModal}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_large">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={handleCloseKpiModal}>
                            <lightning-icon icon-name="utility:close" alternative-text="close" size="small"></lightning-icon>
                            <span class="slds-assistive-text">Close</span>
                        </button>
                        <h2 class="slds-modal__title slds-hyphenate">{kpiModalTitle}</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">

                        <!-- Cases Table -->
                        <template if:true={showCasesModal}>
                            <template if:true={hasKpiModalData}>
                                <div class="kpi-modal-table-container">
                                    <table class="data-table">
                                        <thead>
                                            <tr>
                                                <th>Case #</th>
                                                <th>Subject</th>
                                                <th>Status</th>
                                                <th>Priority</th>
                                                <th>Owner</th>
                                                <th>Age (days)</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <template for:each={kpiModalData} for:item="caseItem">
                                                <tr key={caseItem.caseId} data-id={caseItem.caseId} onclick={handleKpiRecordClick} class="table-row">
                                                    <td>
                                                        <span class="case-number">{caseItem.caseNumber}</span>
                                                        <template if:true={caseItem.isEscalated}>
                                                            <lightning-icon icon-name="utility:warning" size="xx-small" class="escalated-icon"></lightning-icon>
                                                        </template>
                                                    </td>
                                                    <td class="subject-cell">{caseItem.subject}</td>
                                                    <td><span class="status-badge">{caseItem.status}</span></td>
                                                    <td><span class="priority-badge">{caseItem.priority}</span></td>
                                                    <td>{caseItem.ownerName}</td>
                                                    <td>{caseItem.age}</td>
                                                </tr>
                                            </template>
                                        </tbody>
                                    </table>
                                </div>
                            </template>
                            <template if:false={hasKpiModalData}>
                                <div class="kpi-modal-empty-state">
                                    <lightning-icon icon-name="utility:success" size="large" class="empty-state-icon"></lightning-icon>
                                    <p class="empty-state-message">{kpiModalEmptyMessage}</p>
                                </div>
                            </template>
                        </template>

                        <!-- Tasks Table -->
                        <template if:true={showTasksModal}>
                            <template if:true={hasKpiModalData}>
                                <div class="kpi-modal-table-container">
                                    <table class="data-table">
                                        <thead>
                                            <tr>
                                                <th>Subject</th>
                                                <th>Due Date</th>
                                                <th>Days Overdue</th>
                                                <th>Owner</th>
                                                <th>Status</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <template for:each={kpiModalData} for:item="task">
                                                <tr key={task.activityId} data-id={task.activityId} onclick={handleKpiRecordClick} class="table-row">
                                                    <td class="subject-cell">{task.subject}</td>
                                                    <td>{task.activityDate}</td>
                                                    <td><span class="overdue-badge">{task.daysOverdue} days</span></td>
                                                    <td>{task.ownerName}</td>
                                                    <td><span class="status-badge">{task.status}</span></td>
                                                </tr>
                                            </template>
                                        </tbody>
                                    </table>
                                </div>
                            </template>
                            <template if:false={hasKpiModalData}>
                                <div class="kpi-modal-empty-state">
                                    <lightning-icon icon-name="utility:success" size="large" class="empty-state-icon"></lightning-icon>
                                    <p class="empty-state-message">{kpiModalEmptyMessage}</p>
                                </div>
                            </template>
                        </template>

                        <!-- Opportunities Table -->
                        <template if:true={showOpportunitiesModal}>
                            <template if:true={hasKpiModalData}>
                                <div class="kpi-modal-table-container">
                                    <table class="data-table">
                                        <thead>
                                            <tr>
                                                <th>Name</th>
                                                <th>Stage</th>
                                                <th>Close Date</th>
                                                <th>Amount</th>
                                                <th>Probability</th>
                                                <th>Owner</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <template for:each={kpiModalData} for:item="opp">
                                                <tr key={opp.opportunityId} data-id={opp.opportunityId} onclick={handleKpiRecordClick} class="table-row">
                                                    <td class="subject-cell">{opp.name}</td>
                                                    <td><span class="status-badge">{opp.stageName}</span></td>
                                                    <td>{opp.closeDate}</td>
                                                    <td>
                                                        <template if:true={opp.amount}>
                                                            <lightning-formatted-number value={opp.amount} format-style="currency" currency-code={currencyCode}></lightning-formatted-number>
                                                        </template>
                                                    </td>
                                                    <td>{opp.probability}%</td>
                                                    <td>{opp.ownerName}</td>
                                                </tr>
                                            </template>
                                        </tbody>
                                    </table>
                                </div>
                            </template>
                            <template if:false={hasKpiModalData}>
                                <div class="kpi-modal-empty-state">
                                    <lightning-icon icon-name="utility:info" size="large" class="empty-state-icon"></lightning-icon>
                                    <p class="empty-state-message">{kpiModalEmptyMessage}</p>
                                </div>
                            </template>
                        </template>

                    </div>
                    <footer class="slds-modal__footer">
                        <button class="custom-btn custom-btn--secondary" onclick={handleCloseKpiModal}>
                            Close
                        </button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <!-- Activity Creation Modal -->
        <template if:true={showActivityModal}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_medium" aria-modal="true" aria-labelledby="activityModalHeading">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={handleActivityModalCancel}>
                            <lightning-icon icon-name="utility:close" alternative-text="close" size="small"></lightning-icon>
                            <span class="slds-assistive-text">Close</span>
                        </button>
                        <h2 id="activityModalHeading" class="slds-modal__title slds-hyphenate">{activityModalTitle}</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <div class="activity-modal-form">

                            <!-- ===== TASK FORM ===== -->
                            <template if:true={isTaskModal}>
                                <div class="activity-form-row">
                                    <div class="activity-form-col">
                                        <lightning-input label="Subject" value={activityForm.Subject} data-field="Subject" onchange={handleActivityFieldChange} required></lightning-input>
                                    </div>
                                </div>

                                <div class="activity-section-header"><span>Additional Details</span></div>
                                <div class="activity-form-row">
                                    <div class="activity-form-col">
                                        <lightning-input type="date" label="Due Date" value={activityForm.ActivityDate} data-field="ActivityDate" onchange={handleActivityFieldChange}></lightning-input>
                                    </div>
                                    <div class="activity-form-col">
                                        <lightning-combobox label="Priority" value={activityForm.Priority} options={taskPriorityOptions} data-field="Priority" onchange={handleActivityFieldChange}></lightning-combobox>
                                    </div>
                                </div>
                                <div class="activity-form-row">
                                    <div class="activity-form-col">
                                        <lightning-combobox label="Status" value={activityForm.Status} options={taskStatusOptions} data-field="Status" onchange={handleActivityFieldChange}></lightning-combobox>
                                    </div>
                                    <div class="activity-form-col">
                                        <lightning-combobox label="Type" value={activityForm.Type} options={taskTypeOptions} data-field="Type" onchange={handleActivityFieldChange}></lightning-combobox>
                                    </div>
                                </div>

                                <div class="activity-section-header"><span>Related Records</span></div>
                                <div class="activity-form-row">
                                    <div class="activity-form-col">
                                        <label class="activity-field-label">Name</label>
                                        <div class="activity-polymorphic-lookup">
                                            <div class="activity-entity-switcher">
                                                <button type="button" class="activity-entity-btn" onclick={toggleWhoIdEntityMenu}>
                                                    <lightning-icon icon-name={whoIdIconName} size="x-small"></lightning-icon>
                                                    <lightning-icon icon-name="utility:down" size="xx-small" class="activity-entity-chevron"></lightning-icon>
                                                </button>
                                                <template if:true={showWhoIdEntityMenu}>
                                                    <div class="activity-entity-dropdown" role="listbox">
                                                        <template for:each={whoIdObjectOptions} for:item="opt">
                                                            <div key={opt.value} class="activity-entity-option" role="option" data-value={opt.value} onclick={selectWhoIdObject}>
                                                                <lightning-icon icon-name={opt.iconName} size="x-small"></lightning-icon>
                                                                <span>{opt.label}</span>
                                                            </div>
                                                        </template>
                                                    </div>
                                                </template>
                                            </div>
                                            <lightning-record-picker label="Name" variant="label-hidden" object-api-name={whoIdObjectType} value={activityForm.WhoId} onchange={handleWhoIdChange} class="activity-record-picker"></lightning-record-picker>
                                        </div>
                                    </div>
                                    <div class="activity-form-col">
                                        <label class="activity-field-label">Related To</label>
                                        <div class="activity-polymorphic-lookup">
                                            <div class="activity-entity-switcher">
                                                <button type="button" class="activity-entity-btn" onclick={toggleWhatIdEntityMenu}>
                                                    <lightning-icon icon-name={whatIdIconName} size="x-small"></lightning-icon>
                                                    <lightning-icon icon-name="utility:down" size="xx-small" class="activity-entity-chevron"></lightning-icon>
                                                </button>
                                                <template if:true={showWhatIdEntityMenu}>
                                                    <div class="activity-entity-dropdown" role="listbox">
                                                        <template for:each={whatIdObjectOptions} for:item="opt">
                                                            <div key={opt.value} class="activity-entity-option" role="option" data-value={opt.value} onclick={selectWhatIdObject}>
                                                                <lightning-icon icon-name={opt.iconName} size="x-small"></lightning-icon>
                                                                <span>{opt.label}</span>
                                                            </div>
                                                        </template>
                                                    </div>
                                                </template>
                                            </div>
                                            <lightning-record-picker label="Related To" variant="label-hidden" object-api-name={whatIdObjectType} value={activityForm.WhatId} onchange={handleWhatIdChange} class="activity-record-picker"></lightning-record-picker>
                                        </div>
                                    </div>
                                </div>
                                <div class="activity-form-row">
                                    <div class="activity-form-col">
                                        <lightning-record-picker label="Assigned To" object-api-name="User" value={activityForm.OwnerId} onchange={handleOwnerIdChange}></lightning-record-picker>
                                    </div>
                                </div>

                                <div class="activity-section-header"><span>Notes</span></div>
                                <div class="activity-form-row activity-notes-section">
                                    <div class="activity-form-col">
                                        <lightning-textarea label="Description" value={activityForm.Description} data-field="Description" onchange={handleActivityFieldChange}></lightning-textarea>
                                    </div>
                                </div>
                            </template>

                            <!-- ===== EVENT FORM ===== -->
                            <template if:true={isEventModal}>
                                <div class="activity-form-row">
                                    <div class="activity-form-col">
                                        <lightning-input label="Subject" value={activityForm.Subject} data-field="Subject" onchange={handleActivityFieldChange} required></lightning-input>
                                    </div>
                                </div>

                                <div class="activity-section-header"><span>Schedule</span></div>
                                <div class="activity-form-row">
                                    <div class="activity-form-col">
                                        <lightning-input type="checkbox" label="All-Day Event" checked={activityForm.IsAllDayEvent} data-field="IsAllDayEvent" onchange={handleActivityFieldChange}></lightning-input>
                                    </div>
                                </div>
                                <div class="activity-form-row">
                                    <div class="activity-form-col">
                                        <lightning-input type="datetime" label="Start" value={activityForm.StartDateTime} data-field="StartDateTime" onchange={handleActivityFieldChange} required></lightning-input>
                                    </div>
                                    <div class="activity-form-col">
                                        <lightning-input type="datetime" label="End" value={activityForm.EndDateTime} data-field="EndDateTime" onchange={handleActivityFieldChange} required></lightning-input>
                                    </div>
                                </div>

                                <div class="activity-section-header"><span>Related Records</span></div>
                                <div class="activity-form-row">
                                    <div class="activity-form-col">
                                        <label class="activity-field-label">Name</label>
                                        <div class="activity-polymorphic-lookup">
                                            <div class="activity-entity-switcher">
                                                <button type="button" class="activity-entity-btn" onclick={toggleWhoIdEntityMenu}>
                                                    <lightning-icon icon-name={whoIdIconName} size="x-small"></lightning-icon>
                                                    <lightning-icon icon-name="utility:down" size="xx-small" class="activity-entity-chevron"></lightning-icon>
                                                </button>
                                                <template if:true={showWhoIdEntityMenu}>
                                                    <div class="activity-entity-dropdown" role="listbox">
                                                        <template for:each={whoIdObjectOptions} for:item="opt">
                                                            <div key={opt.value} class="activity-entity-option" role="option" data-value={opt.value} onclick={selectWhoIdObject}>
                                                                <lightning-icon icon-name={opt.iconName} size="x-small"></lightning-icon>
                                                                <span>{opt.label}</span>
                                                            </div>
                                                        </template>
                                                    </div>
                                                </template>
                                            </div>
                                            <lightning-record-picker label="Name" variant="label-hidden" object-api-name={whoIdObjectType} value={activityForm.WhoId} onchange={handleWhoIdChange} class="activity-record-picker"></lightning-record-picker>
                                        </div>
                                    </div>
                                    <div class="activity-form-col">
                                        <label class="activity-field-label">Related To</label>
                                        <div class="activity-polymorphic-lookup">
                                            <div class="activity-entity-switcher">
                                                <button type="button" class="activity-entity-btn" onclick={toggleWhatIdEntityMenu}>
                                                    <lightning-icon icon-name={whatIdIconName} size="x-small"></lightning-icon>
                                                    <lightning-icon icon-name="utility:down" size="xx-small" class="activity-entity-chevron"></lightning-icon>
                                                </button>
                                                <template if:true={showWhatIdEntityMenu}>
                                                    <div class="activity-entity-dropdown" role="listbox">
                                                        <template for:each={whatIdObjectOptions} for:item="opt">
                                                            <div key={opt.value} class="activity-entity-option" role="option" data-value={opt.value} onclick={selectWhatIdObject}>
                                                                <lightning-icon icon-name={opt.iconName} size="x-small"></lightning-icon>
                                                                <span>{opt.label}</span>
                                                            </div>
                                                        </template>
                                                    </div>
                                                </template>
                                            </div>
                                            <lightning-record-picker label="Related To" variant="label-hidden" object-api-name={whatIdObjectType} value={activityForm.WhatId} onchange={handleWhatIdChange} class="activity-record-picker"></lightning-record-picker>
                                        </div>
                                    </div>
                                </div>
                                <div class="activity-form-row">
                                    <div class="activity-form-col">
                                        <lightning-input label="Location" value={activityForm.Location} data-field="Location" onchange={handleActivityFieldChange}></lightning-input>
                                    </div>
                                    <div class="activity-form-col">
                                        <lightning-record-picker label="Assigned To" object-api-name="User" value={activityForm.OwnerId} onchange={handleOwnerIdChange}></lightning-record-picker>
                                    </div>
                                </div>

                                <div class="activity-section-header"><span>Notes</span></div>
                                <div class="activity-form-row activity-notes-section">
                                    <div class="activity-form-col">
                                        <lightning-textarea label="Description" value={activityForm.Description} data-field="Description" onchange={handleActivityFieldChange}></lightning-textarea>
                                    </div>
                                </div>
                            </template>

                        </div>
                    </div>
                    <footer class="slds-modal__footer">
                        <button class="slds-button slds-button_neutral" onclick={handleActivityModalCancel}>Cancel</button>
                        <button class="slds-button slds-button_brand" onclick={handleActivityModalSubmit} disabled={activitySaveDisabled}>Save</button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
    </lightning-card>
</template>
