<template>
    <div class={containerClass} role="status">
        <div class="csd-empty__icon">
            <lightning-icon
                class="csd-empty__lightning-icon"
                icon-name={resolvedIconName}
                size="small"
                alternative-text=""
            ></lightning-icon>
        </div>
        <p class="csd-empty__title">{titleText}</p>
        <p class="csd-empty__body" lwc:if={bodyText}>{bodyText}</p>
        <div class={metaContainerClass}>
            <slot name="meta" onslotchange={handleMetaSlotChange}></slot>
        </div>
        <div class="csd-empty__actions" lwc:if={hasActions}>
            <lightning-button
                lwc:if={showPrimary}
                class="csd-empty__btn"
                label={primaryLabel}
                variant={primaryVariant}
                title={primaryLabel}
                onclick={handlePrimary}
            ></lightning-button>
            <lightning-button
                lwc:if={showSecondary}
                class="csd-empty__btn"
                label={secondaryLabel}
                variant="neutral"
                title={secondaryLabel}
                onclick={handleSecondary}
            ></lightning-button>
        </div>
        <template lwc:if={isErrorVariant}>
            <details lwc:if={errorDetail} class="csd-empty__details" onclick={handleDetailsClick}>
                <summary class="csd-empty__details-summary">Technical details</summary>
                <pre class="csd-empty__details-body">{errorDetail}</pre>
            </details>
        </template>
    </div>
</template>
