<template>
    <div class="portfolio-dashboard">

        <!-- Header -->
        <div class="portfolio-header">
            <div class="portfolio-header-left">
                <lightning-icon icon-name="standard:work_capacity_usage" size="small" class="portfolio-header-icon"></lightning-icon>
                <div class="portfolio-header-titles">
                    <h1 class="portfolio-title">My Portfolio</h1>
                    <template if:true={hasSummary}>
                        <p class="portfolio-subtitle">{heroSubText}</p>
                    </template>
                </div>
            </div>
            <lightning-button-icon
                icon-name="utility:refresh"
                variant="border-filled"
                alternative-text="Refresh"
                title="Refresh Portfolio"
                onclick={handleRefresh}
                class="refresh-button">
            </lightning-button-icon>
        </div>

        <!-- Loading -->
        <template if:true={isLoading}>
            <div class="loading-container">
                <lightning-spinner alternative-text="Loading portfolio..." size="medium"></lightning-spinner>
            </div>
        </template>

        <!-- Main Content -->
        <template if:false={isLoading}>
            <div class="dashboard-content">

                <!-- Portfolio Hero: Health Card + Suggested Actions -->
                <template if:true={hasSummary}>
                    <div class="portfolio-hero">

                        <!-- Health Hero Card -->
                        <div class="hero-health-area">
                            <div class={heroCardClass}>
                                <div class="hero-label">PORTFOLIO HEALTH</div>
                                <div class="hero-value">
                                    {heroScoreValue}<span class="hero-value-unit">%</span>
                                </div>
                                <div class="hero-sub">Healthy</div>

                                <!-- Health Distribution Bar -->
                                <div class="health-distribution">
                                    <div class="health-bar-container">
                                        <template if:true={healthyPercent}>
                                            <div class="health-bar-segment health-bar-segment--green"
                                                 style={greenBarStyle}
                                                 data-segment="green"
                                                 onclick={handleHealthBarClick}
                                                 title="Healthy"></div>
                                        </template>
                                        <template if:true={needsAttentionPercent}>
                                            <div class="health-bar-segment health-bar-segment--yellow"
                                                 style={yellowBarStyle}
                                                 data-segment="yellow"
                                                 onclick={handleHealthBarClick}
                                                 title="Needs Attention"></div>
                                        </template>
                                        <template if:true={atRiskPercent}>
                                            <div class="health-bar-segment health-bar-segment--red"
                                                 style={redBarStyle}
                                                 data-segment="red"
                                                 onclick={handleHealthBarClick}
                                                 title="At Risk"></div>
                                        </template>
                                        <template if:true={unassessedPercent}>
                                            <div class="health-bar-segment health-bar-segment--gray"
                                                 style={grayBarStyle}
                                                 data-segment="gray"
                                                 onclick={handleHealthBarClick}
                                                 title="Not Assessed"></div>
                                        </template>
                                    </div>

                                    <!-- Legend -->
                                    <div class="health-bar-legend">
                                        <div class="health-legend-item" data-filter="healthy" onclick={handleFilterClick}>
                                            <span class="health-legend-dot health-legend-dot--green"></span>
                                            {summary.healthyAccounts} Healthy
                                        </div>
                                        <div class="health-legend-item" data-filter="needs-attention" onclick={handleFilterClick}>
                                            <span class="health-legend-dot health-legend-dot--yellow"></span>
                                            {summary.needsAttentionAccounts} Attention
                                        </div>
                                        <div class="health-legend-item" data-filter="at-risk" onclick={handleFilterClick}>
                                            <span class="health-legend-dot health-legend-dot--red"></span>
                                            {summary.atRiskAccounts} At Risk
                                        </div>
                                    </div>

                                    <button class="custom-btn custom-btn--secondary" onclick={handleViewHealthBreakdown} type="button">
                                        View Breakdown
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- Suggested Actions -->
                        <div class="hero-actions-area">
                            <template if:true={hasSuggestedActions}>
                                <div class="suggested-actions-container">
                                    <div class="action-section-label">Suggested actions</div>
                                    <template for:each={suggestedActions} for:item="action">
                                        <div key={action.id}
                                             class={action.actionClass}
                                             data-action-type={action.id}
                                             onclick={handleSuggestedActionClick}>
                                            <div class="suggested-action-content">
                                                <span class={action.dotClass}></span>
                                                <span class="suggested-action-badge">{action.badge}</span>
                                                <span class="suggested-action-text">{action.text}</span>
                                            </div>
                                            <lightning-icon icon-name="utility:chevronright" size="xx-small" class="suggested-action-chevron"></lightning-icon>
                                        </div>
                                    </template>
                                </div>
                            </template>
                            <template if:false={hasSuggestedActions}>
                                <div class="suggested-actions-container">
                                    <div class="action-section-label">Portfolio Status</div>
                                    <div class="suggested-action suggested-action--info">
                                        <div class="suggested-action-content">
                                            <span class="suggested-action-dot suggested-action-dot--info"></span>
                                            <span class="suggested-action-text">All accounts are in good standing</span>
                                        </div>
                                    </div>
                                </div>
                            </template>

                            <div class="quick-actions-inline">
                                <button type="button" class="quick-action-btn" onclick={handleLogCall} title="Log a Call">
                                    <lightning-icon icon-name="utility:call" size="small"></lightning-icon>
                                    <span class="quick-action-text">Log call</span>
                                </button>
                                <button type="button" class="quick-action-btn" onclick={handleCreateTask} title="Create Task">
                                    <lightning-icon icon-name="utility:task" size="small"></lightning-icon>
                                    <span class="quick-action-text">New task</span>
                                </button>
                                <button type="button" class="quick-action-btn" onclick={handleCreateEvent} title="Schedule Event">
                                    <lightning-icon icon-name="utility:event" size="small"></lightning-icon>
                                    <span class="quick-action-text">Event</span>
                                </button>
                                <button type="button" class="quick-action-btn" onclick={handleCreateCase} title="Create Case">
                                    <lightning-icon icon-name="utility:case" size="small"></lightning-icon>
                                    <span class="quick-action-text">Case</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </template>

                <!-- Stat Bar -->
                <template if:true={hasSummary}>
                    <div class="stat-bar">
                        <button class="stat-item stat-item--clickable" data-stat="cases" onclick={handleStatClick} type="button">
                            <span class="stat-dot stat-dot--cases"></span>
                            <span class={openCasesStatClass}>{summary.totalOpenCases}</span>
                            <span class="stat-label">Open Cases</span>
                            <span class="stat-hint">{casesHint}</span>
                        </button>
                        <div class="stat-divider" aria-hidden="true"></div>
                        <button class="stat-item stat-item--clickable" data-stat="tasks" onclick={handleStatClick} type="button">
                            <span class="stat-dot stat-dot--tasks"></span>
                            <span class={overdueTasksStatClass}>{summary.totalOverdueTasks}</span>
                            <span class="stat-label">Overdue Tasks</span>
                            <span class="stat-hint">{tasksHint}</span>
                        </button>
                        <div class="stat-divider" aria-hidden="true"></div>
                        <button class="stat-item stat-item--clickable" data-stat="pipeline" onclick={handleStatClick} type="button">
                            <span class="stat-dot stat-dot--pipeline"></span>
                            <span class="stat-value">{pipelineFormatted}</span>
                            <span class="stat-label">Open Pipeline</span>
                            <span class="stat-hint">across portfolio</span>
                        </button>
                    </div>
                </template>

                <!-- Customer Success Snapshot -->
                <template if:true={hasSummary}>
                    <div class={snapshotClass}>
                        <button class="snapshot-toggle" onclick={handleSnapshotToggle} type="button">
                            <div class="snapshot-toggle-left">
                                <span class="snapshot-title">Portfolio Success Snapshot</span>
                                <span class="snapshot-hint">Revenue, support metrics, and case trends across your portfolio</span>
                            </div>
                            <lightning-icon
                                icon-name="utility:chevronright"
                                size="x-small"
                                class="snapshot-chevron">
                            </lightning-icon>
                        </button>

                        <template if:true={snapshotExpanded}>
                            <div class="snapshot-body">

                                <!-- REVENUE -->
                                <div class="snapshot-section">
                                    <span class="snapshot-section-header">Revenue</span>
                                    <div class="commercial-kpi-row">
                                        <div class="commercial-kpi commercial-kpi--click" onclick={handleSnapshotLifetimeValueClick}>
                                            <span class="commercial-kpi-label">Lifetime value</span>
                                            <span class="commercial-kpi-value">
                                                <lightning-formatted-number value={summary.totalClosedWonAmount} format-style="currency" currency-code="USD"></lightning-formatted-number>
                                            </span>
                                            <span class="commercial-kpi-sub">Total closed-won across portfolio</span>
                                        </div>
                                        <div class="commercial-kpi commercial-kpi--click" onclick={handleSnapshotWonYtdClick}>
                                            <span class="commercial-kpi-label">Won this year ({currentYear})</span>
                                            <span class="commercial-kpi-value">
                                                <lightning-formatted-number value={summary.totalYtdClosedWon} format-style="currency" currency-code="USD"></lightning-formatted-number>
                                            </span>
                                            <span class="commercial-kpi-sub">Prior year: <lightning-formatted-number value={summary.priorYearWonRevenue} format-style="currency" currency-code="USD"></lightning-formatted-number></span>
                                        </div>
                                        <div class="commercial-kpi commercial-kpi--click" onclick={handleSnapshotPipelineClick}>
                                            <span class="commercial-kpi-label">Open pipeline</span>
                                            <span class="commercial-kpi-value">
                                                <lightning-formatted-number value={summary.totalOpenPipeline} format-style="currency" currency-code="USD"></lightning-formatted-number>
                                            </span>
                                            <span class="commercial-kpi-sub">Weighted: <lightning-formatted-number value={summary.totalWeightedPipeline} format-style="currency" currency-code="USD"></lightning-formatted-number></span>
                                        </div>
                                        <template if:true={hasUpcomingRenewal}>
                                            <button type="button" class={renewalCardClass} onclick={handleCommercialRenewalsClick}>
                                                <span class="commercial-kpi-label">Upcoming renewals</span>
                                                <span class="commercial-kpi-value">
                                                    <lightning-formatted-number value={nearestRenewalAmount} format-style="currency" currency-code="USD"></lightning-formatted-number>
                                                </span>
                                                <span class={renewalDaysClass}>{renewalSubtitle}</span>
                                            </button>
                                        </template>
                                        <template if:false={hasUpcomingRenewal}>
                                            <div class="commercial-kpi commercial-kpi--click" onclick={handleSnapshotPipelineClick}>
                                                <span class="commercial-kpi-label">Upcoming renewals</span>
                                                <span class="commercial-kpi-value commercial-kpi-value--muted">—</span>
                                                <span class="commercial-kpi-sub">{renewalSubtitle}</span>
                                            </div>
                                        </template>
                                    </div>
                                    <div class="snapshot-visuals">
                                        <div class="trend-chart-wrap">
                                            <div class="trend-chart-header">
                                                <span class="trend-chart-title">Closed won (12 months)</span>
                                            </div>
                                            <template if:true={hasRevenueMonthData}>
                                                <div class="trend-chart">
                                                    <template for:each={revenueMonthBars} for:item="rb">
                                                        <div key={rb.key} class="trend-chart-col" data-key={rb.key}
                                                             data-month-index={rb.monthIndex}
                                                             aria-label={rb.ariaLabel} tabindex="0"
                                                             onclick={handleRevenueTrendBarClick}
                                                             onmouseenter={handleBarMouseEnter}
                                                             onmouseleave={handleBarMouseLeave}
                                                             onfocus={handleBarMouseEnter}
                                                             onblur={handleBarMouseLeave}
                                                             ontouchstart={handleBarTouchStart}
                                                             ontouchend={handleBarTouchEnd}>
                                                            <template if:true={rb.isTooltipActive}>
                                                                <div class="trend-chart-tooltip">
                                                                    <span class="trend-chart-tooltip-month">{rb.fullLabel}</span>
                                                                    <span class="trend-chart-tooltip-value">{rb.tooltipAmount}</span>
                                                                    <span class="trend-chart-tooltip-sub">{rb.tooltipPrevAmount}</span>
                                                                </div>
                                                            </template>
                                                            <div class="trend-chart-bar-track">
                                                                <template if:true={rb.hasCurrentBar}>
                                                                    <div class="trend-chart-bar-fill trend-chart-bar-fill--current" style={rb.currentBarStyle}></div>
                                                                </template>
                                                            </div>
                                                            <span class="case-trend-label">{rb.label}</span>
                                                        </div>
                                                    </template>
                                                </div>
                                            </template>
                                            <template if:false={hasRevenueMonthData}>
                                                <div class="case-resolution-empty">No closed-won opportunities in the last 12 months</div>
                                            </template>
                                        </div>
                                    </div>

                                </div>

                                <!-- SUPPORT -->
                                <div class="snapshot-section snapshot-section--border">
                                    <span class="snapshot-section-header">Support</span>
                                    <div class="commercial-kpi-row">
                                        <div class={supportCasesYearClickClass} onclick={handleSnapshotYtdCasesClick}>
                                            <span class="commercial-kpi-label">Cases this year ({currentYear})</span>
                                            <span class="commercial-kpi-value commercial-kpi-value--num">{summary.ytdCaseCount}</span>
                                            <span class="commercial-kpi-sub">Prior year: {summary.priorYearCaseCount}</span>
                                        </div>
                                        <div class="commercial-kpi commercial-kpi--click" onclick={handleSnapshotRecentCasesClick}>
                                            <span class="commercial-kpi-label">Cases (90 days)</span>
                                            <span class="commercial-kpi-value commercial-kpi-value--num">{summary.casesOpenedLast90Days}</span>
                                            <span class="commercial-kpi-sub">Opened across portfolio</span>
                                        </div>
                                        <div class="commercial-kpi">
                                            <span class="commercial-kpi-label">Escalated (90 days)</span>
                                            <span class="commercial-kpi-value commercial-kpi-value--num">{summary.escalatedCasesLast90Days}</span>
                                            <span class="commercial-kpi-sub">of {summary.casesOpenedLast90Days} cases</span>
                                        </div>
                                        <template if:true={hasCaseResolutionData}>
                                            <div class="commercial-kpi">
                                                <span class="commercial-kpi-label">Median resolution</span>
                                                <span class="commercial-kpi-value">{formattedMedianResolution}</span>
                                                <span class="commercial-kpi-sub">{medianResolutionCountSubtext}</span>
                                            </div>
                                        </template>
                                        <template if:false={hasCaseResolutionData}>
                                            <div class="commercial-kpi">
                                                <span class="commercial-kpi-label">Median resolution</span>
                                                <span class="commercial-kpi-value commercial-kpi-value--muted">—</span>
                                                <span class="commercial-kpi-sub">No closed cases</span>
                                            </div>
                                        </template>
                                    </div>
                                    <div class="snapshot-visuals">
                                        <div class="trend-chart-wrap">
                                            <div class="trend-chart-header">
                                                <span class="trend-chart-title">Cases opened (12 months)</span>
                                            </div>
                                            <template if:true={hasCaseMonthData}>
                                                <div class="trend-chart">
                                                    <template for:each={caseTrendBars} for:item="cb">
                                                        <div key={cb.key} class="trend-chart-col" data-key={cb.key}
                                                             data-month-index={cb.monthIndex}
                                                             aria-label={cb.ariaLabel} tabindex="0"
                                                             onclick={handleCaseTrendBarClick}
                                                             onmouseenter={handleBarMouseEnter}
                                                             onmouseleave={handleBarMouseLeave}
                                                             onfocus={handleBarMouseEnter}
                                                             onblur={handleBarMouseLeave}
                                                             ontouchstart={handleBarTouchStart}
                                                             ontouchend={handleBarTouchEnd}>
                                                            <template if:true={cb.isTooltipActive}>
                                                                <div class="trend-chart-tooltip">
                                                                    <span class="trend-chart-tooltip-month">{cb.fullLabel}</span>
                                                                    <span class="trend-chart-tooltip-value">{cb.tooltipCaseCount}</span>
                                                                    <span class="trend-chart-tooltip-sub">{cb.tooltipAvgClose}</span>
                                                                </div>
                                                            </template>
                                                            <div class="trend-chart-bar-track">
                                                                <template if:true={cb.hasCurrentBar}>
                                                                    <div class="trend-chart-bar-fill trend-chart-bar-fill--current" style={cb.currentBarStyle}></div>
                                                                </template>
                                                            </div>
                                                            <span class="case-trend-label">{cb.label}</span>
                                                        </div>
                                                    </template>
                                                </div>
                                            </template>
                                            <template if:false={hasCaseMonthData}>
                                                <div class="case-resolution-empty">No cases opened in the last 12 months</div>
                                            </template>
                                        </div>
                                    </div>
                                </div>

                            </div>
                        </template>
                    </div>
                </template>

                <!-- Account Table Section -->
                <div class={tableSectionClass}>
                    <template if:true={isAccountsLoading}>
                        <div class="accounts-loading-overlay">
                            <lightning-spinner alternative-text="Loading accounts..." size="small"></lightning-spinner>
                        </div>
                    </template>
                    <div class="table-header">
                        <div class="table-header-left">
                            <span class="table-title">ACCOUNTS</span>
                            <template if:true={hasAccounts}>
                                <span class="table-count">{paginationInfo}</span>
                            </template>
                        </div>
                        <div class="filter-pills">
                            <template for:each={filterPills} for:item="pill">
                                <button key={pill.value}
                                        class={pill.class}
                                        data-filter={pill.value}
                                        onclick={handleFilterClick}
                                        type="button">
                                    {pill.label}
                                </button>
                            </template>
                        </div>
                    </div>

                    <!-- Desktop Table -->
                    <template if:true={hasAccounts}>
                        <div class="table-container data-table-desktop">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th class="th-sortable" data-field="accountName" onclick={handleSort}>
                                            Account{sortIndicatorAccountName}
                                        </th>
                                        <th class="th-sortable" data-field="healthScore" onclick={handleSort}>
                                            Health{sortIndicatorHealthScore}
                                        </th>
                                        <th>Last Activity</th>
                                        <th>Next Activity</th>
                                        <th>Cases</th>
                                        <th>Tasks</th>
                                        <th>Pipeline</th>
                                        <th>Renewal</th>
                                        <th class="th-chevron"></th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template for:each={accountsDecorated} for:item="account">
                                        <tr key={account.accountId}
                                            class={account.rowClass}
                                            data-id={account.accountId}
                                            onclick={handleAccountRowClick}>
                                            <td>
                                                <a class="account-name-link"
                                                   data-id={account.accountId}
                                                   onclick={navigateToAccount}
                                                   title={account.accountName}>
                                                    {account.accountName}
                                                </a>
                                            </td>
                                            <td>
                                                <span class={account.healthBadgeClass}>{account.healthScore}</span>
                                            </td>
                                            <td>
                                                <span class={account.daysSinceActivityClass}>{account.daysSinceActivityText}</span>
                                            </td>
                                            <td>
                                                <span>{account.nextActivityText}</span>
                                            </td>
                                            <td>
                                                <span class={account.casesClass}>{account.casesDisplay}</span>
                                            </td>
                                            <td>
                                                <span class={account.tasksClass}>{account.tasksDisplay}</span>
                                            </td>
                                            <td>
                                                <span class="cell-currency">{account.pipelineFormatted}</span>
                                            </td>
                                            <td>
                                                <span class={account.renewalClass}>{account.renewalDisplay}</span>
                                            </td>
                                            <td class="td-chevron">
                                                <lightning-icon icon-name="utility:chevronright" size="x-small" class={account.chevronClass}></lightning-icon>
                                            </td>
                                        </tr>
                                        <!-- Inline Expansion -->
                                        <template if:true={account.isExpanded}>
                                            <tr key={account.expansionKey} class="expansion-row">
                                                <td colspan="9">
                                                    <div class="expansion-card">
                                                        <div class="expansion-grid-layout">
                                                            <div class="expansion-col">
                                                                <template if:true={account.hasRecentActivities}>
                                                                    <div class="expansion-section-label">Recent Activity</div>
                                                                    <div class="expansion-recent-activities">
                                                                        <template for:each={account.recentActivities} for:item="activity">
                                                                            <div key={activity.activityId}
                                                                                 class="recent-activity-item recent-activity-item--clickable"
                                                                                 data-id={activity.activityId}
                                                                                 onclick={handleExpansionActivityClick}>
                                                                                <span class="recent-activity-type">{activity.activityType}</span>
                                                                                <span class="recent-activity-subject">{activity.subject}</span>
                                                                                <span class="recent-activity-date">{activity.activityDate}</span>
                                                                            </div>
                                                                        </template>
                                                                    </div>
                                                                </template>

                                                                <template if:true={account.primaryContactName}>
                                                                    <div class="expansion-section-label">Key Contact</div>
                                                                    <div class="expansion-contact expansion-contact--clickable"
                                                                         data-id={account.primaryContactId}
                                                                         onclick={handleExpansionContactClick}>
                                                                        <lightning-icon icon-name="standard:contact" size="x-small"></lightning-icon>
                                                                        <span class="expansion-contact-name">{account.primaryContactName}</span>
                                                                    </div>
                                                                </template>
                                                            </div>

                                                            <div class="expansion-col">
                                                                <div class="expansion-section-label">Account Snapshot</div>
                                                                <div class="expansion-health-factors">
                                                                    <template for:each={account.healthFactors} for:item="factor">
                                                                        <div key={factor.label}
                                                                             class="health-factor-card health-factor-card--clickable"
                                                                             data-factor={factor.factorType}
                                                                             data-account={account.accountId}
                                                                             data-name={account.accountName}
                                                                             onclick={handleHealthFactorClick}>
                                                                            <span class="health-factor-label">{factor.label}</span>
                                                                            <span class={factor.valueClass}>{factor.value}</span>
                                                                            <span class={factor.statusClass}>{factor.status}</span>
                                                                        </div>
                                                                    </template>
                                                                </div>
                                                            </div>
                                                        </div>

                                                        <div class="expansion-actions">
                                                            <button class="custom-btn custom-btn--ghost"
                                                                    data-id={account.accountId}
                                                                    onclick={handleViewFullDashboard}
                                                                    type="button">
                                                                View Full Dashboard
                                                            </button>
                                                            <button class="custom-btn custom-btn--ghost"
                                                                    data-id={account.accountId}
                                                                    onclick={handleGoToAccount}
                                                                    type="button">
                                                                Go to Account
                                                            </button>
                                                        </div>
                                                    </div>
                                                </td>
                                            </tr>
                                        </template>
                                    </template>
                                </tbody>
                            </table>
                        </div>

                        <!-- Mobile Cards -->
                        <div class="mobile-card-list">
                            <template for:each={accountsDecorated} for:item="account">
                                <div key={account.accountId}
                                     class="mobile-account-card"
                                     data-id={account.accountId}
                                     onclick={handleAccountRowClick}>
                                    <div class="mobile-card-header">
                                        <span class="mobile-card-name">{account.accountName}</span>
                                        <div class="mobile-card-header-right">
                                            <span class={account.healthBadgeClass}>{account.healthScore}</span>
                                            <lightning-icon icon-name="utility:chevronright" size="xx-small" class={account.chevronClass}></lightning-icon>
                                        </div>
                                    </div>
                                    <div class="mobile-card-metrics">
                                        <div class="mobile-card-metric">
                                            <span class="mobile-card-metric-label">Cases</span>
                                            <span class="mobile-card-metric-value">{account.casesDisplay}</span>
                                        </div>
                                        <div class="mobile-card-metric">
                                            <span class="mobile-card-metric-label">Tasks</span>
                                            <span class="mobile-card-metric-value">{account.tasksDisplay}</span>
                                        </div>
                                        <div class="mobile-card-metric">
                                            <span class="mobile-card-metric-label">Pipeline</span>
                                            <span class="mobile-card-metric-value">{account.pipelineFormatted}</span>
                                        </div>
                                        <div class="mobile-card-metric">
                                            <span class="mobile-card-metric-label">Last Activity</span>
                                            <span class="mobile-card-metric-value">{account.daysSinceActivityText}</span>
                                        </div>
                                    </div>
                                    <!-- Mobile Expansion -->
                                    <template if:true={account.isExpanded}>
                                        <div class="mobile-expansion-content">
                                            <template if:true={account.hasRecentActivities}>
                                                <div class="expansion-section-label">Recent Activity</div>
                                                <div class="expansion-recent-activities">
                                                    <template for:each={account.recentActivities} for:item="activity">
                                                        <div key={activity.activityId}
                                                             class="recent-activity-item recent-activity-item--clickable"
                                                             data-id={activity.activityId}
                                                             onclick={handleExpansionActivityClick}>
                                                            <span class="recent-activity-type">{activity.activityType}</span>
                                                            <span class="recent-activity-subject">{activity.subject}</span>
                                                            <span class="recent-activity-date">{activity.activityDate}</span>
                                                        </div>
                                                    </template>
                                                </div>
                                            </template>

                                            <template if:true={account.primaryContactName}>
                                                <div class="expansion-section-label">Key Contact</div>
                                                <div class="expansion-contact expansion-contact--clickable"
                                                     data-id={account.primaryContactId}
                                                     onclick={handleExpansionContactClick}>
                                                    <lightning-icon icon-name="standard:contact" size="x-small"></lightning-icon>
                                                    <span class="expansion-contact-name">{account.primaryContactName}</span>
                                                </div>
                                            </template>

                                            <div class="expansion-section-label">Account Snapshot</div>
                                            <div class="expansion-health-factors">
                                                <template for:each={account.healthFactors} for:item="factor">
                                                    <div key={factor.label}
                                                         class="health-factor-card health-factor-card--clickable"
                                                         data-factor={factor.factorType}
                                                         data-account={account.accountId}
                                                         data-name={account.accountName}
                                                         onclick={handleHealthFactorClick}>
                                                        <span class="health-factor-label">{factor.label}</span>
                                                        <span class={factor.valueClass}>{factor.value}</span>
                                                        <span class={factor.statusClass}>{factor.status}</span>
                                                    </div>
                                                </template>
                                            </div>

                                            <div class="expansion-actions">
                                                <button class="custom-btn custom-btn--ghost"
                                                        data-id={account.accountId}
                                                        onclick={handleViewFullDashboard}
                                                        type="button">
                                                    View Full Dashboard
                                                </button>
                                                <button class="custom-btn custom-btn--ghost"
                                                        data-id={account.accountId}
                                                        onclick={handleGoToAccount}
                                                        type="button">
                                                    Go to Account
                                                </button>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </div>

                        <!-- Pagination -->
                        <div class="pagination">
                            <button class="pagination-btn"
                                    onclick={handlePrevPage}
                                    disabled={noPrevPage}
                                    type="button">
                                ← Previous
                            </button>
                            <span class="pagination-info">Page {currentPage}</span>
                            <button class="pagination-btn"
                                    onclick={handleNextPage}
                                    disabled={noNextPage}
                                    type="button">
                                Next →
                            </button>
                        </div>
                    </template>

                    <!-- Empty State -->
                    <template if:false={hasAccounts}>
                        <div class="empty-state">
                            <lightning-icon icon-name="utility:search" size="medium" class="empty-icon"></lightning-icon>
                            <p class="empty-text">No accounts found</p>
                            <p class="empty-hint">Try adjusting your filters or check your portfolio assignments</p>
                        </div>
                    </template>
                </div>

                <!-- Detail Sections (Accordion) -->
                <template if:true={hasSummary}>
                <div class="detail-sections">

                    <!-- Open Tasks -->
                    <div class={openTasksAccordionClass}>
                        <button type="button" class="section-accordion-header" data-section="openTasks" onclick={handleToggleSection}>
                            <lightning-icon icon-name="standard:task" size="small" class="section-accordion-icon"></lightning-icon>
                            <span class="section-accordion-title">Open tasks</span>
                            <span class="section-accordion-count">({openTasksCount})</span>
                            <template if:true={hasOverdueTasks}>
                                <span class="section-accordion-badge section-accordion-badge--danger">{summary.totalOverdueTasks} overdue</span>
                            </template>
                            <lightning-icon icon-name="utility:chevronright" size="small" class="section-accordion-chevron"></lightning-icon>
                        </button>
                        <template if:true={secOpenTasks}>
                            <div class="section-accordion-body">
                                <template if:true={hasOpenTasksList}>
                                    <div class="section-accordion-actions">
                                        <button class="custom-btn custom-btn--link" onclick={handleViewAllTasks}>View all</button>
                                    </div>
                                    <div class="activity-list">
                                        <template for:each={openTasksDecorated} for:item="task">
                                            <div key={task.taskId} data-id={task.taskId} onclick={handleDetailRecordClick} class={task.rowClass}>
                                                <div class="activity-icon-wrapper">
                                                    <lightning-icon icon-name="standard:task" size="small"></lightning-icon>
                                                </div>
                                                <div class="activity-content">
                                                    <div class="activity-subject">{task.subject}</div>
                                                    <div class="activity-meta">
                                                        <span>{task.accountName}</span>
                                                        <span class="meta-separator">•</span>
                                                        <span>{task.ownerName}</span>
                                                        <template if:true={task.showUrgencyIndicator}>
                                                            <span class="meta-separator">•</span>
                                                            <span class="task-urgency-label">{task.urgencyLabel}</span>
                                                        </template>
                                                        <span class="meta-separator">•</span>
                                                        <span class={task.dateMetaClass}>{task.dateMeta}</span>
                                                    </div>
                                                </div>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                                <template if:false={hasOpenTasksList}>
                                    <div class="empty-state empty-state--compact">
                                        <lightning-icon icon-name="utility:success" size="small" class="empty-icon"></lightning-icon>
                                        <p class="empty-text">No open tasks</p>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>

                    <!-- Open Cases -->
                    <div class={casesAccordionClass}>
                        <button type="button" class="section-accordion-header" data-section="cases" onclick={handleToggleSection}>
                            <lightning-icon icon-name="standard:case" size="small" class="section-accordion-icon"></lightning-icon>
                            <span class="section-accordion-title">Open support cases</span>
                            <span class="section-accordion-count">({openCasesCountDisplay})</span>
                            <lightning-icon icon-name="utility:chevronright" size="small" class="section-accordion-chevron"></lightning-icon>
                        </button>
                        <template if:true={secCases}>
                            <div class="section-accordion-body">
                                <template if:true={hasOpenCasesList}>
                                    <div class="section-accordion-actions">
                                        <button class="custom-btn custom-btn--link" onclick={handleViewAllCases}>View all</button>
                                    </div>
                                    <div class="table-container table-container--plain data-table-desktop">
                                        <table class="data-table">
                                            <thead>
                                                <tr>
                                                    <th>Case #</th>
                                                    <th>Account</th>
                                                    <th>Subject</th>
                                                    <th>Status</th>
                                                    <th>Priority</th>
                                                    <th class="data-table-col-age">Age</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <template for:each={openCasesDecorated} for:item="caseItem">
                                                    <tr key={caseItem.caseId} data-id={caseItem.caseId} onclick={handleDetailRecordClick} class="table-row">
                                                        <td>
                                                            <span class="case-number">{caseItem.caseNumber}</span>
                                                            <template if:true={caseItem.isEscalated}>
                                                                <lightning-icon icon-name="utility:warning" size="xx-small" class="escalated-icon"></lightning-icon>
                                                            </template>
                                                        </td>
                                                        <td>{caseItem.accountName}</td>
                                                        <td class="subject-cell">{caseItem.subject}</td>
                                                        <td>
                                                            <span class="cell-status-wrap">
                                                                <span class="status-dot"></span>
                                                                <span class="status-text">{caseItem.status}</span>
                                                            </span>
                                                        </td>
                                                        <td>
                                                            <span class="cell-priority-wrap">
                                                                <span class={caseItem.priorityDotClass}></span>
                                                                <span class="priority-text">{caseItem.priority}</span>
                                                            </span>
                                                        </td>
                                                        <td class="data-table-col-age">{caseItem.age} days</td>
                                                    </tr>
                                                </template>
                                            </tbody>
                                        </table>
                                    </div>
                                    <div class="mobile-card-list">
                                        <template for:each={openCasesDecorated} for:item="caseItem">
                                            <div key={caseItem.caseId} data-id={caseItem.caseId} onclick={handleDetailRecordClick} class="mobile-record-card">
                                                <div class="mobile-record-card-title">{caseItem.subject}</div>
                                                <div class="mobile-record-card-meta">
                                                    <span class="case-number">{caseItem.caseNumber}</span>
                                                    <span class="meta-separator">•</span>
                                                    <span>{caseItem.accountName}</span>
                                                    <span class="meta-separator">•</span>
                                                    <span>{caseItem.status}</span>
                                                    <span class="meta-separator">•</span>
                                                    <span>{caseItem.age} days</span>
                                                </div>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                                <template if:false={hasOpenCasesList}>
                                    <div class="empty-state empty-state--compact">
                                        <lightning-icon icon-name="utility:success" size="small" class="empty-icon"></lightning-icon>
                                        <p class="empty-text">No open cases across the portfolio</p>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>

                    <!-- Open Opportunities -->
                    <div class={opportunitiesAccordionClass}>
                        <button type="button" class="section-accordion-header" data-section="opportunities" onclick={handleToggleSection}>
                            <lightning-icon icon-name="standard:opportunity" size="small" class="section-accordion-icon"></lightning-icon>
                            <span class="section-accordion-title">Open opportunities</span>
                            <span class="section-accordion-count">({openOpportunitiesCount})</span>
                            <lightning-icon icon-name="utility:chevronright" size="small" class="section-accordion-chevron"></lightning-icon>
                        </button>
                        <template if:true={secOpportunities}>
                            <div class="section-accordion-body">
                                <template if:true={hasOpenOpportunitiesList}>
                                    <div class="section-accordion-actions">
                                        <button class="custom-btn custom-btn--link" onclick={handleViewAllOpportunities}>View all</button>
                                    </div>
                                    <div class="table-container table-container--plain data-table-desktop">
                                        <table class="data-table">
                                            <thead>
                                                <tr>
                                                    <th>Name</th>
                                                    <th>Account</th>
                                                    <th>Stage</th>
                                                    <th>Close date</th>
                                                    <th>Amount</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <template for:each={openOpportunitiesDecorated} for:item="opp">
                                                    <tr key={opp.opportunityId} data-id={opp.opportunityId} onclick={handleDetailRecordClick} class="table-row">
                                                        <td class="subject-cell">{opp.name}</td>
                                                        <td>{opp.accountName}</td>
                                                        <td><span class="status-badge">{opp.stageName}</span></td>
                                                        <td>{opp.closeDate}</td>
                                                        <td>
                                                            <template if:true={opp.amount}>
                                                                <lightning-formatted-number value={opp.amount} format-style="currency" currency-code="USD"></lightning-formatted-number>
                                                            </template>
                                                        </td>
                                                    </tr>
                                                </template>
                                            </tbody>
                                        </table>
                                    </div>
                                    <div class="mobile-card-list">
                                        <template for:each={openOpportunitiesDecorated} for:item="opp">
                                            <div key={opp.opportunityId} data-id={opp.opportunityId} onclick={handleDetailRecordClick} class="mobile-record-card">
                                                <div class="mobile-record-card-title">{opp.name}</div>
                                                <div class="mobile-record-card-meta">
                                                    <span>{opp.accountName}</span>
                                                    <span class="meta-separator">•</span>
                                                    <span>{opp.stageName}</span>
                                                    <span class="meta-separator">•</span>
                                                    <span>{opp.closeDate}</span>
                                                </div>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                                <template if:false={hasOpenOpportunitiesList}>
                                    <div class="empty-state empty-state--compact">
                                        <lightning-icon icon-name="utility:info" size="small" class="empty-icon"></lightning-icon>
                                        <p class="empty-text">No open opportunities</p>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>

                    <!-- Upcoming Events -->
                    <div class={upcomingEventsAccordionClass}>
                        <button type="button" class="section-accordion-header" data-section="upcomingEvents" onclick={handleToggleSection}>
                            <lightning-icon icon-name="standard:event" size="small" class="section-accordion-icon"></lightning-icon>
                            <span class="section-accordion-title">Upcoming events</span>
                            <span class="section-accordion-count">({upcomingEventsCount})</span>
                            <lightning-icon icon-name="utility:chevronright" size="small" class="section-accordion-chevron"></lightning-icon>
                        </button>
                        <template if:true={secUpcomingEvents}>
                            <div class="section-accordion-body">
                                <template if:true={hasUpcomingEvents}>
                                    <div class="activity-list">
                                        <template for:each={upcomingEventsDecorated} for:item="activity">
                                            <div key={activity.eventId} data-id={activity.eventId} onclick={handleDetailRecordClick} class={activity.rowClass}>
                                                <div class="activity-row-inner">
                                                    <div class="activity-icon-wrapper">
                                                        <lightning-icon icon-name="standard:event" size="small"></lightning-icon>
                                                    </div>
                                                    <div class="activity-content">
                                                        <div class="activity-subject">{activity.subject}</div>
                                                        <div class="activity-meta">
                                                            <span>{activity.activityDate}</span>
                                                            <span class="meta-separator">&#8226;</span>
                                                            <span>{activity.ownerName}</span>
                                                            <span class="meta-separator">&#8226;</span>
                                                            <span>{activity.accountName}</span>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                                <template if:false={hasUpcomingEvents}>
                                    <div class="empty-state empty-state--compact">
                                        <lightning-icon icon-name="utility:info" size="small" class="empty-icon"></lightning-icon>
                                        <p class="empty-text">No upcoming events scheduled</p>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>

                </div>
                </template>

                <!-- Watermark -->
                <div class="csd-watermark">Made by Tribal</div>
            </div>
        </template>

        <!-- Account Detail Modal -->
        <template if:true={showAccountModal}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_large" aria-modal="true">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                                title="Close"
                                onclick={handleCloseAccountModal}
                                type="button">
                            <lightning-icon icon-name="utility:close" size="small" alternative-text="Close"></lightning-icon>
                            <span class="slds-assistive-text">Close</span>
                        </button>
                        <h2 class="slds-text-heading_medium slds-hyphenate">Customer Success Dashboard</h2>
                    </header>
                    <div class="slds-modal__content portfolio-modal__content portfolio-modal__content--flush slds-p-around_none">
                        <c-customer-success-dashboard record-id={selectedAccountId} header-title={selectedAccountName}></c-customer-success-dashboard>
                    </div>
                    <footer class="slds-modal__footer">
                        <button class="custom-btn custom-btn--secondary" onclick={handleCloseAccountModal} type="button">
                            Close
                        </button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <!-- Activity Creation Modal -->
        <template if:true={showActivityModal}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_medium" aria-modal="true" aria-labelledby="portfolioActivityModalHeading">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={handleActivityModalCancel}>
                            <lightning-icon icon-name="utility:close" alternative-text="close" size="small"></lightning-icon>
                            <span class="slds-assistive-text">Close</span>
                        </button>
                        <h2 id="portfolioActivityModalHeading" class="slds-modal__title slds-hyphenate">{activityModalTitle}</h2>
                    </header>
                    <div class="slds-modal__content portfolio-modal__content slds-p-around_medium">
                        <div class="activity-modal-form">

                            <!-- TASK FORM -->
                            <template if:true={isTaskModal}>
                                <div class="activity-form-row">
                                    <div class="activity-form-col">
                                        <lightning-input label="Subject" value={activityForm.Subject} data-field="Subject" onchange={handleActivityFieldChange} required></lightning-input>
                                    </div>
                                </div>

                                <div class="activity-section-header"><span>Additional Details</span></div>
                                <div class="activity-form-row">
                                    <div class="activity-form-col">
                                        <lightning-input type="date" label="Due Date" value={activityForm.ActivityDate} data-field="ActivityDate" onchange={handleActivityFieldChange}></lightning-input>
                                    </div>
                                    <div class="activity-form-col">
                                        <lightning-combobox label="Priority" value={activityForm.Priority} options={taskPriorityOptions} data-field="Priority" onchange={handleActivityFieldChange}></lightning-combobox>
                                    </div>
                                </div>
                                <div class="activity-form-row">
                                    <div class="activity-form-col">
                                        <lightning-combobox label="Status" value={activityForm.Status} options={taskStatusOptions} data-field="Status" onchange={handleActivityFieldChange}></lightning-combobox>
                                    </div>
                                    <div class="activity-form-col">
                                        <lightning-combobox label="Type" value={activityForm.Type} options={taskTypeOptions} data-field="Type" onchange={handleActivityFieldChange}></lightning-combobox>
                                    </div>
                                </div>

                                <div class="activity-section-header"><span>Related Records</span></div>
                                <div class="activity-form-row">
                                    <div class="activity-form-col">
                                        <label class="activity-field-label">Name</label>
                                        <div class="activity-polymorphic-lookup">
                                            <div class="activity-entity-switcher">
                                                <button type="button" class="activity-entity-btn" onclick={toggleWhoIdEntityMenu}>
                                                    <lightning-icon icon-name={whoIdIconName} size="x-small"></lightning-icon>
                                                    <lightning-icon icon-name="utility:down" size="xx-small" class="activity-entity-chevron"></lightning-icon>
                                                </button>
                                                <template if:true={showWhoIdEntityMenu}>
                                                    <div class="activity-entity-dropdown" role="listbox">
                                                        <template for:each={whoIdObjectOptions} for:item="opt">
                                                            <div key={opt.value} class="activity-entity-option" role="option" data-value={opt.value} onclick={selectWhoIdObject}>
                                                                <lightning-icon icon-name={opt.iconName} size="x-small"></lightning-icon>
                                                                <span>{opt.label}</span>
                                                            </div>
                                                        </template>
                                                    </div>
                                                </template>
                                            </div>
                                            <lightning-record-picker label="Name" variant="label-hidden" object-api-name={whoIdObjectType} value={activityForm.WhoId} onchange={handleWhoIdChange} class="activity-record-picker"></lightning-record-picker>
                                        </div>
                                    </div>
                                    <div class="activity-form-col">
                                        <label class="activity-field-label">Related To</label>
                                        <div class="activity-polymorphic-lookup">
                                            <div class="activity-entity-switcher">
                                                <button type="button" class="activity-entity-btn" onclick={toggleWhatIdEntityMenu}>
                                                    <lightning-icon icon-name={whatIdIconName} size="x-small"></lightning-icon>
                                                    <lightning-icon icon-name="utility:down" size="xx-small" class="activity-entity-chevron"></lightning-icon>
                                                </button>
                                                <template if:true={showWhatIdEntityMenu}>
                                                    <div class="activity-entity-dropdown" role="listbox">
                                                        <template for:each={whatIdObjectOptions} for:item="opt">
                                                            <div key={opt.value} class="activity-entity-option" role="option" data-value={opt.value} onclick={selectWhatIdObject}>
                                                                <lightning-icon icon-name={opt.iconName} size="x-small"></lightning-icon>
                                                                <span>{opt.label}</span>
                                                            </div>
                                                        </template>
                                                    </div>
                                                </template>
                                            </div>
                                            <lightning-record-picker label="Related To" variant="label-hidden" object-api-name={whatIdObjectType} value={activityForm.WhatId} onchange={handleWhatIdChange} class="activity-record-picker"></lightning-record-picker>
                                        </div>
                                    </div>
                                </div>
                                <div class="activity-form-row">
                                    <div class="activity-form-col">
                                        <lightning-record-picker label="Assigned To" object-api-name="User" value={activityForm.OwnerId} onchange={handleOwnerIdChange}></lightning-record-picker>
                                    </div>
                                </div>

                                <div class="activity-section-header"><span>Notes</span></div>
                                <div class="activity-form-row activity-notes-section">
                                    <div class="activity-form-col">
                                        <lightning-textarea label="Description" value={activityForm.Description} data-field="Description" onchange={handleActivityFieldChange}></lightning-textarea>
                                    </div>
                                </div>
                            </template>

                            <!-- EVENT FORM -->
                            <template if:true={isEventModal}>
                                <div class="activity-form-row">
                                    <div class="activity-form-col">
                                        <lightning-input label="Subject" value={activityForm.Subject} data-field="Subject" onchange={handleActivityFieldChange} required></lightning-input>
                                    </div>
                                </div>

                                <div class="activity-section-header"><span>Schedule</span></div>
                                <div class="activity-form-row">
                                    <div class="activity-form-col">
                                        <lightning-input type="checkbox" label="All-Day Event" checked={activityForm.IsAllDayEvent} data-field="IsAllDayEvent" onchange={handleActivityFieldChange}></lightning-input>
                                    </div>
                                </div>
                                <div class="activity-form-row">
                                    <div class="activity-form-col">
                                        <lightning-input type="datetime" label="Start" value={activityForm.StartDateTime} data-field="StartDateTime" onchange={handleActivityFieldChange} required></lightning-input>
                                    </div>
                                    <div class="activity-form-col">
                                        <lightning-input type="datetime" label="End" value={activityForm.EndDateTime} data-field="EndDateTime" onchange={handleActivityFieldChange} required></lightning-input>
                                    </div>
                                </div>
