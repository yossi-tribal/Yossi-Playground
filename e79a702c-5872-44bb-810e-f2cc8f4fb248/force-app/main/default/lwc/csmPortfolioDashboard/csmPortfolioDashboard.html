<template>
    <div class="portfolio-dashboard">

        <!-- Header -->
        <div class="portfolio-header">
            <div class="portfolio-header-left">
                <lightning-icon icon-name="standard:work_capacity_usage" size="small" class="portfolio-header-icon"></lightning-icon>
                <div class="portfolio-header-titles">
                    <h1 class="portfolio-title">My Portfolio</h1>
                    <template if:true={hasSummary}>
                        <p class="portfolio-subtitle">{heroSubText}</p>
                    </template>
                </div>
            </div>
            <lightning-button-icon
                icon-name="utility:refresh"
                variant="border-filled"
                alternative-text="Refresh"
                title="Refresh Portfolio"
                onclick={handleRefresh}
                class="refresh-button">
            </lightning-button-icon>
        </div>

        <!-- Loading -->
        <template if:true={isLoading}>
            <div class="loading-container">
                <lightning-spinner alternative-text="Loading portfolio..." size="medium"></lightning-spinner>
            </div>
        </template>

        <!-- Main Content -->
        <template if:false={isLoading}>
            <div class="dashboard-content">

                <!-- Portfolio Hero: Health Card + Suggested Actions -->
                <template if:true={hasSummary}>
                    <div class="portfolio-hero">

                        <!-- Health Hero Card -->
                        <div class="hero-health-area">
                            <div class={heroCardClass}>
                                <div class="hero-label">PORTFOLIO HEALTH</div>
                                <div class="hero-value">
                                    {heroScoreValue}<span class="hero-value-unit">%</span>
                                </div>
                                <div class="hero-sub">Healthy</div>

                                <!-- Health Distribution Bar -->
                                <div class="health-distribution">
                                    <div class="health-bar-container">
                                        <template if:true={healthyPercent}>
                                            <div class="health-bar-segment health-bar-segment--green"
                                                 style={greenBarStyle}
                                                 data-segment="green"
                                                 onclick={handleHealthBarClick}
                                                 title="Healthy"></div>
                                        </template>
                                        <template if:true={needsAttentionPercent}>
                                            <div class="health-bar-segment health-bar-segment--yellow"
                                                 style={yellowBarStyle}
                                                 data-segment="yellow"
                                                 onclick={handleHealthBarClick}
                                                 title="Needs Attention"></div>
                                        </template>
                                        <template if:true={atRiskPercent}>
                                            <div class="health-bar-segment health-bar-segment--red"
                                                 style={redBarStyle}
                                                 data-segment="red"
                                                 onclick={handleHealthBarClick}
                                                 title="At Risk"></div>
                                        </template>
                                        <template if:true={unassessedPercent}>
                                            <div class="health-bar-segment health-bar-segment--gray"
                                                 style={grayBarStyle}
                                                 data-segment="gray"
                                                 onclick={handleHealthBarClick}
                                                 title="Not Assessed"></div>
                                        </template>
                                    </div>

                                    <!-- Legend -->
                                    <div class="health-bar-legend">
                                        <div class="health-legend-item" data-filter="healthy" onclick={handleFilterClick}>
                                            <span class="health-legend-dot health-legend-dot--green"></span>
                                            {summary.healthyAccounts} Healthy
                                        </div>
                                        <div class="health-legend-item" data-filter="needs-attention" onclick={handleFilterClick}>
                                            <span class="health-legend-dot health-legend-dot--yellow"></span>
                                            {summary.needsAttentionAccounts} Attention
                                        </div>
                                        <div class="health-legend-item" data-filter="at-risk" onclick={handleFilterClick}>
                                            <span class="health-legend-dot health-legend-dot--red"></span>
                                            {summary.atRiskAccounts} At Risk
                                        </div>
                                    </div>

                                    <button class="custom-btn custom-btn--secondary" onclick={handleViewHealthBreakdown} type="button">
                                        View Breakdown
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- Suggested Actions -->
                        <div class="hero-actions-area">
                            <template if:true={hasSuggestedActions}>
                                <div class="suggested-actions-container">
                                    <div class="action-section-label">Suggested actions</div>
                                    <template for:each={suggestedActions} for:item="action">
                                        <div key={action.id}
                                             class={action.actionClass}
                                             data-action-type={action.id}
                                             onclick={handleSuggestedActionClick}>
                                            <div class="suggested-action-content">
                                                <span class={action.dotClass}></span>
                                                <span class="suggested-action-badge">{action.badge}</span>
                                                <span class="suggested-action-text">{action.text}</span>
                                            </div>
                                            <lightning-icon icon-name="utility:chevronright" size="xx-small" class="suggested-action-chevron"></lightning-icon>
                                        </div>
                                    </template>
                                </div>
                            </template>
                            <template if:false={hasSuggestedActions}>
                                <div class="suggested-actions-container">
                                    <div class="action-section-label">Portfolio Status</div>
                                    <div class="suggested-action suggested-action--info">
                                        <div class="suggested-action-content">
                                            <span class="suggested-action-dot suggested-action-dot--info"></span>
                                            <span class="suggested-action-text">All accounts are in good standing</span>
                                        </div>
                                    </div>
                                </div>
                            </template>

                            <div class="quick-actions-inline">
                                <button type="button" class="quick-action-btn" onclick={handleLogCall} title="Log a Call">
                                    <lightning-icon icon-name="utility:call" size="small"></lightning-icon>
                                    <span class="quick-action-text">Log call</span>
                                </button>
                                <button type="button" class="quick-action-btn" onclick={handleCreateTask} title="Create Task">
                                    <lightning-icon icon-name="utility:task" size="small"></lightning-icon>
                                    <span class="quick-action-text">New task</span>
                                </button>
                                <button type="button" class="quick-action-btn" onclick={handleCreateEvent} title="Schedule Event">
                                    <lightning-icon icon-name="utility:event" size="small"></lightning-icon>
                                    <span class="quick-action-text">Event</span>
                                </button>
                                <button type="button" class="quick-action-btn" onclick={handleCreateCase} title="Create Case">
                                    <lightning-icon icon-name="utility:case" size="small"></lightning-icon>
                                    <span class="quick-action-text">Case</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </template>

                <!-- Stat Bar -->
                <template if:true={hasSummary}>
                    <div class="stat-bar">
                        <button class="stat-item" data-stat="cases" onclick={handleStatClick} type="button">
                            <span class="stat-dot stat-dot--cases"></span>
                            <span class={openCasesStatClass}>{summary.totalOpenCases}</span>
                            <span class="stat-label">Open Cases</span>
                            <span class="stat-hint">{casesHint}</span>
                        </button>
                        <div class="stat-divider"></div>
                        <button class="stat-item" data-stat="tasks" onclick={handleStatClick} type="button">
                            <span class="stat-dot stat-dot--tasks"></span>
                            <span class={overdueTasksStatClass}>{summary.totalOverdueTasks}</span>
                            <span class="stat-label">Overdue Tasks</span>
                            <span class="stat-hint">{tasksHint}</span>
                        </button>
                        <div class="stat-divider"></div>
                        <button class="stat-item" data-stat="pipeline" onclick={handleStatClick} type="button">
                            <span class="stat-dot stat-dot--pipeline"></span>
                            <span class="stat-value">{pipelineFormatted}</span>
                            <span class="stat-label">Open Pipeline</span>
                            <span class="stat-hint">across portfolio</span>
                        </button>
                    </div>
                </template>

                <!-- Commercial Snapshot -->
                <template if:true={hasSummary}>
                    <div class={snapshotClass}>
                        <button class="snapshot-toggle" onclick={handleSnapshotToggle} type="button">
                            <div class="snapshot-toggle-left">
                                <span class="snapshot-title">PORTFOLIO COMMERCIAL SNAPSHOT</span>
                                <span class="snapshot-hint">Revenue, pipeline, and upcoming renewals</span>
                            </div>
                            <lightning-icon
                                icon-name="utility:chevronright"
                                size="x-small"
                                class="snapshot-chevron">
                            </lightning-icon>
                        </button>

                        <template if:true={snapshotExpanded}>
                            <div class="snapshot-body">
                                <div class="commercial-kpi-row">
                                    <div class="commercial-kpi">
                                        <span class="commercial-kpi-label">LIFETIME VALUE</span>
                                        <span class="commercial-kpi-value">{ltvFormatted}</span>
                                        <span class="commercial-kpi-sub">All closed-won</span>
                                    </div>
                                    <div class="commercial-kpi">
                                        <span class="commercial-kpi-label">OPEN PIPELINE</span>
                                        <span class="commercial-kpi-value">{openPipelineFormatted}</span>
                                        <span class="commercial-kpi-sub">Active opportunities</span>
                                    </div>
                                    <div class="commercial-kpi">
                                        <span class="commercial-kpi-label">WEIGHTED PIPELINE</span>
                                        <span class="commercial-kpi-value">{weightedPipelineFormatted}</span>
                                        <span class="commercial-kpi-sub">By probability</span>
                                    </div>
                                    <div class="commercial-kpi">
                                        <span class="commercial-kpi-label">YTD CLOSED-WON</span>
                                        <span class="commercial-kpi-value">{ytdWonFormatted}</span>
                                        <span class="commercial-kpi-sub">This year</span>
                                    </div>
                                </div>

                                <!-- Upcoming Renewals -->
                                <template if:true={hasRenewals}>
                                    <div class="renewals-section">
                                        <div class="renewals-title">Upcoming Renewals</div>
                                        <template for:each={renewalsDecorated} for:item="renewal">
                                            <a key={renewal.opportunityId}
                                               class="renewal-link"
                                               data-id={renewal.opportunityId}
                                               onclick={handleRenewalClick}
                                               title="Open opportunity">
                                                <div class="renewal-link-left">
                                                    <span class="renewal-account">{renewal.accountName}</span>
                                                    <span class="renewal-opp">{renewal.opportunityName}</span>
                                                </div>
                                                <div class="renewal-link-right">
                                                    <span class="renewal-amount">{renewal.amountFormatted}</span>
                                                    <span class={renewal.daysClass}>{renewal.daysText}</span>
                                                </div>
                                                <lightning-icon icon-name="utility:new_window" size="xx-small" class="renewal-nav-icon"></lightning-icon>
                                            </a>
                                        </template>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>
                </template>

                <!-- Account Table Section -->
                <div class="table-section">
                    <div class="table-header">
                        <div class="table-header-left">
                            <span class="table-title">ACCOUNTS</span>
                            <template if:true={hasAccounts}>
                                <span class="table-count">{paginationInfo}</span>
                            </template>
                        </div>
                        <div class="filter-pills">
                            <template for:each={filterPills} for:item="pill">
                                <button key={pill.value}
                                        class={pill.class}
                                        data-filter={pill.value}
                                        onclick={handleFilterClick}
                                        type="button">
                                    {pill.label}
                                </button>
                            </template>
                        </div>
                    </div>

                    <!-- Desktop Table -->
                    <template if:true={hasAccounts}>
                        <div class="table-container data-table-desktop">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th class="th-sortable" data-field="accountName" onclick={handleSort}>
                                            Account{sortIndicatorAccountName}
                                        </th>
                                        <th class="th-sortable" data-field="healthScore" onclick={handleSort}>
                                            Health{sortIndicatorHealthScore}
                                        </th>
                                        <th>Last Activity</th>
                                        <th>Next Activity</th>
                                        <th>Cases</th>
                                        <th>Tasks</th>
                                        <th>Pipeline</th>
                                        <th>Renewal</th>
                                        <th class="th-chevron"></th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template for:each={accountsDecorated} for:item="account">
                                        <tr key={account.accountId}
                                            class={account.rowClass}
                                            data-id={account.accountId}
                                            onclick={handleAccountRowClick}>
                                            <td>
                                                <a class="account-name-link"
                                                   data-id={account.accountId}
                                                   onclick={navigateToAccount}
                                                   title={account.accountName}>
                                                    {account.accountName}
                                                </a>
                                            </td>
                                            <td>
                                                <span class={account.healthBadgeClass}>{account.healthScore}</span>
                                            </td>
                                            <td>
                                                <span class={account.daysSinceActivityClass}>{account.daysSinceActivityText}</span>
                                            </td>
                                            <td>
                                                <span>{account.nextActivityText}</span>
                                            </td>
                                            <td>
                                                <span class={account.casesClass}>{account.casesDisplay}</span>
                                            </td>
                                            <td>
                                                <span class={account.tasksClass}>{account.tasksDisplay}</span>
                                            </td>
                                            <td>
                                                <span class="cell-currency">{account.pipelineFormatted}</span>
                                            </td>
                                            <td>
                                                <span class={account.renewalClass}>{account.renewalDisplay}</span>
                                            </td>
                                            <td class="td-chevron">
                                                <lightning-icon icon-name="utility:chevronright" size="x-small" class={account.chevronClass}></lightning-icon>
                                            </td>
                                        </tr>
                                        <!-- Inline Expansion -->
                                        <template if:true={account.isExpanded}>
                                            <tr key={account.expansionKey} class="expansion-row">
                                                <td colspan="9">
                                                    <div class="expansion-card">
                                                        <template if:true={account.hasRecentActivities}>
                                                            <div class="expansion-section-label">Recent Activity</div>
                                                            <div class="expansion-recent-activities">
                                                                <template for:each={account.recentActivities} for:item="activity">
                                                                    <div key={activity.subject} class="recent-activity-item">
                                                                        <span class="recent-activity-type">{activity.activityType}</span>
                                                                        <span class="recent-activity-subject">{activity.subject}</span>
                                                                        <span class="recent-activity-date">{activity.activityDate}</span>
                                                                    </div>
                                                                </template>
                                                            </div>
                                                        </template>

                                                        <template if:true={account.primaryContactName}>
                                                            <div class="expansion-section-label">Key Contact</div>
                                                            <div class="expansion-contact">
                                                                <lightning-icon icon-name="standard:contact" size="x-small"></lightning-icon>
                                                                <span class="expansion-contact-name">{account.primaryContactName}</span>
                                                            </div>
                                                        </template>

                                                        <div class="expansion-actions">
                                                            <button class="custom-btn custom-btn--primary"
                                                                    data-id={account.accountId}
                                                                    onclick={handleViewFullDashboard}
                                                                    type="button">
                                                                View Full Dashboard
                                                            </button>
                                                            <button class="custom-btn custom-btn--secondary"
                                                                    data-id={account.accountId}
                                                                    onclick={handleGoToAccount}
                                                                    type="button">
                                                                Go to Account
                                                            </button>
                                                        </div>
                                                    </div>
                                                </td>
                                            </tr>
                                        </template>
                                    </template>
                                </tbody>
                            </table>
                        </div>

                        <!-- Mobile Cards -->
                        <div class="mobile-card-list">
                            <template for:each={accountsDecorated} for:item="account">
                                <div key={account.accountId}
                                     class="mobile-account-card"
                                     data-id={account.accountId}
                                     onclick={handleAccountRowClick}>
                                    <div class="mobile-card-header">
                                        <span class="mobile-card-name">{account.accountName}</span>
                                        <div class="mobile-card-header-right">
                                            <span class={account.healthBadgeClass}>{account.healthScore}</span>
                                            <lightning-icon icon-name="utility:chevronright" size="xx-small" class={account.chevronClass}></lightning-icon>
                                        </div>
                                    </div>
                                    <div class="mobile-card-metrics">
                                        <div class="mobile-card-metric">
                                            <span class="mobile-card-metric-label">Cases</span>
                                            <span class="mobile-card-metric-value">{account.casesDisplay}</span>
                                        </div>
                                        <div class="mobile-card-metric">
                                            <span class="mobile-card-metric-label">Tasks</span>
                                            <span class="mobile-card-metric-value">{account.tasksDisplay}</span>
                                        </div>
                                        <div class="mobile-card-metric">
                                            <span class="mobile-card-metric-label">Pipeline</span>
                                            <span class="mobile-card-metric-value">{account.pipelineFormatted}</span>
                                        </div>
                                        <div class="mobile-card-metric">
                                            <span class="mobile-card-metric-label">Last Activity</span>
                                            <span class="mobile-card-metric-value">{account.daysSinceActivityText}</span>
                                        </div>
                                    </div>
                                    <!-- Mobile Expansion -->
                                    <template if:true={account.isExpanded}>
                                        <div class="mobile-expansion-content">
                                            <template if:true={account.hasRecentActivities}>
                                                <div class="expansion-section-label">Recent Activity</div>
                                                <div class="expansion-recent-activities">
                                                    <template for:each={account.recentActivities} for:item="activity">
                                                        <div key={activity.subject} class="recent-activity-item">
                                                            <span class="recent-activity-type">{activity.activityType}</span>
                                                            <span class="recent-activity-subject">{activity.subject}</span>
                                                            <span class="recent-activity-date">{activity.activityDate}</span>
                                                        </div>
                                                    </template>
                                                </div>
                                            </template>

                                            <template if:true={account.primaryContactName}>
                                                <div class="expansion-section-label">Key Contact</div>
                                                <div class="expansion-contact">
                                                    <lightning-icon icon-name="standard:contact" size="x-small"></lightning-icon>
                                                    <span class="expansion-contact-name">{account.primaryContactName}</span>
                                                </div>
                                            </template>

                                            <div class="expansion-actions">
                                                <button class="custom-btn custom-btn--primary"
                                                        data-id={account.accountId}
                                                        onclick={handleViewFullDashboard}
                                                        type="button">
                                                    View Full Dashboard
                                                </button>
                                                <button class="custom-btn custom-btn--secondary"
                                                        data-id={account.accountId}
                                                        onclick={handleGoToAccount}
                                                        type="button">
                                                    Go to Account
                                                </button>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </div>

                        <!-- Pagination -->
                        <div class="pagination">
                            <button class="pagination-btn"
                                    onclick={handlePrevPage}
                                    disabled={noPrevPage}
                                    type="button">
                                ← Previous
                            </button>
                            <span class="pagination-info">Page {currentPage}</span>
                            <button class="pagination-btn"
                                    onclick={handleNextPage}
                                    disabled={noNextPage}
                                    type="button">
                                Next →
                            </button>
                        </div>
                    </template>

                    <!-- Empty State -->
                    <template if:false={hasAccounts}>
                        <div class="empty-state">
                            <lightning-icon icon-name="utility:search" size="medium" class="empty-icon"></lightning-icon>
                            <p class="empty-text">No accounts found</p>
                            <p class="empty-hint">Try adjusting your filters or check your portfolio assignments</p>
                        </div>
                    </template>
                </div>

                <!-- Watermark -->
                <div class="csd-watermark">Made by Tribal</div>
            </div>
        </template>

        <!-- Account Detail Modal -->
        <template if:true={showAccountModal}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_large" aria-modal="true">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                                title="Close"
                                onclick={handleCloseAccountModal}
                                type="button">
                            <lightning-icon icon-name="utility:close" size="small" alternative-text="Close"></lightning-icon>
                            <span class="slds-assistive-text">Close</span>
                        </button>
                        <h2 class="slds-text-heading_medium slds-hyphenate">Account Dashboard</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_none">
                        <c-customer-success-dashboard record-id={selectedAccountId}></c-customer-success-dashboard>
                    </div>
                    <footer class="slds-modal__footer">
                        <button class="custom-btn custom-btn--secondary" onclick={handleCloseAccountModal} type="button">
                            Close
                        </button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <!-- Activity Creation Modal -->
        <template if:true={showActivityModal}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_medium" aria-modal="true" aria-labelledby="portfolioActivityModalHeading">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={handleActivityModalCancel}>
                            <lightning-icon icon-name="utility:close" alternative-text="close" size="small"></lightning-icon>
                            <span class="slds-assistive-text">Close</span>
                        </button>
                        <h2 id="portfolioActivityModalHeading" class="slds-modal__title slds-hyphenate">{activityModalTitle}</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <div class="activity-modal-form">

                            <!-- TASK FORM -->
                            <template if:true={isTaskModal}>
                                <div class="activity-form-row">
                                    <div class="activity-form-col">
                                        <lightning-input label="Subject" value={activityForm.Subject} data-field="Subject" onchange={handleActivityFieldChange} required></lightning-input>
                                    </div>
                                </div>

                                <div class="activity-section-header"><span>Additional Details</span></div>
                                <div class="activity-form-row">
                                    <div class="activity-form-col">
                                        <lightning-input type="date" label="Due Date" value={activityForm.ActivityDate} data-field="ActivityDate" onchange={handleActivityFieldChange}></lightning-input>
                                    </div>
                                    <div class="activity-form-col">
                                        <lightning-combobox label="Priority" value={activityForm.Priority} options={taskPriorityOptions} data-field="Priority" onchange={handleActivityFieldChange}></lightning-combobox>
                                    </div>
                                </div>
                                <div class="activity-form-row">
                                    <div class="activity-form-col">
                                        <lightning-combobox label="Status" value={activityForm.Status} options={taskStatusOptions} data-field="Status" onchange={handleActivityFieldChange}></lightning-combobox>
                                    </div>
                                    <div class="activity-form-col">
                                        <lightning-combobox label="Type" value={activityForm.Type} options={taskTypeOptions} data-field="Type" onchange={handleActivityFieldChange}></lightning-combobox>
                                    </div>
                                </div>

                                <div class="activity-section-header"><span>Related Records</span></div>
                                <div class="activity-form-row">
                                    <div class="activity-form-col">
                                        <label class="activity-field-label">Name</label>
                                        <div class="activity-polymorphic-lookup">
                                            <div class="activity-entity-switcher">
                                                <button type="button" class="activity-entity-btn" onclick={toggleWhoIdEntityMenu}>
                                                    <lightning-icon icon-name={whoIdIconName} size="x-small"></lightning-icon>
                                                    <lightning-icon icon-name="utility:down" size="xx-small" class="activity-entity-chevron"></lightning-icon>
                                                </button>
                                                <template if:true={showWhoIdEntityMenu}>
                                                    <div class="activity-entity-dropdown" role="listbox">
                                                        <template for:each={whoIdObjectOptions} for:item="opt">
                                                            <div key={opt.value} class="activity-entity-option" role="option" data-value={opt.value} onclick={selectWhoIdObject}>
                                                                <lightning-icon icon-name={opt.iconName} size="x-small"></lightning-icon>
                                                                <span>{opt.label}</span>
                                                            </div>
                                                        </template>
                                                    </div>
                                                </template>
                                            </div>
                                            <lightning-record-picker label="Name" variant="label-hidden" object-api-name={whoIdObjectType} value={activityForm.WhoId} onchange={handleWhoIdChange} class="activity-record-picker"></lightning-record-picker>
                                        </div>
                                    </div>
                                    <div class="activity-form-col">
                                        <label class="activity-field-label">Related To</label>
                                        <div class="activity-polymorphic-lookup">
                                            <div class="activity-entity-switcher">
                                                <button type="button" class="activity-entity-btn" onclick={toggleWhatIdEntityMenu}>
                                                    <lightning-icon icon-name={whatIdIconName} size="x-small"></lightning-icon>
                                                    <lightning-icon icon-name="utility:down" size="xx-small" class="activity-entity-chevron"></lightning-icon>
                                                </button>
                                                <template if:true={showWhatIdEntityMenu}>
                                                    <div class="activity-entity-dropdown" role="listbox">
                                                        <template for:each={whatIdObjectOptions} for:item="opt">
                                                            <div key={opt.value} class="activity-entity-option" role="option" data-value={opt.value} onclick={selectWhatIdObject}>
                                                                <lightning-icon icon-name={opt.iconName} size="x-small"></lightning-icon>
                                                                <span>{opt.label}</span>
                                                            </div>
                                                        </template>
                                                    </div>
                                                </template>
                                            </div>
                                            <lightning-record-picker label="Related To" variant="label-hidden" object-api-name={whatIdObjectType} value={activityForm.WhatId} onchange={handleWhatIdChange} class="activity-record-picker"></lightning-record-picker>
                                        </div>
                                    </div>
                                </div>
                                <div class="activity-form-row">
                                    <div class="activity-form-col">
                                        <lightning-record-picker label="Assigned To" object-api-name="User" value={activityForm.OwnerId} onchange={handleOwnerIdChange}></lightning-record-picker>
                                    </div>
                                </div>

                                <div class="activity-section-header"><span>Notes</span></div>
                                <div class="activity-form-row activity-notes-section">
                                    <div class="activity-form-col">
                                        <lightning-textarea label="Description" value={activityForm.Description} data-field="Description" onchange={handleActivityFieldChange}></lightning-textarea>
                                    </div>
                                </div>
                            </template>

                            <!-- EVENT FORM -->
                            <template if:true={isEventModal}>
                                <div class="activity-form-row">
                                    <div class="activity-form-col">
                                        <lightning-input label="Subject" value={activityForm.Subject} data-field="Subject" onchange={handleActivityFieldChange} required></lightning-input>
                                    </div>
                                </div>

                                <div class="activity-section-header"><span>Schedule</span></div>
                                <div class="activity-form-row">
                                    <div class="activity-form-col">
                                        <lightning-input type="checkbox" label="All-Day Event" checked={activityForm.IsAllDayEvent} data-field="IsAllDayEvent" onchange={handleActivityFieldChange}></lightning-input>
                                    </div>
                                </div>
                                <div class="activity-form-row">
                                    <div class="activity-form-col">
                                        <lightning-input type="datetime" label="Start" value={activityForm.StartDateTime} data-field="StartDateTime" onchange={handleActivityFieldChange} required></lightning-input>
                                    </div>
                                    <div class="activity-form-col">
                                        <lightning-input type="datetime" label="End" value={activityForm.EndDateTime} data-field="EndDateTime" onchange={handleActivityFieldChange} required></lightning-input>
                                    </div>
                                </div>

                                <div class="activity-section-header"><span>Related Records</span></div>
                                <div class="activity-form-row">
                                    <div class="activity-form-col">
                                        <label class="activity-field-label">Name</label>
                                        <div class="activity-polymorphic-lookup">
                                            <div class="activity-entity-switcher">
                                                <button type="button" class="activity-entity-btn" onclick={toggleWhoIdEntityMenu}>
                                                    <lightning-icon icon-name={whoIdIconName} size="x-small"></lightning-icon>
                                                    <lightning-icon icon-name="utility:down" size="xx-small" class="activity-entity-chevron"></lightning-icon>
                                                </button>
                                                <template if:true={showWhoIdEntityMenu}>
                                                    <div class="activity-entity-dropdown" role="listbox">
                                                        <template for:each={whoIdObjectOptions} for:item="opt">
                                                            <div key={opt.value} class="activity-entity-option" role="option" data-value={opt.value} onclick={selectWhoIdObject}>
                                                                <lightning-icon icon-name={opt.iconName} size="x-small"></lightning-icon>
                                                                <span>{opt.label}</span>
                                                            </div>
                                                        </template>
                                                    </div>
                                                </template>
                                            </div>
                                            <lightning-record-picker label="Name" variant="label-hidden" object-api-name={whoIdObjectType} value={activityForm.WhoId} onchange={handleWhoIdChange} class="activity-record-picker"></lightning-record-picker>
                                        </div>
                                    </div>
                                    <div class="activity-form-col">
                                        <label class="activity-field-label">Related To</label>
                                        <div class="activity-polymorphic-lookup">
                                            <div class="activity-entity-switcher">
                                                <button type="button" class="activity-entity-btn" onclick={toggleWhatIdEntityMenu}>
                                                    <lightning-icon icon-name={whatIdIconName} size="x-small"></lightning-icon>
                                                    <lightning-icon icon-name="utility:down" size="xx-small" class="activity-entity-chevron"></lightning-icon>
                                                </button>
                                                <template if:true={showWhatIdEntityMenu}>
                                                    <div class="activity-entity-dropdown" role="listbox">
                                                        <template for:each={whatIdObjectOptions} for:item="opt">
                                                            <div key={opt.value} class="activity-entity-option" role="option" data-value={opt.value} onclick={selectWhatIdObject}>
                                                                <lightning-icon icon-name={opt.iconName} size="x-small"></lightning-icon>
                                                                <span>{opt.label}</span>
                                                            </div>
                                                        </template>
                                                    </div>
                                                </template>
                                            </div>
                                            <lightning-record-picker label="Related To" variant="label-hidden" object-api-name={whatIdObjectType} value={activityForm.WhatId} onchange={handleWhatIdChange} class="activity-record-picker"></lightning-record-picker>
                                        </div>
                                    </div>
                                </div>
                                <div class="activity-form-row">
                                    <div class="activity-form-col">
                                        <lightning-input label="Location" value={activityForm.Location} data-field="Location" onchange={handleActivityFieldChange}></lightning-input>
                                    </div>
                                    <div class="activity-form-col">
                                        <lightning-record-picker label="Assigned To" object-api-name="User" value={activityForm.OwnerId} onchange={handleOwnerIdChange}></lightning-record-picker>
                                    </div>
                                </div>

                                <div class="activity-section-header"><span>Notes</span></div>
                                <div class="activity-form-row activity-notes-section">
                                    <div class="activity-form-col">
                                        <lightning-textarea label="Description" value={activityForm.Description} data-field="Description" onchange={handleActivityFieldChange}></lightning-textarea>
                                    </div>
                                </div>
                            </template>

                        </div>
                    </div>
                    <footer class="slds-modal__footer">
                        <button class="slds-button slds-button_neutral" onclick={handleActivityModalCancel}>Cancel</button>
                        <button class="slds-button slds-button_brand" onclick={handleActivityModalSubmit} disabled={activitySaveDisabled}>Save</button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <!-- Health Breakdown Modal -->
        <template if:true={showHealthBreakdownModal}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_medium" aria-modal="true">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                                title="Close"
                                onclick={handleCloseHealthBreakdown}
                                type="button">
                            <lightning-icon icon-name="utility:close" size="small" alternative-text="Close"></lightning-icon>
                            <span class="slds-assistive-text">Close</span>
                        </button>
                        <h2 class="slds-text-heading_medium slds-hyphenate">Health Score Breakdown</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <template if:true={healthBreakdown}>
                            <div class="health-breakdown-content">
                                <div class="breakdown-section">
                                    <div class="breakdown-header">
                                        <h3 class="breakdown-title">Portfolio Health Score</h3>
                                        <div class={heroHealthBadgeClass}>{heroScoreValue}%</div>
                                    </div>
                                    <div class="breakdown-description">
                                        <p>Current portfolio health across {summary.totalAccounts} accounts based on activity recency, case load, task completion, and engagement.</p>
                                    </div>
                                </div>

                                <div class="breakdown-section">
                                    <h3 class="breakdown-title">Contributing Factors</h3>

                                    <div class="breakdown-factor">
                                        <div class="factor-row">
                                            <span class="factor-label">Activity Recency</span>
                                            <span class="factor-value">{healthBreakdown.accountsInactiveRed} at risk</span>
                                        </div>
                                        <div class="factor-distribution">
                                            <span class="health-badge health-badge--green">{healthBreakdown.accountsInactiveGreen}</span>
                                            <span class="health-badge health-badge--yellow">{healthBreakdown.accountsInactiveYellow}</span>
                                            <span class="health-badge health-badge--red">{healthBreakdown.accountsInactiveRed}</span>
                                        </div>
                                        <p class="factor-note">Thresholds: &lt;15d healthy, 15-29d warning, 30+d at risk</p>
                                    </div>

                                    <div class="breakdown-factor">
                                        <div class="factor-row">
                                            <span class="factor-label">Overdue Tasks</span>
                                            <span class="factor-value">{healthBreakdown.accountsOverdueRed} at risk</span>
                                        </div>
                                        <div class="factor-distribution">
                                            <span class="health-badge health-badge--green">{healthBreakdown.accountsOverdueGreen}</span>
                                            <span class="health-badge health-badge--yellow">{healthBreakdown.accountsOverdueYellow}</span>
                                            <span class="health-badge health-badge--red">{healthBreakdown.accountsOverdueRed}</span>
                                        </div>
                                        <p class="factor-note">Thresholds: 0 healthy, 1-2 warning, 3+ at risk</p>
                                    </div>

                                    <div class="breakdown-factor">
                                        <div class="factor-row">
                                            <span class="factor-label">High-Priority Cases</span>
                                            <span class="factor-value">{healthBreakdown.accountsHighPriRed} at risk</span>
                                        </div>
                                        <div class="factor-distribution">
                                            <span class="health-badge health-badge--green">{healthBreakdown.accountsHighPriGreen}</span>
                                            <span class="health-badge health-badge--yellow">{healthBreakdown.accountsHighPriYellow}</span>
                                            <span class="health-badge health-badge--red">{healthBreakdown.accountsHighPriRed}</span>
                                        </div>
                                        <p class="factor-note">Thresholds: 0 healthy, 1 warning, 2+ at risk</p>
                                    </div>

                                    <div class="breakdown-factor">
                                        <div class="factor-row">
                                            <span class="factor-label">Total Open Cases</span>
                                            <span class="factor-value">{healthBreakdown.accountsCasesRed} at risk</span>
                                        </div>
                                        <div class="factor-distribution">
                                            <span class="health-badge health-badge--green">{healthBreakdown.accountsCasesGreen}</span>
                                            <span class="health-badge health-badge--yellow">{healthBreakdown.accountsCasesYellow}</span>
                                            <span class="health-badge health-badge--red">{healthBreakdown.accountsCasesRed}</span>
                                        </div>
                                        <p class="factor-note">Thresholds: 0-2 healthy, 3-4 warning, 5+ at risk</p>
                                    </div>
                                </div>
                            </div>
                        </template>
                        <template if:false={healthBreakdown}>
                            <div class="loading-container" style="min-height: 200px;">
                                <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
                            </div>
                        </template>
                    </div>
                    <footer class="slds-modal__footer">
                        <button class="custom-btn custom-btn--secondary" onclick={handleCloseHealthBreakdown} type="button">Close</button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <!-- Suggested Action Detail Modal -->
        <template if:true={showSuggestedActionModal}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_medium" aria-modal="true">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                                title="Close"
                                onclick={handleCloseSuggestedActionModal}
                                type="button">
                            <lightning-icon icon-name="utility:close" size="small" alternative-text="Close"></lightning-icon>
                            <span class="slds-assistive-text">Close</span>
                        </button>
                        <h2 class="slds-text-heading_medium slds-hyphenate">{suggestedActionModalTitle}</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <template if:true={suggestedActionModalLoading}>
                            <div class="loading-container" style="min-height: 200px;">
                                <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
                            </div>
                        </template>
                        <template if:false={suggestedActionModalLoading}>
                            <template if:true={hasSuggestedActionModalItems}>
                                <div class="action-modal-list">
                                    <template for:each={suggestedActionModalItems} for:item="item">
                                        <div key={item.id}
                                             class="action-modal-item"
                                             data-id={item.id}
                                             data-type={suggestedActionModalType}
                                             onclick={handleActionModalItemClick}>
                                            <div class="action-modal-item-left">
                                                <span class="action-modal-item-account">{item.accountName}</span>
                                                <span class="action-modal-item-subject">{item.subject}</span>
                                            </div>
                                            <div class="action-modal-item-right">
                                                <span class={item.metricClass}>{item.metric}</span>
                                            </div>
                                            <lightning-icon icon-name="utility:chevronright" size="xx-small" class="action-modal-item-chevron"></lightning-icon>
                                        </div>
                                    </template>
                                </div>
                            </template>
                            <template if:false={hasSuggestedActionModalItems}>
                                <div class="empty-state">
                                    <p class="empty-text">No items found</p>
                                </div>
                            </template>
                        </template>
                    </div>
                    <footer class="slds-modal__footer">
                        <button class="custom-btn custom-btn--secondary" onclick={handleCloseSuggestedActionModal} type="button">Close</button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
    </div>
</template>
