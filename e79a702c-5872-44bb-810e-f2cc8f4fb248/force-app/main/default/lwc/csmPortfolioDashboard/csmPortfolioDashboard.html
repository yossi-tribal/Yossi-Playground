                                <div class="activity-section-header"><span>Related Records</span></div>
                                <div class="activity-form-row">
                                    <div class="activity-form-col">
                                        <label class="activity-field-label">Name</label>
                                        <div class="activity-polymorphic-lookup">
                                            <div class="activity-entity-switcher">
                                                <button type="button" class="activity-entity-btn" onclick={toggleWhoIdEntityMenu}>
                                                    <lightning-icon icon-name={whoIdIconName} size="x-small"></lightning-icon>
                                                    <lightning-icon icon-name="utility:down" size="xx-small" class="activity-entity-chevron"></lightning-icon>
                                                </button>
                                                <template if:true={showWhoIdEntityMenu}>
                                                    <div class="activity-entity-dropdown" role="listbox">
                                                        <template for:each={whoIdObjectOptions} for:item="opt">
                                                            <div key={opt.value} class="activity-entity-option" role="option" data-value={opt.value} onclick={selectWhoIdObject}>
                                                                <lightning-icon icon-name={opt.iconName} size="x-small"></lightning-icon>
                                                                <span>{opt.label}</span>
                                                            </div>
                                                        </template>
                                                    </div>
                                                </template>
                                            </div>
                                            <lightning-record-picker label="Name" variant="label-hidden" object-api-name={whoIdObjectType} value={activityForm.WhoId} onchange={handleWhoIdChange} class="activity-record-picker"></lightning-record-picker>
                                        </div>
                                    </div>
                                    <div class="activity-form-col">
                                        <label class="activity-field-label">Related To</label>
                                        <div class="activity-polymorphic-lookup">
                                            <div class="activity-entity-switcher">
                                                <button type="button" class="activity-entity-btn" onclick={toggleWhatIdEntityMenu}>
                                                    <lightning-icon icon-name={whatIdIconName} size="x-small"></lightning-icon>
                                                    <lightning-icon icon-name="utility:down" size="xx-small" class="activity-entity-chevron"></lightning-icon>
                                                </button>
                                                <template if:true={showWhatIdEntityMenu}>
                                                    <div class="activity-entity-dropdown" role="listbox">
                                                        <template for:each={whatIdObjectOptions} for:item="opt">
                                                            <div key={opt.value} class="activity-entity-option" role="option" data-value={opt.value} onclick={selectWhatIdObject}>
                                                                <lightning-icon icon-name={opt.iconName} size="x-small"></lightning-icon>
                                                                <span>{opt.label}</span>
                                                            </div>
                                                        </template>
                                                    </div>
                                                </template>
                                            </div>
                                            <lightning-record-picker label="Related To" variant="label-hidden" object-api-name={whatIdObjectType} value={activityForm.WhatId} onchange={handleWhatIdChange} class="activity-record-picker"></lightning-record-picker>
                                        </div>
                                    </div>
                                </div>
                                <div class="activity-form-row">
                                    <div class="activity-form-col">
                                        <lightning-input label="Location" value={activityForm.Location} data-field="Location" onchange={handleActivityFieldChange}></lightning-input>
                                    </div>
                                    <div class="activity-form-col">
                                        <lightning-record-picker label="Assigned To" object-api-name="User" value={activityForm.OwnerId} onchange={handleOwnerIdChange}></lightning-record-picker>
                                    </div>
                                </div>

                                <div class="activity-section-header"><span>Notes</span></div>
                                <div class="activity-form-row activity-notes-section">
                                    <div class="activity-form-col">
                                        <lightning-textarea label="Description" value={activityForm.Description} data-field="Description" onchange={handleActivityFieldChange}></lightning-textarea>
                                    </div>
                                </div>
                            </template>

                        </div>
                    </div>
                    <footer class="slds-modal__footer">
                        <button class="slds-button slds-button_neutral" onclick={handleActivityModalCancel}>Cancel</button>
                        <button class="slds-button slds-button_brand" onclick={handleActivityModalSubmit} disabled={activitySaveDisabled}>Save</button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <!-- Health Breakdown Modal -->
        <template if:true={showHealthBreakdownModal}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_medium" aria-modal="true">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                                title="Close"
                                onclick={handleCloseHealthBreakdown}
                                type="button">
                            <lightning-icon icon-name="utility:close" size="small" alternative-text="Close"></lightning-icon>
                            <span class="slds-assistive-text">Close</span>
                        </button>
                        <h2 class="slds-text-heading_medium slds-hyphenate">Health Score Breakdown</h2>
                    </header>
                    <div class="slds-modal__content portfolio-modal__content slds-p-around_medium">
                        <template if:true={healthBreakdown}>
                            <div class="health-breakdown-content">
                                <div class="breakdown-section">
                                    <div class="breakdown-header">
                                        <h3 class="breakdown-title">Overall Health Score</h3>
                                        <div class={heroHealthBadgeClass}>{heroScoreValue}%</div>
                                    </div>
                                    <div class="breakdown-description">
                                        <p>Current portfolio health across {summary.totalAccounts} accounts based on activity recency, case load, task completion, and engagement.</p>
                                    </div>
                                </div>

                                <div class="breakdown-section">
                                    <h3 class="breakdown-title">Portfolio Snapshot</h3>
                                    <div class="portfolio-summary-grid">
                                        <template for:each={portfolioStatusSummary} for:item="item">
                                            <div key={item.key} class="portfolio-summary-card">
                                                <span class="portfolio-summary-label">{item.label}</span>
                                                <span class={item.valueClass}>{item.value}</span>
                                            </div>
                                        </template>
                                    </div>
                                    <p class="breakdown-text">This is the current health distribution across the entire portfolio.</p>
                                </div>

                                <div class="breakdown-section">
                                    <h3 class="breakdown-title">Contributing Factors</h3>
                                    <template for:each={portfolioBreakdownFactors} for:item="factor">
                                        <div key={factor.key} class="breakdown-factor">
                                            <div class="factor-row">
                                                <span class="factor-label">{factor.label}</span>
                                                <span class={factor.headlineClass}>{factor.headlineCount}</span>
                                            </div>
                                            <p class="factor-note">{factor.headlineText}</p>
                                            <div class="portfolio-factor-pills">
                                                <template for:each={factor.stats} for:item="stat">
                                                    <span key={stat.key} class={stat.className}>{stat.label}: {stat.value}</span>
                                                </template>
                                            </div>
                                            <p class="breakdown-text">Thresholds: {factor.thresholds}</p>
                                        </div>
                                    </template>
                                </div>

                                <div class="breakdown-footer">
                                    <p class="breakdown-timestamp">Portfolio-wide health factors update when the dashboard refreshes.</p>
                                </div>
                            </div>
                        </template>
                        <template if:false={healthBreakdown}>
                            <div class="loading-container" style="min-height: 200px;">
                                <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
                            </div>
                        </template>
                    </div>
                    <footer class="slds-modal__footer">
                        <button class="custom-btn custom-btn--secondary" onclick={handleCloseHealthBreakdown} type="button">Close</button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <!-- Suggested Action Detail Modal -->
        <template if:true={showSuggestedActionModal}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_medium" aria-modal="true">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                                title="Close"
                                onclick={handleCloseSuggestedActionModal}
                                type="button">
                            <lightning-icon icon-name="utility:close" size="small" alternative-text="Close"></lightning-icon>
                            <span class="slds-assistive-text">Close</span>
                        </button>
                        <h2 class="slds-text-heading_medium slds-hyphenate">{suggestedActionModalTitle}</h2>
                    </header>
                    <div class="slds-modal__content portfolio-modal__content slds-p-around_medium">
                        <template if:true={suggestedActionModalLoading}>
                            <div class="loading-container" style="min-height: 200px;">
                                <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
                            </div>
                        </template>
                        <template if:false={suggestedActionModalLoading}>
                            <template if:true={hasSuggestedActionModalItems}>
                                <div class="action-modal-list">
                                    <template for:each={suggestedActionModalItems} for:item="item">
                                        <div key={item.id}
                                             class="action-modal-item"
                                             data-id={item.id}
                                             data-type={suggestedActionModalType}
                                             onclick={handleActionModalItemClick}>
                                            <div class="action-modal-item-left">
                                                <span class="action-modal-item-account">{item.accountName}</span>
                                                <span class="action-modal-item-subject">{item.subject}</span>
                                            </div>
                                            <div class="action-modal-item-right">
                                                <span class={item.metricClass}>{item.metric}</span>
                                                <template if:true={item.metricSub}>
                                                    <span class={item.metricSubClass}>{item.metricSub}</span>
                                                </template>
                                            </div>
                                            <lightning-icon icon-name="utility:chevronright" size="xx-small" class="action-modal-item-chevron"></lightning-icon>
                                        </div>
                                    </template>
                                </div>
                            </template>
                            <template if:false={hasSuggestedActionModalItems}>
                                <div class="empty-state">
                                    <p class="empty-text">No items found</p>
                                </div>
                            </template>
                        </template>
                    </div>
                    <footer class="slds-modal__footer">
                        <button class="custom-btn custom-btn--secondary" onclick={handleCloseSuggestedActionModal} type="button">Close</button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <!-- KPI Details Modal -->
        <template if:true={showKpiModal}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_large" aria-modal="true">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                                title="Close"
                                onclick={handleCloseKpiModal}
                                type="button">
                            <lightning-icon icon-name="utility:close" alternative-text="close" size="small"></lightning-icon>
                            <span class="slds-assistive-text">Close</span>
                        </button>
                        <h2 class="slds-modal__title slds-hyphenate">{kpiModalTitle}</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <template if:true={showCasesModal}>
                            <template if:true={hasKpiModalData}>
                                <div class="kpi-modal-table-container">
                                    <table class="data-table">
                                        <thead>
                                            <tr>
                                                <th>Account</th>
                                                <th>Case #</th>
                                                <th>Subject</th>
                                                <th>Status</th>
                                                <th>Priority</th>
                                                <th>Owner</th>
                                                <th>Age (days)</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <template for:each={kpiModalData} for:item="caseItem">
                                                <tr key={caseItem.caseId} data-id={caseItem.caseId} onclick={handleKpiRecordClick} class="table-row">
                                                    <td>{caseItem.accountName}</td>
                                                    <td>
                                                        <span class="case-number">{caseItem.caseNumber}</span>
                                                        <template if:true={caseItem.isEscalated}>
                                                            <lightning-icon icon-name="utility:warning" size="xx-small" class="escalated-icon"></lightning-icon>
                                                        </template>
                                                    </td>
                                                    <td class="subject-cell">{caseItem.subject}</td>
                                                    <td><span class="status-badge">{caseItem.status}</span></td>
                                                    <td><span class="priority-badge">{caseItem.priority}</span></td>
                                                    <td>{caseItem.ownerName}</td>
                                                    <td>{caseItem.age}</td>
                                                </tr>
                                            </template>
                                        </tbody>
                                    </table>
                                </div>
                            </template>
                            <template if:false={hasKpiModalData}>
                                <div class="kpi-modal-empty-state">
                                    <lightning-icon icon-name="utility:success" size="large" class="empty-state-icon"></lightning-icon>
                                    <p class="empty-state-message">{kpiModalEmptyMessage}</p>
                                </div>
                            </template>
                        </template>

                        <template if:true={showTasksModal}>
                            <template if:true={hasKpiModalData}>
                                <div class="kpi-modal-table-container">
                                    <table class="data-table">
                                        <thead>
                                            <tr>
                                                <th>Account</th>
                                                <th>Subject</th>
                                                <th>Due Date</th>
                                                <th>Urgency</th>
                                                <th>Owner</th>
                                                <th>Status</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <template for:each={kpiModalData} for:item="task">
                                                <tr key={task.taskId} data-id={task.taskId} onclick={handleKpiRecordClick} class="table-row">
                                                    <td>{task.accountName}</td>
                                                    <td class="subject-cell">{task.subject}</td>
                                                    <td>{task.dueDate}</td>
                                                    <td><span class="overdue-badge">{task.daysOverdue} days overdue</span></td>
                                                    <td>{task.ownerName}</td>
                                                    <td><span class="status-badge">{task.status}</span></td>
                                                </tr>
                                            </template>
                                        </tbody>
                                    </table>
                                </div>
                            </template>
                            <template if:false={hasKpiModalData}>
                                <div class="kpi-modal-empty-state">
                                    <lightning-icon icon-name="utility:success" size="large" class="empty-state-icon"></lightning-icon>
                                    <p class="empty-state-message">{kpiModalEmptyMessage}</p>
                                </div>
                            </template>
                        </template>

                        <template if:true={showOpportunitiesModal}>
                            <template if:true={hasKpiModalData}>
                                <div class="kpi-modal-table-container">
                                    <table class="data-table">
                                        <thead>
                                            <tr>
                                                <th>Account</th>
                                                <th>Name</th>
                                                <th>Stage</th>
                                                <th>Close Date</th>
                                                <th>Amount</th>
                                                <th>Probability</th>
                                                <th>Owner</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <template for:each={kpiModalData} for:item="opp">
                                                <tr key={opp.opportunityId} data-id={opp.opportunityId} onclick={handleKpiRecordClick} class="table-row">
                                                    <td>{opp.accountName}</td>
                                                    <td class="subject-cell">{opp.name}</td>
                                                    <td><span class="status-badge">{opp.stageName}</span></td>
                                                    <td>{opp.closeDate}</td>
                                                    <td>
                                                        <template if:true={opp.amount}>
                                                            <lightning-formatted-number value={opp.amount} format-style="currency"></lightning-formatted-number>
                                                        </template>
                                                    </td>
                                                    <td>{opp.probability}%</td>
                                                    <td>{opp.ownerName}</td>
                                                </tr>
                                            </template>
                                        </tbody>
                                    </table>
                                </div>
                            </template>
                            <template if:false={hasKpiModalData}>
                                <div class="kpi-modal-empty-state">
                                    <lightning-icon icon-name="utility:info" size="large" class="empty-state-icon"></lightning-icon>
                                    <p class="empty-state-message">{kpiModalEmptyMessage}</p>
                                </div>
                            </template>
                        </template>

                        <!-- Month Cases Table (grouped by account) -->
                        <template if:true={showMonthCasesModal}>
                            <template if:true={hasKpiModalData}>
                                <template for:each={groupedKpiModalData} for:item="group">
                                    <div key={group.accountName} class="kpi-modal-group">
                                        <h3 class="kpi-modal-group-header" data-id={group.accountId} onclick={handleKpiRecordClick}>{group.accountName}</h3>
                                        <div class="kpi-modal-table-container">
                                            <table class="data-table">
                                                <thead>
                                                    <tr>
                                                        <th>Case #</th>
                                                        <th>Subject</th>
                                                        <th>Status</th>
                                                        <th>Priority</th>
                                                        <th>Owner</th>
                                                        <th>Age (days)</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    <template for:each={group.items} for:item="caseItem">
                                                        <tr key={caseItem.caseId} data-id={caseItem.caseId} onclick={handleKpiRecordClick} class="table-row">
                                                            <td>
                                                                <span class="case-number">{caseItem.caseNumber}</span>
                                                                <template if:true={caseItem.isEscalated}>
                                                                    <lightning-icon icon-name="utility:warning" size="xx-small" class="escalated-icon"></lightning-icon>
                                                                </template>
                                                            </td>
                                                            <td class="subject-cell">{caseItem.subject}</td>
                                                            <td><span class="status-badge">{caseItem.status}</span></td>
                                                            <td><span class="priority-badge">{caseItem.priority}</span></td>
                                                            <td>{caseItem.ownerName}</td>
                                                            <td>{caseItem.age}</td>
                                                        </tr>
                                                    </template>
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </template>
                            </template>
                            <template if:false={hasKpiModalData}>
                                <div class="kpi-modal-empty-state">
                                    <lightning-icon icon-name="utility:success" size="large" class="empty-state-icon"></lightning-icon>
                                    <p class="empty-state-message">{kpiModalEmptyMessage}</p>
                                </div>
                            </template>
                        </template>

                        <!-- Month Opportunities Table (grouped by account) -->
                        <template if:true={showMonthOpportunitiesModal}>
                            <template if:true={hasKpiModalData}>
                                <template for:each={groupedKpiModalData} for:item="group">
                                    <div key={group.accountName} class="kpi-modal-group">
                                        <h3 class="kpi-modal-group-header" data-id={group.accountId} onclick={handleKpiRecordClick}>{group.accountName}</h3>
                                        <div class="kpi-modal-table-container">
                                            <table class="data-table">
                                                <thead>
                                                    <tr>
                                                        <th>Name</th>
                                                        <th>Stage</th>
                                                        <th>Close Date</th>
                                                        <th>Amount</th>
                                                        <th>Probability</th>
                                                        <th>Owner</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    <template for:each={group.items} for:item="opp">
                                                        <tr key={opp.opportunityId} data-id={opp.opportunityId} onclick={handleKpiRecordClick} class="table-row">
                                                            <td class="subject-cell">{opp.name}</td>
                                                            <td><span class="status-badge">{opp.stageName}</span></td>
                                                            <td>{opp.closeDate}</td>
                                                            <td>
                                                                <template if:true={opp.amount}>
                                                                    <lightning-formatted-number value={opp.amount} format-style="currency"></lightning-formatted-number>
                                                                </template>
                                                            </td>
                                                            <td>{opp.probability}%</td>
                                                            <td>{opp.ownerName}</td>
                                                        </tr>
                                                    </template>
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </template>
                            </template>
                            <template if:false={hasKpiModalData}>
                                <div class="kpi-modal-empty-state">
                                    <lightning-icon icon-name="utility:info" size="large" class="empty-state-icon"></lightning-icon>
                                    <p class="empty-state-message">{kpiModalEmptyMessage}</p>
                                </div>
                            </template>
                        </template>
                    </div>
                    <footer class="slds-modal__footer">
                        <button class="custom-btn custom-btn--secondary" onclick={handleCloseKpiModal} type="button">
                            Close
                        </button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
    </div>
</template>
